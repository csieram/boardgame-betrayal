<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 210" width="150" height="210">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/><stop offset="100%" style="stop-color:#0D1B2A"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect x="5" y="5" width="140" height="200" rx="12" fill="url(#cardBg)" stroke="#2E5A8B" stroke-width="3"/>
  <rect x="12" y="12" width="126" height="186" rx="8" fill="none" stroke="#3D7AB8" stroke-width="1"/>
  
  <rect x="55" y="18" width="40" height="18" rx="9" fill="#3D7AB8"/>
  <text x="75" y="31" text-anchor="middle" font-size="10" fill="#FFF" font-weight="bold">物品</text>
  
  <!-- 醫療包 -->
  <g transform="translate(75, 95)" filter="url(#shadow)">
    <rect x="-30" y="-22" width="60" height="44" fill="#DC143C" rx="5" stroke="#8B0000" stroke-width="2"/>
    <rect x="-25" y="-18" width="50" height="36" fill="#FFF" rx="3"/>
    <rect x="-6" y="-12" width="12" height="24" fill="#DC143C"/>
    <rect x="-12" y="-6" width="24" height="12" fill="#DC143C"/>
  </g>
  
  <text x="75" y="165" text-anchor="middle" font-size="14" fill="#FFF" font-weight="bold">醫療包</text>
  <text x="75" y="182" text-anchor="middle" font-size="11" fill="#8BB8E8">Medkit</text>
  <circle cx="75" cy="195" r="3" fill="#3D7AB8"/>
</svg>
