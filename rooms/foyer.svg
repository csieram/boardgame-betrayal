<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355"/>
      <stop offset="100%" style="stop-color:#5A4A3A"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B4B2A"/>
      <stop offset="50%" style="stop-color:#8B6B4B"/>
      <stop offset="100%" style="stop-color:#4A2A0A"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="3" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Floor -->
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#2A1A0A" stroke-width="2"/>
  
  <!-- INTERIOR: FOYER - Large chandelier and bench -->
  <!-- Chandelier -->
  <g filter="url(#softShadow)">
    <line x1="50" y1="8" x2="50" y2="18" stroke="#444" stroke-width="2"/>
    <circle cx="50" cy="24" r="10" fill="#D4AF37" stroke="#B8860B" stroke-width="2"/>
    <circle cx="50" cy="24" r="6" fill="#FFD700"/>
    <!-- Arms -->
    <line x1="50" y1="24" x2="35" y2="32" stroke="#D4AF37" stroke-width="1.5"/>
    <line x1="50" y1="24" x2="65" y2="32" stroke="#D4AF37" stroke-width="1.5"/>
    <line x1="50" y1="24" x2="50" y2="38" stroke="#D4AF37" stroke-width="1.5"/>
    <!-- Lights -->
    <circle cx="35" cy="32" r="3" fill="#FFF8DC" filter="url(#glow)"/>
    <circle cx="65" cy="32" r="3" fill="#FFF8DC" filter="url(#glow)"/>
    <circle cx="50" cy="38" r="4" fill="#FFF8DC" filter="url(#glow)"/>
  </g>
  
  <!-- Large bench -->
  <g filter="url(#softShadow)">
    <rect x="25" y="55" width="50" height="22" fill="#6B5344" stroke="#4A3324" stroke-width="2" rx="2"/>
    <!-- Backrest -->
    <rect x="25" y="48" width="50" height="12" fill="#7B6354" stroke="#5A4334" stroke-width="1" rx="1"/>
    <!-- Legs -->
    <line x1="28" y1="77" x2="28" y2="86" stroke="#4A3324" stroke-width="3"/>
    <line x1="72" y1="77" x2="72" y2="86" stroke="#4A3324" stroke-width="3"/>
    <!-- Decorative details -->
    <line x1="30" y1="52" x2="70" y2="52" stroke="#5A4334" stroke-width="0.5"/>
    <line x1="30" y1="56" x2="70" y2="56" stroke="#5A4334" stroke-width="0.5"/>
  </g>
  
  <!-- Mirror -->
  <g filter="url(#softShadow)">
    <rect x="65" y="35" width="12" height="18" fill="#87CEEB" opacity="0.3" stroke="#D4AF37" stroke-width="2" rx="1"/>
    <rect x="67" y="37" width="8" height="14" fill="#ADD8E6" opacity="0.2"/>
  </g>
  
  <!-- Coat rack -->
  <g filter="url(#softShadow)">
    <line x1="20" y1="45" x2="20" y2="75" stroke="#5A4A3A" stroke-width="2"/>
    <line x1="15" y1="48" x2="25" y2="48" stroke="#5A4A3A" stroke-width="1.5"/>
    <line x1="17" y1="52" x2="23" y2="52" stroke="#5A4A3A" stroke-width="1.5"/>
    <circle cx="20" cy="43" r="2" fill="#5A4A3A"/>
  </g>
  
  <!-- Door North -->
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="-2" x2="50" y2="12" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="5" x2="62" y2="5" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="6" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="6" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Door South -->
  <g filter="url(#softShadow)">
    <rect x="36" y="88" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="90" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="90" x2="50" y2="104" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="97" x2="62" y2="97" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="90" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="94" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="94" r="1.5" fill="#B8860B"/>
  </g>
</svg>
