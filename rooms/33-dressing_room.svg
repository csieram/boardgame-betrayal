<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6B5B6B"/><stop offset="50%" style="stop-color:#4A3A4A"/><stop offset="100%" style="stop-color:#2A1A2A"/></linearGradient>
    <pattern id="carpetPattern" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse"><rect width="12" height="12" fill="url(#floorGrad)"/><circle cx="3" cy="3" r="1.5" fill="#5A4A5A" opacity="0.3"/><circle cx="9" cy="9" r="2" fill="#3A2A3A" opacity="0.4"/></pattern>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#5A3A1A"/><stop offset="50%" style="stop-color:#7B5B3B"/><stop offset="100%" style="stop-color:#4A2A0A"/></linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#FFD700"/><stop offset="50%" style="stop-color:#B8860B"/><stop offset="100%" style="stop-color:#D4AF37"/></linearGradient>
    <linearGradient id="mirrorGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#C0D0E0"/><stop offset="50%" style="stop-color:#E8F0F8"/><stop offset="100%" style="stop-color:#A0B0C0"/></linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/><feOffset in="blur" dx="2" dy="2" result="offsetBlur"/><feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer><feMerge><feMergeNode in="offsetBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="8" y="8" width="84" height="84" fill="url(#carpetPattern)" stroke="#1A0A1A" stroke-width="2"/>
  <rect x="10" y="10" width="80" height="80" fill="none" stroke="#3A2A3A" stroke-width="0.5" opacity="0.3"/>
  <g filter="url(#softShadow)">
    <rect x="88" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="90" y1="50" x2="102" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="96" y1="38" x2="96" y2="62" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="90" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="96" cy="55" r="2" fill="url(#goldTrim)"/>
    <circle cx="96" cy="55" r="1" fill="#B8860B"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="-4" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="-2" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="-2" y1="50" x2="10" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="4" y1="38" x2="4" y2="62" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="-2" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="4" cy="55" r="2" fill="url(#goldTrim)"/>
    <circle cx="4" cy="55" r="1" fill="#B8860B"/>
  </g>
  <rect x="20" y="20" width="25" height="60" fill="url(#mirrorGrad)" stroke="#4A5A6B" filter="url(#softShadow)"/>
  <rect x="55" y="20" width="25" height="60" fill="url(#mirrorGrad)" stroke="#4A5A6B" filter="url(#softShadow)"/>
  <rect x="35" y="40" width="30" height="20" fill="#8B4513" filter="url(#softShadow)"/>
  <circle cx="12" cy="12" r="2" fill="#3A2A3A" opacity="0.4"/>
  <circle cx="88" cy="12" r="2" fill="#3A2A3A" opacity="0.4"/>
  <circle cx="12" cy="88" r="2" fill="#3A2A3A" opacity="0.4"/>
  <circle cx="88" cy="88" r="2" fill="#3A2A3A" opacity="0.4"/>
</svg>
