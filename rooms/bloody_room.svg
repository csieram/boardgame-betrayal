<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5A5A5A"/>
      <stop offset="30%" style="stop-color:#4A4A4A"/>
      <stop offset="60%" style="stop-color:#3A3A3A"/>
      <stop offset="100%" style="stop-color:#2A2A2A"/>
    </linearGradient>
    <pattern id="woodPattern" x="0" y="0" width="12" height="60" patternUnits="userSpaceOnUse">
      <rect width="12" height="60" fill="url(#floorGrad)"/>
      <line x1="0" y1="0" x2="0" y2="60" stroke="#1A0A00" stroke-width="0.4" opacity="0.7"/>
    </pattern>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A2A0A"/>
      <stop offset="50%" style="stop-color:#6B4B2B"/>
      <stop offset="100%" style="stop-color:#4A2A0A"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="8" y="8" width="84" height="84" fill="url(#woodPattern)" stroke="#1A0A00" stroke-width="2"/>
  
  <!-- INTERIOR: Bloody Room -->
  <g>
    <!-- Blood stains -->
    <ellipse cx="50" cy="62" rx="30" ry="18" fill="#4A0000" opacity="0.5"/>
    <ellipse cx="36" cy="50" rx="12" ry="8" fill="#6B0000" opacity="0.6"/>
    <ellipse cx="66" cy="58" rx="10" ry="6" fill="#6B0000" opacity="0.55"/>
    <!-- Blood splatter -->
    <path d="M40,44 Q48,40 56,48 Q62,44 66,52" fill="none" stroke="#8B0000" stroke-width="5" opacity="0.6" stroke-linecap="round"/>
    <path d="M30,70 Q42,62 52,74" fill="none" stroke="#8B0000" stroke-width="4" opacity="0.5"/>
    <!-- Bloody handprint -->
    <circle cx="56" cy="36" r="4" fill="#6B0000" opacity="0.6"/>
    <ellipse cx="52" cy="40" rx="2" ry="3" fill="#6B0000" opacity="0.5" transform="rotate(-30 52 40)"/>
    <ellipse cx="60" cy="38" rx="2" ry="3" fill="#6B0000" opacity="0.5" transform="rotate(30 60 38)"/>
    <!-- Operating table -->
    <rect x="24" y="54" width="22" height="14" fill="#5A5A5A" stroke="#444" stroke-width="1" rx="2"/>
    <line x1="28" y1="68" x2="28" y2="76" stroke="#444" stroke-width="2"/>
    <line x1="42" y1="68" x2="42" y2="76" stroke="#444" stroke-width="2"/>
    <!-- Blood drips -->
    <path d="M70,35 L70,45" stroke="#6B0000" stroke-width="2" opacity="0.6"/>
    <circle cx="70" cy="48" r="2" fill="#6B0000" opacity="0.5"/>
  </g>
  
  <!-- Door North -->
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="-2" x2="50" y2="12" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="5" x2="62" y2="5" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="6" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="6" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Symbol E -->
  <g filter="url(#softShadow)">
    <circle cx="85" cy="15" r="8" fill="#4A9A4A" stroke="#2A7A2A" stroke-width="1"/>
    <circle cx="85" cy="15" r="6" fill="#5ABA5A" opacity="0.5"/>
    <text x="85" y="19" text-anchor="middle" font-size="11" fill="#FFF" font-weight="bold" font-family="serif">E</text>
  </g>
</svg>
