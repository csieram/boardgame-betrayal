<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B5344"/>
      <stop offset="100%" style="stop-color:#4A3324"/>
    </linearGradient>
    <pattern id="woodPattern" x="0" y="0" width="10" height="40" patternUnits="userSpaceOnUse">
      <rect width="10" height="40" fill="url(#floorGrad)"/>
      <line x1="0" y1="0" x2="0" y2="40" stroke="#2A1A0A" stroke-width="0.3" opacity="0.6"/>
    </pattern>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5A3A1A"/>
      <stop offset="50%" style="stop-color:#7B5B3B"/>
      <stop offset="100%" style="stop-color:#4A2A0A"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect x="8" y="8" width="84" height="84" fill="url(#woodPattern)" stroke="#2A2A2A" stroke-width="2"/>
  <circle cx="30" cy="35" r="15" fill="#2F5F2F"/><circle cx="70" cy="55" r="18" fill="#2F5F2F"/>
  <g filter="url(#softShadow)"><rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/><rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/><rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/><circle cx="55" cy="6" r="2" fill="url(#goldTrim)"/></g><g filter="url(#softShadow)"><rect x="88" y="36" width="16" height="28" fill="#1A0A00"/><rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/><rect x="90" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/><circle cx="96" cy="55" r="2" fill="url(#goldTrim)"/></g>
  <circle cx="85" cy="15" r="7" fill="#4A9A4A" stroke="#2A7A2A" stroke-width="1"/><text x="85" y="19" text-anchor="middle" font-size="10" fill="#FFF" font-weight="bold">E</text>
  
</svg>