<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#2A2A2A"/><stop offset="50%" style="stop-color:#1A1A1A"/><stop offset="100%" style="stop-color:#0A0A0A"/></linearGradient>
    <pattern id="stonePattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><rect width="20" height="20" fill="url(#floorGrad)"/><line x1="0" y1="0" x2="20" y2="20" stroke="#1A1A1A" stroke-width="0.5" opacity="0.5"/><line x1="20" y1="0" x2="0" y2="20" stroke="#1A1A1A" stroke-width="0.5" opacity="0.5"/></pattern>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#3A2A1A"/><stop offset="50%" style="stop-color:#5A4A3A"/><stop offset="100%" style="stop-color:#2A1A0A"/></linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#FFD700"/><stop offset="50%" style="stop-color:#B8860B"/><stop offset="100%" style="stop-color:#D4AF37"/></linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/><feOffset in="blur" dx="2" dy="2" result="offsetBlur"/><feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer><feMerge><feMergeNode in="offsetBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="8" y="8" width="84" height="84" fill="url(#stonePattern)" stroke="#000" stroke-width="2"/>
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#0A0000"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="-2" x2="50" y2="12" stroke="#1A0A00" stroke-width="0.5"/>
    <line x1="38" y1="5" x2="62" y2="5" stroke="#1A0A00" stroke-width="0.5"/>
    <rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="6" r="2" fill="url(#goldTrim)"/>
    <circle cx="55" cy="6" r="1" fill="#B8860B"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="36" y="88" width="28" height="16" fill="#0A0000"/>
    <rect x="38" y="90" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="90" x2="50" y2="104" stroke="#1A0A00" stroke-width="0.5"/>
    <line x1="38" y1="97" x2="62" y2="97" stroke="#1A0A00" stroke-width="0.5"/>
    <rect x="38" y="90" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="94" r="2" fill="url(#goldTrim)"/>
    <circle cx="55" cy="94" r="1" fill="#B8860B"/>
  </g>
  <line x1="20" y1="30" x2="80" y2="30" stroke="#1A1A1A" stroke-width="2"/>
  <line x1="20" y1="50" x2="80" y2="50" stroke="#1A1A1A" stroke-width="2"/>
  <line x1="20" y1="70" x2="80" y2="70" stroke="#1A1A1A" stroke-width="2"/>
