<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5A5A5A"/>
      <stop offset="30%" style="stop-color:#4A4A4A"/>
      <stop offset="60%" style="stop-color:#3A3A3A"/>
      <stop offset="100%" style="stop-color:#2A2A2A"/>
    </linearGradient>
    <pattern id="woodPattern" x="0" y="0" width="12" height="60" patternUnits="userSpaceOnUse">
      <rect width="12" height="60" fill="url(#floorGrad)"/>
      <line x1="0" y1="0" x2="0" y2="60" stroke="#1A0A00" stroke-width="0.4" opacity="0.7"/>
      <line x1="6" y1="0" x2="6" y2="60" stroke="#2A1A0A" stroke-width="0.2" opacity="0.4"/>
      <ellipse cx="3" cy="15" rx="2" ry="4" fill="#3A2A1A" opacity="0.3"/>
      <ellipse cx="9" cy="35" rx="1.5" ry="3" fill="#2A1A0A" opacity="0.25"/>
    </pattern>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A2A0A"/>
      <stop offset="20%" style="stop-color:#6B4B2B"/>
      <stop offset="40%" style="stop-color:#5A3A1A"/>
      <stop offset="60%" style="stop-color:#7B5B3B"/>
      <stop offset="80%" style="stop-color:#4A2A0A"/>
      <stop offset="100%" style="stop-color:#3A1A00"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="30%" style="stop-color:#B8860B"/>
      <stop offset="50%" style="stop-color:#FFD700"/>
      <stop offset="70%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feComposite in="blur" in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadowDiff"/>
      <feFlood flood-color="#FFD700" flood-opacity="0.4"/>
      <feComposite in2="shadowDiff" operator="in"/>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>
  <rect x="8" y="8" width="84" height="84" fill="url(#woodPattern)" stroke="#1A0A00" stroke-width="2"/>
  <rect x="10" y="10" width="80" height="80" fill="none" stroke="#3A2A1A" stroke-width="0.5" opacity="0.5"/>
  <rect x="25" y="25" width="50" height="50" fill="#4A4A4A" opacity="0.3" rx="5"/>
  <g filter="url(#softShadow)"><rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/><rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/><line x1="50" y1="-2" x2="50" y2="12" stroke="#2A1A0A" stroke-width="0.5"/><line x1="38" y1="5" x2="62" y2="5" stroke="#2A1A0A" stroke-width="0.5"/><rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/><circle cx="55" cy="6" r="2.5" fill="url(#goldTrim)"/><circle cx="55" cy="6" r="1.5" fill="#B8860B"/></g><g filter="url(#softShadow)"><rect x="88" y="36" width="16" height="28" fill="#1A0A00"/><rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/><line x1="90" y1="50" x2="102" y2="50" stroke="#2A1A0A" stroke-width="0.5"/><line x1="96" y1="38" x2="96" y2="62" stroke="#2A1A0A" stroke-width="0.5"/><rect x="90" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/><circle cx="96" cy="55" r="2.5" fill="url(#goldTrim)"/><circle cx="96" cy="55" r="1.5" fill="#B8860B"/></g>
  <g filter="url(#softShadow)"><circle cx="85" cy="15" r="8" fill="#8B4DA8" stroke="#6B2D88" stroke-width="1"/><circle cx="85" cy="15" r="6" fill="#AB6DC8" opacity="0.5"/><text x="85" y="19" text-anchor="middle" font-size="11" fill="#FFF" font-weight="bold" font-family="serif">O</text></g>
</svg>