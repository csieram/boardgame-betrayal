<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="300" height="300">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B8B6B"/><stop offset="100%" style="stop-color:#5A6B4A"/>
    </linearGradient>
    <linearGradient id="doorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6B4B"/><stop offset="100%" style="stop-color:#4A2A0A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#4A5A3A" stroke-width="2"/>
  <g filter="url(#shadow)">
    <rect x="38" y="-2" width="24" height="14" fill="#2A1A0A"/>
    <rect x="40" y="0" width="20" height="12" fill="url(#doorGrad)" stroke="#A08060" stroke-width="1.5"/>
    <circle cx="55" cy="6" r="1.5" fill="#D4AF37"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="88" y="38" width="14" height="24" fill="#2A1A0A"/>
    <rect x="90" y="40" width="12" height="20" fill="url(#doorGrad)" stroke="#A08060" stroke-width="1.5"/>
    <circle cx="96" cy="55" r="1.5" fill="#D4AF37"/>
  </g>
  <rect x="20" y="20" width="60" height="60" fill="#8B9B7B" opacity="0.4" rx="2"/>
  <line x1="20" y1="20" x2="80" y2="80" stroke="#FFF" opacity="0.3" stroke-width="2"/>
  <line x1="80" y1="20" x2="20" y2="80" stroke="#FFF" opacity="0.3" stroke-width="2"/>
  <circle cx="50" cy="50" r="15" fill="#FFD700" opacity="0.2" filter="url(#shadow)"/>
</svg>
