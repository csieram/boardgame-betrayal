<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="300" height="300">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5A5A4A"/><stop offset="100%" style="stop-color:#3A3A2A"/>
    </linearGradient>
    <linearGradient id="doorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6B4B"/><stop offset="100%" style="stop-color:#4A2A0A"/>
    </linearGradient>
    <linearGradient id="counterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7B7B6B"/><stop offset="100%" style="stop-color:#4A4A3A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#2A2A1A" stroke-width="2"/>
  <g filter="url(#shadow)">
    <rect x="38" y="-2" width="24" height="14" fill="#2A1A0A"/>
    <rect x="40" y="0" width="20" height="12" fill="url(#doorGrad)" stroke="#A08060" stroke-width="1.5"/>
    <circle cx="55" cy="6" r="1.5" fill="#D4AF37"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="38" y="88" width="24" height="14" fill="#2A1A0A"/>
    <rect x="40" y="90" width="20" height="12" fill="url(#doorGrad)" stroke="#A08060" stroke-width="1.5"/>
    <circle cx="55" cy="94" r="1.5" fill="#D4AF37"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="88" y="38" width="14" height="24" fill="#2A1A0A"/>
    <rect x="90" y="40" width="12" height="20" fill="url(#doorGrad)" stroke="#A08060" stroke-width="1.5"/>
    <circle cx="96" cy="55" r="1.5" fill="#D4AF37"/>
  </g>
  <rect x="15" y="15" width="70" height="18" fill="url(#counterGrad)" stroke="#3A3A2A" filter="url(#shadow)"/>
  <g filter="url(#shadow)">
    <rect x="20" y="18" width="20" height="12" fill="#333" stroke="#111"/>
    <circle cx="26" cy="24" r="3" fill="#555"/>
    <circle cx="34" cy="24" r="3" fill="#555"/>
  </g>
  <rect x="55" y="18" width="25" height="12" fill="#4682B4" stroke="#2E5A8B" opacity="0.7"/>
  <rect x="32" y="45" width="36" height="24" fill="#8B4513" stroke="#654321" rx="2" filter="url(#shadow)"/>
  <rect x="25" y="50" width="7" height="12" fill="#654321" filter="url(#shadow)"/>
  <rect x="68" y="50" width="7" height="12" fill="#654321" filter="url(#shadow)"/>
  <rect x="46" y="72" width="8" height="10" fill="#654321" filter="url(#shadow)"/>
