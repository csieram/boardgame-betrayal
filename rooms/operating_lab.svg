<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5A5A5A"/>
      <stop offset="100%" style="stop-color:#3A3A3A"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A2A0A"/>
      <stop offset="50%" style="stop-color:#6B4B2B"/>
      <stop offset="100%" style="stop-color:#3A1A00"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="3" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#1A0A00" stroke-width="2"/>
  
  <!-- Operating table -->
  <g filter="url(#softShadow)">
    <rect x="12" y="42" width="76" height="28" fill="#6B7B7B" stroke="#4A5A5A" stroke-width="2" rx="2"/>
    <!-- Table top -->
    <rect x="15" y="45" width="35" height="22" fill="#FFF" opacity="0.4" stroke="#999" stroke-width="1" rx="2"/>
    <!-- Sheet folds -->
    <line x1="15" y1="52" x2="50" y2="52" stroke="#DDD" stroke-width="0.5"/>
    <line x1="15" y1="58" x2="50" y2="58" stroke="#DDD" stroke-width="0.5"/>
  </g>
  
  <!-- Medical lamp -->
  <g filter="url(#softShadow)">
    <circle cx="62" cy="55" r="16" fill="#87CEEB" opacity="0.3" stroke="#5A9AC8" stroke-width="2"/>
    <line x1="52" y1="45" x2="72" y2="65" stroke="#5A9AC8" stroke-width="1" opacity="0.5"/>
    <line x1="72" y1="45" x2="52" y2="65" stroke="#5A9AC8" stroke-width="1" opacity="0.5"/>
    <!-- Lamp arm -->
    <line x1="62" y1="55" x2="80" y2="35" stroke="#666" stroke-width="2"/>
    <line x1="80" y1="35" x2="80" y2="25" stroke="#666" stroke-width="2"/>
  </g>
  
  <!-- Equipment cart -->
  <g filter="url(#softShadow)">
    <rect x="72" y="48" width="14" height="22" fill="#5A6A6A" stroke="#4A5A5A" stroke-width="1"/>
    <rect x="74" y="50" width="10" height="6" fill="#4A5A5A"/>
    <circle cx="79" cy="54" r="2" fill="#87CEEB" opacity="0.6"/>
    <rect x="74" y="60" width="10" height="8" fill="#4A5A5A"/>
  </g>
  
  <!-- Medical tools tray -->
  <rect x="18" y="72" width="20" height="5" fill="#888" stroke="#666" stroke-width="0.5"/>
  <line x1="22" y1="72" x2="22" y2="68" stroke="#AAA" stroke-width="1"/>
  <line x1="26" y1="72" x2="26" y2="67" stroke="#AAA" stroke-width="1"/>
  <line x1="30" y1="72" x2="30" y2="69" stroke="#AAA" stroke-width="1"/>
  
  <!-- Door North -->
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="-2" x2="50" y2="12" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="5" x2="62" y2="5" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="6" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="6" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Symbol I -->
  <g filter="url(#softShadow)">
    <circle cx="85" cy="15" r="8" fill="#3D7AB8" stroke="#2D5A98" stroke-width="1"/>
    <circle cx="85" cy="15" r="6" fill="#5A9AD8" opacity="0.5"/>
    <text x="85" y="19" text-anchor="middle" font-size="11" fill="#FFF" font-weight="bold" font-family="serif">I</text>
  </g>
</svg>
