  </g>
  <rect x="22" y="22" width="56" height="56" fill="#4A3728" opacity="0.2" rx="3"/>
  <circle cx="50" cy="50" r="18" fill="#5A4334" opacity="0.3"/>
  <g filter="url(#shadow)">
    <line x1="50" y1="20" x2="50" y2="38" stroke="#4A4A4A" stroke-width="2"/>
    <circle cx="50" cy="42" r="10" fill="#FFD700" opacity="0.4"/>
    <circle cx="50" cy="42" r="6" fill="#FFF8DC" opacity="0.9"/>
    <circle cx="50" cy="42" r="14" fill="#FFD700" opacity="0.1"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="28" y="58" width="44" height="22" fill="#4A3A2A" stroke="#2A1A0A" stroke-width="1"/>
    <line x1="28" y1="63" x2="72" y2="63" stroke="#2A1A0A" stroke-width="1"/>
