    <rect x="92" y="42" width="8" height="16" fill="#3A2A1A" opacity="0.6"/>
    <circle cx="96" cy="55" r="1.5" fill="#D4AF37"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="-2" y="38" width="14" height="24" fill="#2A1A0A"/>
    <rect x="0" y="40" width="12" height="20" fill="url(#doorGrad)" stroke="#A08060" stroke-width="1.5"/>
