<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355"/>
      <stop offset="100%" style="stop-color:#5A4A3A"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B4B2A"/>
      <stop offset="50%" style="stop-color:#8B6B4B"/>
      <stop offset="100%" style="stop-color:#4A2A0A"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="3" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Floor -->
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#2A1A0A" stroke-width="2"/>
  
  <!-- INTERIOR: ENTRANCE HALL - Grand chandelier and welcome area -->
  <!-- Grand chandelier -->
  <g filter="url(#softShadow)">
    <line x1="50" y1="8" x2="50" y2="15" stroke="#444" stroke-width="3"/>
    <circle cx="50" cy="22" r="14" fill="#D4AF37" stroke="#B8860B" stroke-width="2"/>
    <circle cx="50" cy="22" r="9" fill="#FFD700"/>
    <!-- Multiple arms -->
    <line x1="50" y1="22" x2="30" y2="35" stroke="#D4AF37" stroke-width="2"/>
    <line x1="50" y1="22" x2="70" y2="35" stroke="#D4AF37" stroke-width="2"/>
    <line x1="50" y1="22" x2="50" y2="42" stroke="#D4AF37" stroke-width="2"/>
    <line x1="50" y1="22" x2="35" y2="40" stroke="#D4AF37" stroke-width="1.5"/>
    <line x1="50" y1="22" x2="65" y2="40" stroke="#D4AF37" stroke-width="1.5"/>
    <!-- Lights -->
    <circle cx="30" cy="35" r="4" fill="#FFF8DC" filter="url(#glow)"/>
    <circle cx="70" cy="35" r="4" fill="#FFF8DC" filter="url(#glow)"/>
    <circle cx="50" cy="42" r="5" fill="#FFF8DC" filter="url(#glow)"/>
    <circle cx="35" cy="40" r="3" fill="#FFF8DC" filter="url(#glow)"/>
    <circle cx="65" cy="40" r="3" fill="#FFF8DC" filter="url(#glow)"/>
    <!-- Glow -->
    <circle cx="50" cy="30" r="30" fill="#FFD700" opacity="0.1"/>
  </g>
  
  <!-- Welcome mat -->
  <ellipse cx="50" cy="75" rx="30" ry="10" fill="#8B0000" opacity="0.5"/>
  <ellipse cx="50" cy="75" rx="20" ry="6" fill="#A52A2A" opacity="0.4"/>
  
  <!-- Side tables -->
  <g filter="url(#softShadow)">
    <rect x="15" y="55" width="12" height="20" fill="#6B5344" stroke="#4A3324" stroke-width="1"/>
    <rect x="17" y="57" width="8" height="6" fill="#5A4324"/>
    <!-- Vase -->
    <ellipse cx="21" cy="52" rx="3" ry="5" fill="#4682B4" stroke="#2E5A8B" stroke-width="0.5"/>
  </g>
  
  <g filter="url(#softShadow)">
    <rect x="73" y="55" width="12" height="20" fill="#6B5344" stroke="#4A3324" stroke-width="1"/>
    <rect x="75" y="57" width="8" height="6" fill="#5A4324"/>
    <!-- Vase -->
    <ellipse cx="79" cy="52" rx="3" ry="5" fill="#4682B4" stroke="#2E5A8B" stroke-width="0.5"/>
  </g>
  
  <!-- Door North -->
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="-2" x2="50" y2="12" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="5" x2="62" y2="5" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="6" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="6" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Door South -->
  <g filter="url(#softShadow)">
    <rect x="36" y="88" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="90" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="90" x2="50" y2="104" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="97" x2="62" y2="97" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="90" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="94" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="94" r="1.5" fill="#B8860B"/>
  </g>
</svg>
