<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A3A4A"/>
      <stop offset="100%" style="stop-color:#2A1A2A"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A2A0A"/>
      <stop offset="50%" style="stop-color:#6B4B2B"/>
      <stop offset="100%" style="stop-color:#3A1A00"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <linearGradient id="wineBottle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A0A0A"/>
      <stop offset="100%" style="stop-color:#2A0000"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="3" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Floor -->
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#1A0A1A" stroke-width="2"/>
  
  <!-- INTERIOR: Wine Cellar - Racks of wine bottles -->
  <!-- Wine racks -->
  <g filter="url(#softShadow)">
    <!-- Left rack -->
    <rect x="12" y="15" width="22" height="30" fill="#4A3728" stroke="#2A1708" stroke-width="1"/>
    <rect x="14" y="17" width="4" height="10" fill="url(#wineBottle)"/>
    <rect x="20" y="20" width="4" height="10" fill="url(#wineBottle)"/>
    <rect x="26" y="17" width="4" height="10" fill="url(#wineBottle)"/>
    <rect x="14" y="30" width="4" height="10" fill="url(#wineBottle)"/>
    <rect x="20" y="33" width="4" height="10" fill="url(#wineBottle)"/>
    <rect x="26" y="30" width="4" height="10" fill="url(#wineBottle)"/>
    
    <!-- Right rack -->
    <rect x="66" y="15" width="22" height="30" fill="#4A3728" stroke="#2A1708" stroke-width="1"/>
    <rect x="68" y="17" width="4" height="10" fill="url(#wineBottle)"/>
    <rect x="74" y="20" width="4" height="10" fill="url(#wineBottle)"/>
    <rect x="80" y="17" width="4" height="10" fill="url(#wineBottle)"/>
    <rect x="68" y="30" width="4" height="10" fill="url(#wineBottle)"/>
    <rect x="74" y="33" width="4" height="10" fill="url(#wineBottle)"/>
    <rect x="80" y="30" width="4" height="10" fill="url(#wineBottle)"/>
    
    <!-- Bottom left rack -->
    <rect x="12" y="55" width="22" height="30" fill="#4A3728" stroke="#2A1708" stroke-width="1"/>
    <rect x="14" y="57" width="4" height="10" fill="url(#wineBottle)"/>
    <rect x="20" y="60" width="4" height="10" fill="url(#wineBottle)"/>
    <rect x="26" y="57" width="4" height="10" fill="url(#wineBottle)"/>
    <rect x="14" y="70" width="4" height="10" fill="url(#wineBottle)"/>
    <rect x="20" y="73" width="4" height="10" fill="url(#wineBottle)"/>
    
    <!-- Bottom right rack -->
    <rect x="66" y="55" width="22" height="30" fill="#4A3728" stroke="#2A1708" stroke-width="1"/>
    <rect x="68" y="57" width="4" height="10" fill="url(#wineBottle)"/>
    <rect x="74" y="60" width="4" height="10" fill="url(#wineBottle)"/>
    <rect x="80" y="57" width="4" height="10" fill="url(#wineBottle)"/>
    <rect x="68" y="70" width="4" height="10" fill="url(#wineBottle)"/>
    <rect x="74" y="73" width="4" height="10" fill="url(#wineBottle)"/>
  </g>
  
  <!-- Center barrel -->
  <g filter="url(#softShadow)">
    <ellipse cx="50" cy="50" rx="12" ry="15" fill="#5A4A3A" stroke="#3A2A1A" stroke-width="2"/>
    <line x1="40" y1="50" x2="60" y2="50" stroke="#3A2A1A" stroke-width="1"/>
    <line x1="42" y1="42" x2="58" y2="42" stroke="#3A2A1A" stroke-width="1"/>
    <line x1="42" y1="58" x2="58" y2="58" stroke="#3A2A1A" stroke-width="1"/>
  </g>
  
  <!-- Door North -->
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="-2" x2="50" y2="12" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="5" x2="62" y2="5" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="6" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="6" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Door South -->
  <g filter="url(#softShadow)">
    <rect x="36" y="88" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="90" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="90" x2="50" y2="104" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="97" x2="62" y2="97" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="90" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="94" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="94" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Symbol I -->
  <g filter="url(#softShadow)">
    <circle cx="85" cy="15" r="8" fill="#3D7AB8" stroke="#2D5A98" stroke-width="1"/>
    <circle cx="85" cy="15" r="6" fill="#5A9AD8" opacity="0.5"/>
    <text x="85" y="19" text-anchor="middle" font-size="11" fill="#FFF" font-weight="bold" font-family="serif">I</text>
  </g>
</svg>