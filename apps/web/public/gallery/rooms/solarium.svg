<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6B7B6B"/><stop offset="50%" style="stop-color:#4A5A4A"/><stop offset="100%" style="stop-color:#2A3A2A"/></linearGradient>
    <pattern id="tilePattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><rect width="20" height="20" fill="url(#floorGrad)"/><line x1="10" y1="0" x2="10" y2="20" stroke="#5A6A5A" stroke-width="0.5" opacity="0.5"/><line x1="0" y1="10" x2="20" y2="10" stroke="#5A6A5A" stroke-width="0.5" opacity="0.5"/></pattern>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#5A3A1A"/><stop offset="50%" style="stop-color:#7B5B3B"/><stop offset="100%" style="stop-color:#4A2A0A"/></linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#FFD700"/><stop offset="50%" style="stop-color:#B8860B"/><stop offset="100%" style="stop-color:#D4AF37"/></linearGradient>
    <linearGradient id="plantGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#2F5F2F"/><stop offset="100%" style="stop-color:#0F3F0F"/></linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" style="stop-color:#FFF8DC;stop-opacity:0.8"/><stop offset="100%" style="stop-color:#FFD700;stop-opacity:0"/></radialGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/><feOffset in="blur" dx="2" dy="2" result="offsetBlur"/><feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer><feMerge><feMergeNode in="offsetBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="8" y="8" width="84" height="84" fill="url(#tilePattern)" stroke="#1A2A1A" stroke-width="2"/>
  <rect x="10" y="10" width="80" height="80" fill="none" stroke="#3A4A3A" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Door North ONLY -->
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="-2" x2="50" y2="12" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="5" x2="62" y2="5" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="6" r="2" fill="url(#goldTrim)"/>
    <circle cx="55" cy="6" r="1" fill="#B8860B"/>
  </g>
  
  <!-- Plants -->
  <circle cx="30" cy="60" r="15" fill="url(#plantGrad)" filter="url(#softShadow)"/>
  <circle cx="70" cy="35" r="12" fill="#1F4F1F" filter="url(#softShadow)"/>
  <circle cx="22" cy="72" r="14" fill="#0F2F0F" filter="url(#softShadow)"/>
  <circle cx="78" cy="70" r="13" fill="#1F4F1F" filter="url(#softShadow)"/>
  <circle cx="50" cy="50" r="20" fill="url(#sunGlow)" opacity="0.4"/>
  <circle cx="12" cy="12" r="2" fill="#3A4A3A" opacity="0.4"/>
  <circle cx="88" cy="12" r="2" fill="#3A4A3A" opacity="0.4"/>
  <circle cx="12" cy="88" r="2" fill="#3A4A3A" opacity="0.4"/>
  <circle cx="88" cy="88" r="2" fill="#3A4A3A" opacity="0.4"/>
  
  <!-- Outside Indicator (Sun) -->
  <g filter="url(#softShadow)">
    <circle cx="85" cy="85" r="8" fill="#FFD700" stroke="#FFA500" stroke-width="1"/>
    <line x1="85" y1="75" x2="85" y2="72" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="85" y1="95" x2="85" y2="98" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="75" y1="85" x2="72" y2="85" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="95" y1="85" x2="98" y2="85" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="78" y1="78" x2="76" y2="76" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="92" y1="78" x2="94" y2="76" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="78" y1="92" x2="76" y2="94" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="92" y1="92" x2="94" y2="94" stroke="#FFD700" stroke-width="1.5"/>
  </g>
</svg>
