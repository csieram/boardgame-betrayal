<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#5A5A4A"/><stop offset="100%" style="stop-color:#2A2A1A"/></linearGradient>
    <pattern id="tilePattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><rect width="20" height="20" fill="url(#floorGrad)"/><line x1="0" y1="0" x2="0" y2="20" stroke="#3A3A2A" stroke-width="0.5"/><line x1="0" y1="0" x2="20" y2="0" stroke="#3A3A2A" stroke-width="0.5"/></pattern>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#5A3A1A"/><stop offset="50%" style="stop-color:#7B5B3B"/><stop offset="100%" style="stop-color:#4A2A0A"/></linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#FFD700"/><stop offset="100%" style="stop-color:#B8860B"/></linearGradient>
    <linearGradient id="counterGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#7B7B6B"/><stop offset="100%" style="stop-color:#4A4A3A"/></linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceAlpha" stdDeviation="2"/><feOffset dx="2" dy="2"/><feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="8" y="8" width="84" height="84" fill="url(#tilePattern)" stroke="#1A1A0A" stroke-width="2"/>
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1"/>
    <circle cx="55" cy="6" r="2" fill="url(#goldTrim)"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="36" y="88" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="90" width="24" height="14" fill="url(#doorWood)"/>
    <rect x="38" y="90" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1"/>
    <circle cx="55" cy="94" r="2" fill="url(#goldTrim)"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="88" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <rect x="90" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1"/>
    <circle cx="96" cy="55" r="2" fill="url(#goldTrim)"/>
  </g>
  <rect x="15" y="15" width="70" height="18" fill="url(#counterGrad)" stroke="#2A2A1A" filter="url(#softShadow)"/>
  <rect x="20" y="18" width="20" height="12" fill="#333" stroke="#111" filter="url(#softShadow)"/>
  <circle cx="26" cy="24" r="3" fill="#555"/>
  <circle cx="34" cy="24" r="3" fill="#555"/>
  <rect x="55" y="18" width="25" height="12" fill="#4682B4" stroke="#2E5A8B" opacity="0.7"/>
  <rect x="32" y="45" width="36" height="24" fill="#8B4513" stroke="#654321" rx="2" filter="url(#softShadow)"/>
  <rect x="25" y="50" width="7" height="12" fill="#654321" filter="url(#softShadow)"/>
