<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="300" height="300">
  <defs>
    <!-- 天空背景 -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="50%" style="stop-color:#B0E0E6"/>
      <stop offset="100%" style="stop-color:#E0F6FF"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5A3A1A"/>
      <stop offset="50%" style="stop-color:#7B5B3B"/>
      <stop offset="100%" style="stop-color:#4A2A0A"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="2"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 天空背景 (屋頂房間特色) -->
  <rect x="8" y="8" width="84" height="84" fill="url(#skyGrad)" stroke="#5A8FA8" stroke-width="2"/>
  
  <!-- 地板 (屋頂平台) -->
  <rect x="10" y="60" width="80" height="30" fill="#6A5A4A" stroke="#4A3A2A" stroke-width="1"/>
  <line x1="10" y1="67" x2="90" y2="67" stroke="#5A4A3A" stroke-width="1"/>
  <line x1="10" y1="75" x2="90" y2="75" stroke="#5A4A3A" stroke-width="1"/>
  <line x1="10" y1="83" x2="90" y2="83" stroke="#5A4A3A" stroke-width="1"/>
  
  <!-- 門: 東 -->
  <g filter="url(#softShadow)">
    <rect x="88" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="90" y1="50" x2="102" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <circle cx="96" cy="55" r="2" fill="#8B7355"/>
  </g>
  
  <!-- 門: 西 -->
  <g filter="url(#softShadow)">
    <rect x="-4" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="-2" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="-2" y1="50" x2="10" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <circle cx="4" cy="55" r="2" fill="#8B7355"/>
  </g>
  
  <!-- 鴿舍塔 -->
  <rect x="30" y="20" width="40" height="40" fill="#5A5A6A" stroke="#3A3A4A" stroke-width="2"/>
  
  <!-- 鴿舍開口 -->
  <rect x="35" y="30" width="8" height="10" fill="#2A2A3A"/>
  <rect x="47" y="30" width="8" height="10" fill="#2A2A3A"/>
  <rect x="59" y="30" width="8" height="10" fill="#2A2A3A"/>
  
  <!-- 鴿子 -->
  <ellipse cx="39" cy="28" rx="3" ry="2" fill="#FFF"/>
  <ellipse cx="51" cy="26" rx="3" ry="2" fill="#FFF"/>
  <ellipse cx="63" cy="28" rx="3" ry="2" fill="#FFF"/>
  <ellipse cx="45" cy="22" rx="3" ry="2" fill="#DDD"/>
  <ellipse cx="57" cy="20" rx="3" ry="2" fill="#DDD"/>
  
  <!-- 屋頂 -->
  <polygon points="25,20 50,5 75,20" fill="#4A4A5A" stroke="#2A2A3A" stroke-width="2"/>
  
  <!-- 預兆符號 O -->
  <circle cx="85" cy="15" r="6" fill="#8B4DA8"/>
  <text x="85" y="18" text-anchor="middle" font-size="8" fill="#FFF" font-family="Arial">O</text>
</svg>