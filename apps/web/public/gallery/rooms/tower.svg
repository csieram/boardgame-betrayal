<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355"/>
      <stop offset="100%" style="stop-color:#5A4A3A"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B4B2A"/>
      <stop offset="50%" style="stop-color:#8B6B4B"/>
      <stop offset="100%" style="stop-color:#4A2A0A"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="3" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#2A1A0A" stroke-width="2"/>
  
  <!-- Tower walls (angled) -->
  <polygon points="50,12 88,35 88,88 12,88 12,35" fill="#6B7B8B" stroke="#4A5B6B" stroke-width="2"/>
  <polygon points="50,18 80,38 80,82 20,82 20,38" fill="#5A6B7B" opacity="0.4"/>
  
  <!-- Tall windows -->
  <g filter="url(#softShadow)">
    <rect x="30" y="30" width="14" height="25" fill="#87CEEB" opacity="0.5" stroke="#4A5B6B" stroke-width="2"/>
    <line x1="37" y1="30" x2="37" y2="55" stroke="#4A5B6B" stroke-width="1"/>
    <line x1="30" y1="42" x2="44" y2="42" stroke="#4A5B6B" stroke-width="1"/>
    
    <rect x="56" y="30" width="14" height="25" fill="#87CEEB" opacity="0.5" stroke="#4A5B6B" stroke-width="2"/>
    <line x1="63" y1="30" x2="63" y2="55" stroke="#4A5B6B" stroke-width="1"/>
    <line x1="56" y1="42" x2="70" y2="42" stroke="#4A5B6B" stroke-width="1"/>
  </g>
  
  <!-- Window seat -->
  <rect x="28" y="58" width="18" height="8" fill="#5A4A3A" stroke="#4A3A2A"/>
  <rect x="54" y="58" width="18" height="8" fill="#5A4A3A" stroke="#4A3A2A"/>
  
  <!-- Small table -->
  <g filter="url(#softShadow)">
    <rect x="42" y="70" width="16" height="10" fill="#6B5344" stroke="#4A3324" stroke-width="1"/>
    <line x1="46" y1="80" x2="46" y2="86" stroke="#4A3324" stroke-width="2"/>
    <line x1="54" y1="80" x2="54" y2="86" stroke="#4A3324" stroke-width="2"/>
  </g>
  
  <!-- Door East -->
  <g filter="url(#softShadow)">
    <rect x="88" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="90" y1="50" x2="102" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="96" y1="38" x2="96" y2="62" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="90" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="96" cy="55" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="96" cy="55" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Door West -->
  <g filter="url(#softShadow)">
    <rect x="-4" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="-2" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="-2" y1="50" x2="10" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="4" y1="38" x2="4" y2="62" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="-2" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="4" cy="55" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="4" cy="55" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Symbol E -->
  <g filter="url(#softShadow)">
    <circle cx="85" cy="15" r="8" fill="#4A9A4A" stroke="#3A8A3A" stroke-width="1"/>
    <circle cx="85" cy="15" r="6" fill="#6ABA6A" opacity="0.5"/>
    <text x="85" y="19" text-anchor="middle" font-size="11" fill="#FFF" font-weight="bold" font-family="serif">E</text>
  </g>
</svg>
