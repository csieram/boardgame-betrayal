<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6A5A5A"/>
      <stop offset="100%" style="stop-color:#4A3A3A"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A2A0A"/>
      <stop offset="50%" style="stop-color:#6B4B2B"/>
      <stop offset="100%" style="stop-color:#3A1A00"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="3" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Floor -->
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#2A1A1A" stroke-width="2"/>
  
  <!-- INTERIOR: Drawing Room - Elegant room with easel and art supplies -->
  <!-- Large window (since it has window property) -->
  <g filter="url(#softShadow)">
    <rect x="35" y="12" width="30" height="20" fill="#87CEEB" opacity="0.3" stroke="#5A4A3A" stroke-width="2"/>
    <line x1="50" y1="12" x2="50" y2="32" stroke="#5A4A3A" stroke-width="1"/>
    <line x1="35" y1="22" x2="65" y2="22" stroke="#5A4A3A" stroke-width="1"/>
    <!-- Curtains -->
    <path d="M35,12 L35,32 L45,32 L40,12 Z" fill="#8B4B4B" opacity="0.6"/>
    <path d="M65,12 L65,32 L55,32 L60,12 Z" fill="#8B4B4B" opacity="0.6"/>
  </g>
  
  <!-- Easel with canvas -->
  <g filter="url(#softShadow)">
    <!-- Easel legs -->
    <line x1="30" y1="75" x2="25" y2="45" stroke="#5A4A3A" stroke-width="3"/>
    <line x1="30" y1="75" x2="35" y2="45" stroke="#5A4A3A" stroke-width="3"/>
    <line x1="30" y1="75" x2="30" y2="45" stroke="#5A4A3A" stroke-width="2"/>
    <!-- Canvas -->
    <rect x="22" y="35" width="16" height="20" fill="#FFF8DC" stroke="#5A4A3A" stroke-width="1"/>
    <!-- Painting on canvas (abstract) -->
    <circle cx="30" cy="42" r="4" fill="#FF6B6B" opacity="0.7"/>
    <rect x="25" y="48" width="10" height="4" fill="#4ECDC4" opacity="0.7"/>
  </g>
  
  <!-- Art supplies table -->
  <g filter="url(#softShadow)">
    <rect x="60" y="55" width="25" height="15" fill="#6B5B4B" stroke="#4A3A2A" stroke-width="1"/>
    <!-- Paint tubes -->
    <rect x="62" y="52" width="4" height="6" fill="#FF6B6B" stroke="#CC5555" stroke-width="0.5"/>
    <rect x="68" y="52" width="4" height="6" fill="#4ECDC4" stroke="#3DBBB5" stroke-width="0.5"/>
    <rect x="74" y="52" width="4" height="6" fill="#FFE66D" stroke="#CCB855" stroke-width="0.5"/>
    <!-- Palette -->
    <ellipse cx="72" cy="62" rx="6" ry="4" fill="#DEB887" stroke="#8B7355" stroke-width="1"/>
    <circle cx="70" cy="61" r="1.5" fill="#FF6B6B"/>
    <circle cx="74" cy="61" r="1.5" fill="#4ECDC4"/>
    <circle cx="72" cy="63" r="1.5" fill="#FFE66D"/>
  </g>
  
  <!-- Finished paintings on wall -->
  <g filter="url(#softShadow)">
    <rect x="70" y="25" width="12" height="15" fill="#FFF8DC" stroke="#5A4A3A" stroke-width="1"/>
    <rect x="72" y="27" width="8" height="6" fill="#87CEEB" opacity="0.5"/>
    <circle cx="76" cy="35" r="2" fill="#FFE66D"/>
  </g>
  
  <!-- Chair -->
  <g filter="url(#softShadow)">
    <rect x="45" y="60" width="12" height="15" fill="#7B6B5B" stroke="#5A4A3A" stroke-width="1"/>
    <rect x="47" y="55" width="8" height="8" fill="#8B7B6B" stroke="#5A4A3A" stroke-width="1"/>
  </g>
  
  <!-- Door North -->
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="-2" x2="50" y2="12" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="5" x2="62" y2="5" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="6" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="6" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Door South -->
  <g filter="url(#softShadow)">
    <rect x="36" y="88" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="90" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="90" x2="50" y2="104" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="97" x2="62" y2="97" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="90" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="94" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="94" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Door East -->
  <g filter="url(#softShadow)">
    <rect x="88" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="90" y1="50" x2="102" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="96" y1="38" x2="96" y2="62" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="90" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="96" cy="55" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="96" cy="55" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Door West -->
  <g filter="url(#softShadow)">
    <rect x="-4" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="-2" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="-2" y1="50" x2="10" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="4" y1="38" x2="4" y2="62" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="-2" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="4" cy="55" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="4" cy="55" r="1.5" fill="#B8860B"/>
  </g>
</svg>