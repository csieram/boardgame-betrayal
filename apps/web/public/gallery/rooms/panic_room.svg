<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="300" height="300">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A5A5A"/>
      <stop offset="100%" style="stop-color:#2A3A3A"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5A3A1A"/>
      <stop offset="50%" style="stop-color:#7B5B3B"/>
      <stop offset="100%" style="stop-color:#4A2A0A"/>
    </linearGradient>
    <linearGradient id="steelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7A7A7A"/>
      <stop offset="50%" style="stop-color:#5A5A5A"/>
      <stop offset="100%" style="stop-color:#3A3A3A"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="2"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 地板 -->
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#1A2A2A" stroke-width="2"/>
  
  <!-- 強化鋼板紋理 -->
  <rect x="15" y="15" width="70" height="70" fill="none" stroke="#3A4A4A" stroke-width="1"/>
  <line x1="15" y1="35" x2="85" y2="35" stroke="#3A4A4A" stroke-width="1"/>
  <line x1="15" y1="55" x2="85" y2="55" stroke="#3A4A4A" stroke-width="1"/>
  <line x1="15" y1="75" x2="85" y2="75" stroke="#3A4A4A" stroke-width="1"/>
  <line x1="35" y1="15" x2="35" y2="85" stroke="#3A4A4A" stroke-width="1"/>
  <line x1="55" y1="15" x2="55" y2="85" stroke="#3A4A4A" stroke-width="1"/>
  <line x1="75" y1="15" x2="75" y2="85" stroke="#3A4A4A" stroke-width="1"/>
  
  <!-- 門: 東 -->
  <g filter="url(#softShadow)">
    <rect x="88" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="90" y1="50" x2="102" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <circle cx="96" cy="55" r="2" fill="#8B7355"/>
  </g>
  
  <!-- 中央安全桌 -->
  <rect x="35" y="40" width="30" height="20" fill="url(#steelGrad)" stroke="#2A2A2A" rx="2"/>
  <rect x="38" y="43" width="24" height="14" fill="#4A4A4A" stroke="#2A2A2A"/>
  
  <!-- 控制面板 -->
  <rect x="40" y="45" width="20" height="10" fill="#2A2A2A"/>
  <circle cx="44" cy="50" r="2" fill="#4A9A4A"/>
  <circle cx="50" cy="50" r="2" fill="#9A4A4A"/>
  <circle cx="56" cy="50" r="2" fill="#4A4A9A"/>
  
  <!-- 事件符號 E -->
  <circle cx="85" cy="15" r="6" fill="#4A9A4A"/>
  <text x="85" y="18" text-anchor="middle" font-size="8" fill="#FFF" font-family="Arial">E</text>
  
  <!-- Dumbwaiter 標記 D -->
  <circle cx="15" cy="85" r="6" fill="#8B6914"/>
  <text x="15" y="88" text-anchor="middle" font-size="7" fill="#FFF" font-family="Arial">D</text>
  
  <!-- Teleport 標記 T -->
  <circle cx="85" cy="85" r="6" fill="#4A4A9A"/>
  <text x="85" y="88" text-anchor="middle" font-size="7" fill="#FFF" font-family="Arial">T</text>
</svg>