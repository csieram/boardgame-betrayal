<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B6B5B"/>
      <stop offset="100%" style="stop-color:#4B3B2B"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5A3A2A"/>
      <stop offset="50%" style="stop-color:#7B5B4B"/>
      <stop offset="100%" style="stop-color:#3A1A0A"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="3" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#1A0A00" stroke-width="2"/>
  
  <!-- Large crib -->
  <g filter="url(#softShadow)">
    <rect x="28" y="32" width="44" height="32" fill="#FFB6C1" stroke="#DDA0AA" stroke-width="2" rx="4"/>
    <!-- Crib bars -->
    <line x1="35" y1="32" x2="35" y2="64" stroke="#DDA0AA" stroke-width="2"/>
    <line x1="42" y1="32" x2="42" y2="64" stroke="#DDA0AA" stroke-width="2"/>
    <line x1="50" y1="32" x2="50" y2="64" stroke="#DDA0AA" stroke-width="2"/>
    <line x1="58" y1="32" x2="58" y2="64" stroke="#DDA0AA" stroke-width="2"/>
    <line x1="65" y1="32" x2="65" y2="64" stroke="#DDA0AA" stroke-width="2"/>
    <!-- Mattress -->
    <rect x="32" y="48" width="36" height="12" fill="#FFF" opacity="0.8"/>
    <!-- Pillow -->
    <ellipse cx="38" cy="44" rx="5" ry="3" fill="#FFF"/>
  </g>
  
  <!-- Mobile above crib -->
  <g filter="url(#softShadow)">
    <line x1="50" y1="8" x2="50" y2="22" stroke="#666" stroke-width="1"/>
    <circle cx="50" cy="26" r="3" fill="#FFD700"/>
    <line x1="50" y1="26" x2="40" y2="32" stroke="#666" stroke-width="0.5"/>
    <line x1="50" y1="26" x2="60" y2="32" stroke="#666" stroke-width="0.5"/>
    <circle cx="40" cy="34" r="2" fill="#FF6B6B"/>
    <circle cx="60" cy="34" r="2" fill="#4ECDC4"/>
  </g>
  
  <!-- Toys -->
  <g filter="url(#softShadow)">
    <!-- Teddy bear -->
    <circle cx="22" cy="68" r="6" fill="#8B4513"/>
    <circle cx="18" cy="64" r="3" fill="#8B4513"/>
    <circle cx="26" cy="64" r="3" fill="#8B4513"/>
    <circle cx="20" cy="66" r="1" fill="#000"/>
    <circle cx="24" cy="66" r="1" fill="#000"/>
    <!-- Ball -->
    <circle cx="78" cy="70" r="5" fill="#FFE66D" stroke="#DDD" stroke-width="0.5"/>
    <line x1="75" y1="70" x2="81" y2="70" stroke="#DDD" stroke-width="0.5"/>
  </g>
  
  <!-- Rocking chair -->
  <g filter="url(#softShadow)">
    <path d="M75,55 Q85,50 85,60 Q85,70 75,65" fill="none" stroke="#6B5344" stroke-width="3"/>
    <line x1="78" y1="65" x2="75" y2="72" stroke="#6B5344" stroke-width="2"/>
    <line x1="82" y1="65" x2="85" y2="72" stroke="#6B5344" stroke-width="2"/>
    <path d="M73,72 Q80,75 87,72" fill="none" stroke="#6B5344" stroke-width="2"/>
  </g>
  
  <!-- Door North -->
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="-2" x2="50" y2="12" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="5" x2="62" y2="5" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="6" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="6" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Door East -->
  <g filter="url(#softShadow)">
    <rect x="88" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="90" y1="50" x2="102" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="96" y1="38" x2="96" y2="62" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="90" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="96" cy="55" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="96" cy="55" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Symbol O -->
  <g filter="url(#softShadow)">
    <circle cx="85" cy="15" r="8" fill="#8B4DA8" stroke="#6B2D88" stroke-width="1"/>
    <circle cx="85" cy="15" r="6" fill="#AB6DC8" opacity="0.5"/>
    <text x="85" y="19" text-anchor="middle" font-size="11" fill="#FFF" font-weight="bold" font-family="serif">O</text>
  </g>
</svg>
