<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5A5A5A"/>
      <stop offset="100%" style="stop-color:#3A3A3A"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A2A0A"/>
      <stop offset="50%" style="stop-color:#6B4B2B"/>
      <stop offset="100%" style="stop-color:#3A1A00"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="3" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Simple floor -->
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#1A0A00" stroke-width="2"/>
  
  <!-- ENHANCED INTERIOR: Arsenal -->
  <!-- Large weapon rack left -->
  <g filter="url(#softShadow)">
    <rect x="12" y="18" width="32" height="28" fill="#4A4A4A" stroke="#333" stroke-width="2" rx="2"/>
    <line x1="16" y1="25" x2="40" y2="25" stroke="#666" stroke-width="3"/>
    <line x1="16" y1="35" x2="40" y2="35" stroke="#666" stroke-width="3"/>
    <!-- Swords -->
    <line x1="20" y1="25" x2="20" y2="12" stroke="#888" stroke-width="3"/>
    <line x1="28" y1="25" x2="28" y2="10" stroke="#888" stroke-width="3"/>
    <line x1="36" y1="25" x2="36" y2="14" stroke="#888" stroke-width="3"/>
    <!-- Sword hilts -->
    <rect x="18" y="20" width="4" height="3" fill="#444"/>
    <rect x="26" y="18" width="4" height="3" fill="#444"/>
    <rect x="34" y="21" width="4" height="3" fill="#444"/>
  </g>
  
  <!-- Large weapon rack right -->
  <g filter="url(#softShadow)">
    <rect x="56" y="18" width="32" height="28" fill="#4A4A4A" stroke="#333" stroke-width="2" rx="2"/>
    <line x1="60" y1="25" x2="84" y2="25" stroke="#666" stroke-width="3"/>
    <line x1="60" y1="35" x2="84" y2="35" stroke="#666" stroke-width="3"/>
    <!-- Spears -->
    <line x1="64" y1="25" x2="64" y2="10" stroke="#888" stroke-width="2"/>
    <line x1="72" y1="25" x2="72" y2="8" stroke="#888" stroke-width="2"/>
    <line x1="80" y1="25" x2="80" y2="12" stroke="#888" stroke-width="2"/>
  </g>
  
  <!-- Large shield on wall -->
  <g filter="url(#softShadow)">
    <circle cx="28" cy="58" r="12" fill="#555" stroke="#444" stroke-width="2"/>
    <line x1="28" y1="46" x2="28" y2="70" stroke="#444" stroke-width="2"/>
    <line x1="16" y1="58" x2="40" y2="58" stroke="#444" stroke-width="2"/>
    <circle cx="28" cy="58" r="4" fill="#333"/>
  </g>
  
  <!-- Axe on ground -->
  <g filter="url(#softShadow)">
    <rect x="60" y="55" width="5" height="20" fill="#555" transform="rotate(-20 62 65)"/>
    <rect x="55" y="60" width="14" height="8" fill="#666" transform="rotate(-20 62 64)"/>
  </g>
  
  <!-- Sword on ground -->
  <g filter="url(#softShadow)">
    <line x1="75" y1="70" x2="88" y2="55" stroke="#888" stroke-width="3"/>
    <rect x="72" y="68" width="6" height="3" fill="#444" transform="rotate(45 75 69)"/>
  </g>
  
  <!-- Door South -->
  <g filter="url(#softShadow)">
    <rect x="36" y="88" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="90" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="90" x2="50" y2="104" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="97" x2="62" y2="97" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="90" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="96" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="96" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Door East -->
  <g filter="url(#softShadow)">
    <rect x="88" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="90" y1="50" x2="102" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="96" y1="38" x2="96" y2="62" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="90" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="96" cy="55" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="96" cy="55" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Symbol I -->
  <g filter="url(#softShadow)">
    <circle cx="85" cy="15" r="8" fill="#3D7AB8" stroke="#2D5A98" stroke-width="1"/>
    <circle cx="85" cy="15" r="6" fill="#5A9AD8" opacity="0.5"/>
    <text x="85" y="19" text-anchor="middle" font-size="11" fill="#FFF" font-weight="bold" font-family="serif">I</text>
  </g>
</svg>
