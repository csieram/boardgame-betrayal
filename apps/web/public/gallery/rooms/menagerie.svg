<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="300" height="300">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A5A4A"/>
      <stop offset="100%" style="stop-color:#2A3A2A"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5A3A1A"/>
      <stop offset="50%" style="stop-color:#7B5B3B"/>
      <stop offset="100%" style="stop-color:#4A2A0A"/>
    </linearGradient>
    <linearGradient id="cageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6A6A6A"/>
      <stop offset="100%" style="stop-color:#4A4A4A"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="2"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 地板 -->
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#1A2A1A" stroke-width="2"/>
  
  <!-- 門: 東 -->
  <g filter="url(#softShadow)">
    <rect x="88" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="90" y1="50" x2="102" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <circle cx="96" cy="55" r="2" fill="#8B7355"/>
  </g>
  
  <!-- 門: 西 -->
  <g filter="url(#softShadow)">
    <rect x="-4" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="-2" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="-2" y1="50" x2="10" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <circle cx="4" cy="55" r="2" fill="#8B7355"/>
  </g>
  
  <!-- 籠子 1 (左上) -->
  <rect x="15" y="15" width="22" height="25" fill="none" stroke="url(#cageGrad)" stroke-width="2"/>
  <line x1="20" y1="15" x2="20" y2="40" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="26" y1="15" x2="26" y2="40" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="32" y1="15" x2="32" y2="40" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="15" y1="22" x2="37" y2="22" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="15" y1="29" x2="37" y2="29" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="15" y1="36" x2="37" y2="36" stroke="#5A5A5A" stroke-width="1"/>
  
  <!-- 籠子 2 (右上) -->
  <rect x="58" y="15" width="22" height="25" fill="none" stroke="url(#cageGrad)" stroke-width="2"/>
  <line x1="63" y1="15" x2="63" y2="40" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="69" y1="15" x2="69" y2="40" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="75" y1="15" x2="75" y2="40" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="58" y1="22" x2="80" y2="22" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="58" y1="29" x2="80" y2="29" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="58" y1="36" x2="80" y2="36" stroke="#5A5A5A" stroke-width="1"/>
  
  <!-- 籠子 3 (下方大籠子) -->
  <rect x="25" y="50" width="50" height="35" fill="none" stroke="url(#cageGrad)" stroke-width="2"/>
  <line x1="32" y1="50" x2="32" y2="85" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="39" y1="50" x2="39" y2="85" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="46" y1="50" x2="46" y2="85" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="53" y1="50" x2="53" y2="85" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="60" y1="50" x2="60" y2="85" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="67" y1="50" x2="67" y2="85" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="25" y1="58" x2="75" y2="58" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="25" y1="66" x2="75" y2="66" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="25" y1="74" x2="75" y2="74" stroke="#5A5A5A" stroke-width="1"/>
  
  <!-- 事件符號 E -->
  <circle cx="85" cy="15" r="6" fill="#4A9A4A"/>
  <text x="85" y="18" text-anchor="middle" font-size="8" fill="#FFF" font-family="Arial">E</text>
  
  <!-- Dumbwaiter 標記 D -->
  <circle cx="15" cy="85" r="6" fill="#8B6914"/>
  <text x="15" y="88" text-anchor="middle" font-size="7" fill="#FFF" font-family="Arial">D</text>
</svg>