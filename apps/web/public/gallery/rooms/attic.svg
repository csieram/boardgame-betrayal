<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B6B5B"/>
      <stop offset="100%" style="stop-color:#4B3B2B"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5A3A2A"/>
      <stop offset="50%" style="stop-color:#7B5B4B"/>
      <stop offset="100%" style="stop-color:#3A1A0A"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="3" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#1A0A00" stroke-width="2"/>
  
  <!-- Sloped ceiling lines -->
  <line x1="8" y1="25" x2="50" y2="8" stroke="#3A2A1A" stroke-width="1" opacity="0.5"/>
  <line x1="92" y1="25" x2="50" y2="8" stroke="#3A2A1A" stroke-width="1" opacity="0.5"/>
  
  <!-- Large trunk 1 -->
  <g filter="url(#softShadow)">
    <rect x="15" y="35" width="28" height="20" fill="#6B5344" stroke="#4A3324" stroke-width="2" rx="2"/>
    <line x1="15" y1="45" x2="43" y2="45" stroke="#4A3324" stroke-width="1"/>
    <rect x="27" y="38" width="4" height="4" fill="#444" rx="1"/>
  </g>
  
  <!-- Large trunk 2 -->
  <g filter="url(#softShadow)">
    <rect x="50" y="40" width="32" height="22" fill="#5A4A3A" stroke="#3A2A1A" stroke-width="2" rx="2"/>
    <line x1="50" y1="51" x2="82" y2="51" stroke="#3A2A1A" stroke-width="1"/>
    <rect x="64" y="44" width="4" height="4" fill="#444" rx="1"/>
  </g>
  
  <!-- Old furniture -->
  <g filter="url(#softShadow)">
    <rect x="20" y="62" width="20" height="18" fill="#4A4A4A" stroke="#2A2A2A" stroke-width="1" rx="1"/>
    <rect x="22" y="65" width="16" height="10" fill="#3A3A3A"/>
  </g>
  
  <!-- Dust/cobwebs -->
  <path d="M12,15 Q15,20 12,25" fill="none" stroke="#666" stroke-width="0.5" opacity="0.4"/>
  <path d="M88,18 Q85,23 88,28" fill="none" stroke="#666" stroke-width="0.5" opacity="0.4"/>
  
  <!-- Small window -->
  <rect x="42" y="48" width="8" height="10" fill="#87CEEB" opacity="0.3" stroke="#4A5B6B" stroke-width="1"/>
  <line x1="46" y1="48" x2="46" y2="58" stroke="#4A5B6B" stroke-width="0.5"/>
  <line x1="42" y1="53" x2="50" y2="53" stroke="#4A5B6B" stroke-width="0.5"/>
  
  <!-- Door South -->
  <g filter="url(#softShadow)">
    <rect x="36" y="88" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="90" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="90" x2="50" y2="104" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="97" x2="62" y2="97" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="90" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="94" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="94" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Symbol I -->
  <g filter="url(#softShadow)">
    <circle cx="85" cy="15" r="8" fill="#3D7AB8" stroke="#2D5A98" stroke-width="1"/>
    <circle cx="85" cy="15" r="6" fill="#5A9AD8" opacity="0.5"/>
    <text x="85" y="19" text-anchor="middle" font-size="11" fill="#FFF" font-weight="bold" font-family="serif">I</text>
  </g>
</svg>
