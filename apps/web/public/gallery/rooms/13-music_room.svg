<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6B5B4B"/><stop offset="100%" style="stop-color:#3A2A1A"/></linearGradient>
    <pattern id="woodPattern" x="0" y="0" width="10" height="40" patternUnits="userSpaceOnUse"><rect width="10" height="40" fill="url(#floorGrad)"/><line x1="0" y1="0" x2="0" y2="40" stroke="#2A1A0A" stroke-width="0.3"/></pattern>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#5A3A1A"/><stop offset="50%" style="stop-color:#7B5B3B"/><stop offset="100%" style="stop-color:#4A2A0A"/></linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#FFD700"/><stop offset="100%" style="stop-color:#B8860B"/></linearGradient>
    <linearGradient id="pianoGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#222"/><stop offset="50%" style="stop-color:#000"/><stop offset="100%" style="stop-color:#333"/></linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceAlpha" stdDeviation="2"/><feOffset dx="2" dy="2"/><feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="8" y="8" width="84" height="84" fill="url(#woodPattern)" stroke="#1A0A00" stroke-width="2"/>
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1"/>
    <circle cx="55" cy="6" r="2" fill="url(#goldTrim)"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="-4" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="-2" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <rect x="-2" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1"/>
    <circle cx="4" cy="55" r="2" fill="url(#goldTrim)"/>
  </g>
  <rect x="25" y="60" width="50" height="25" fill="url(#pianoGrad)" stroke="#111" filter="url(#softShadow)"/>
  <rect x="30" y="35" width="40" height="25" fill="#000" stroke="#333" stroke-width="2" filter="url(#softShadow)"/>
  <line x1="35" y1="40" x2="65" y2="55" stroke="#FFF" opacity="0.2"/>
  <ellipse cx="35" cy="25" rx="8" ry="5" fill="#FFD700" opacity="0.2" filter="url(#softShadow)"/>
</svg>
