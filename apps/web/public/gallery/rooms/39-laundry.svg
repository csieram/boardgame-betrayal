<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#5A5A6A"/><stop offset="50%" style="stop-color:#3A3A4A"/><stop offset="100%" style="stop-color:#1A1A2A"/></linearGradient>
    <pattern id="tilePattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><rect width="20" height="20" fill="url(#floorGrad)"/><line x1="0" y1="0" x2="0" y2="20" stroke="#2A2A3A" stroke-width="0.5" opacity="0.5"/><line x1="0" y1="0" x2="20" y2="0" stroke="#2A2A3A" stroke-width="0.5" opacity="0.5"/></pattern>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#5A3A1A"/><stop offset="50%" style="stop-color:#7B5B3B"/><stop offset="100%" style="stop-color:#4A2A0A"/></linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#FFD700"/><stop offset="50%" style="stop-color:#B8860B"/><stop offset="100%" style="stop-color:#D4AF37"/></linearGradient>
    <linearGradient id="machineGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#FFF"/><stop offset="100%" style="stop-color:#E0E0E0"/></linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/><feOffset in="blur" dx="2" dy="2" result="offsetBlur"/><feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer><feMerge><feMergeNode in="offsetBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="8" y="8" width="84" height="84" fill="url(#tilePattern)" stroke="#0A0A1A" stroke-width="2"/>
  <rect x="10" y="10" width="80" height="80" fill="none" stroke="#1A1A2A" stroke-width="0.5" opacity="0.3"/>
  <g filter="url(#softShadow)">
    <rect x="36" y="88" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="90" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="90" x2="50" y2="104" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="97" x2="62" y2="97" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="90" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="94" r="2" fill="url(#goldTrim)"/>
    <circle cx="55" cy="94" r="1" fill="#B8860B"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="88" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="90" y1="50" x2="102" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="96" y1="38" x2="96" y2="62" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="90" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="96" cy="55" r="2" fill="url(#goldTrim)"/>
    <circle cx="96" cy="55" r="1" fill="#B8860B"/>
  </g>
  <rect x="20" y="25" width="25" height="30" fill="url(#machineGrad)" stroke="#C0C0C0" filter="url(#softShadow)"/>
  <circle cx="32" cy="40" r="8" fill="#87CEEB" opacity="0.3"/>
  <rect x="55" y="25" width="25" height="30" fill="url(#machineGrad)" stroke="#C0C0C0" filter="url(#softShadow)"/>
  <circle cx="67" cy="40" r="8" fill="#87CEEB" opacity="0.3"/>
  <rect x="30" y="60" width="40" height="20" fill="#4A4A4A" filter="url(#softShadow)"/>
</svg>
