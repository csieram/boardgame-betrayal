<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355"/>
      <stop offset="100%" style="stop-color:#5A4A3A"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B4B2A"/>
      <stop offset="50%" style="stop-color:#8B6B4B"/>
      <stop offset="100%" style="stop-color:#4A2A0A"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="3" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#2A1A0A" stroke-width="2"/>
  
  <!-- Gym equipment -->
  <g filter="url(#softShadow)">
    <!-- Pommel horse -->
    <rect x="20" y="30" width="25" height="12" fill="#8B4513" stroke="#654321" stroke-width="1" rx="2"/>
    <line x1="25" y1="42" x2="25" y2="50" stroke="#444" stroke-width="3"/>
    <line x1="40" y1="42" x2="40" y2="50" stroke="#444" stroke-width="3"/>
    <!-- Parallel bars -->
    <rect x="55" y="28" width="28" height="10" fill="#8B4513" stroke="#654321" stroke-width="1" rx="2"/>
    <line x1="60" y1="38" x2="60" y2="48" stroke="#444" stroke-width="3"/>
    <line x1="78" y1="38" x2="78" y2="48" stroke="#444" stroke-width="3"/>
  </g>
  
  <!-- Exercise mat -->
  <rect x="35" y="55" width="30" height="15" fill="#2F5F2F" stroke="#1F4F1F" stroke-width="1" rx="2"/>
  
  <!-- Weights -->
  <g filter="url(#softShadow)">
    <rect x="15" y="60" width="8" height="12" fill="#444" stroke="#222" stroke-width="1" rx="1"/>
    <rect x="13" y="62" width="12" height="3" fill="#333"/>
    <rect x="13" y="67" width="12" height="3" fill="#333"/>
  </g>
  
  <!-- Door South -->
  <g filter="url(#softShadow)">
    <rect x="36" y="88" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="90" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="90" x2="50" y2="104" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="97" x2="62" y2="97" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="90" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="96" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="96" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Door East -->
  <g filter="url(#softShadow)">
    <rect x="88" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="90" y1="50" x2="102" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="96" y1="38" x2="96" y2="62" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="90" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="96" cy="55" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="96" cy="55" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Symbol O (Omen) -->
  <g filter="url(#softShadow)">
    <circle cx="85" cy="15" r="8" fill="#8B4DA8" stroke="#6B2D88" stroke-width="1"/>
    <circle cx="85" cy="15" r="6" fill="#AB6DC8" opacity="0.5"/>
    <text x="85" y="19" text-anchor="middle" font-size="11" fill="#FFF" font-weight="bold" font-family="serif">O</text>
  </g>
  
  <!-- Speed boost indicator - running figure -->
  <g transform="translate(12, 82)">
    <circle cx="4" cy="3" r="2" fill="#32CD32" stroke="#228B22" stroke-width="0.5"/>
    <line x1="4" y1="5" x2="4" y2="9" stroke="#32CD32" stroke-width="1.5"/>
    <line x1="4" y1="6" x2="2" y2="8" stroke="#32CD32" stroke-width="1"/>
    <line x1="4" y1="6" x2="6" y2="8" stroke="#32CD32" stroke-width="1"/>
    <line x1="4" y1="9" x2="2" y2="11" stroke="#32CD32" stroke-width="1"/>
    <line x1="4" y1="9" x2="7" y2="11" stroke="#32CD32" stroke-width="1"/>
    <!-- Speed lines -->
    <line x1="8" y1="3" x2="11" y2="3" stroke="#32CD32" stroke-width="1"/>
    <line x1="8" y1="6" x2="11" y2="6" stroke="#32CD32" stroke-width="1"/>
  </g>
</svg>
