<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="300" height="300">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3A3A4A"/>
      <stop offset="100%" style="stop-color:#1A1A2A"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5A3A1A"/>
      <stop offset="50%" style="stop-color:#7B5B3B"/>
      <stop offset="100%" style="stop-color:#4A2A0A"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="2"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 地板 -->
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#0A0A1A" stroke-width="2"/>
  
  <!-- 地板石磚 -->
  <line x1="8" y1="33" x2="92" y2="33" stroke="#2A2A3A" stroke-width="1"/>
  <line x1="8" y1="58" x2="92" y2="58" stroke="#2A2A3A" stroke-width="1"/>
  <line x1="8" y1="83" x2="92" y2="83" stroke="#2A2A3A" stroke-width="1"/>
  <line x1="33" y1="8" x2="33" y2="92" stroke="#2A2A3A" stroke-width="1"/>
  <line x1="58" y1="8" x2="58" y2="92" stroke="#2A2A3A" stroke-width="1"/>
  <line x1="83" y1="8" x2="83" y2="92" stroke="#2A2A3A" stroke-width="1"/>
  
  <!-- 門: 南 -->
  <g filter="url(#softShadow)">
    <rect x="36" y="88" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="90" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="90" x2="50" y2="104" stroke="#2A1A0A" stroke-width="0.5"/>
    <circle cx="55" cy="94" r="2" fill="#8B7355"/>
  </g>
  
  <!-- 門: 東 -->
  <g filter="url(#softShadow)">
    <rect x="88" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="90" y1="50" x2="102" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <circle cx="96" cy="55" r="2" fill="#8B7355"/>
  </g>
  
  <!-- 儲物架 -->
  <rect x="15" y="15" width="25" height="40" fill="#4A4A3A" stroke="#2A2A1A" stroke-width="1"/>
  <line x1="15" y1="25" x2="40" y2="25" stroke="#2A2A1A" stroke-width="1"/>
  <line x1="15" y1="35" x2="40" y2="35" stroke="#2A2A1A" stroke-width="1"/>
  <line x1="15" y1="45" x2="40" y2="45" stroke="#2A2A1A" stroke-width="1"/>
  
  <!-- 儲物架上的物品 -->
  <rect x="18" y="18" width="8" height="5" fill="#5A4A3A"/>
  <rect x="28" y="18" width="8" height="5" fill="#4A5A4A"/>
  <rect x="18" y="28" width="6" height="5" fill="#6A5A4A"/>
  <rect x="26" y="28" width="10" height="5" fill="#5A5A4A"/>
  <rect x="18" y="38" width="10" height="5" fill="#4A4A5A"/>
  
  <!-- 避風窖門 (厚重鐵門) -->
  <rect x="55" y="20" width="30" height="35" fill="#3A3A4A" stroke="#1A1A2A" stroke-width="2"/>
  <line x1="70" y1="20" x2="70" y2="55" stroke="#1A1A2A" stroke-width="1"/>
  <circle cx="65" cy="38" r="3" fill="#2A2A3A"/>
  <circle cx="75" cy="38" r="3" fill="#2A2A3A"/>
  
  <!-- 物品符號 I -->
  <circle cx="85" cy="15" r="6" fill="#3D7AB8"/>
  <text x="85" y="18" text-anchor="middle" font-size="8" fill="#FFF" font-family="Arial">I</text>
</svg>