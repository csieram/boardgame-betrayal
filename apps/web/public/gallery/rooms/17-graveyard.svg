<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#3A4A3A"/><stop offset="100%" style="stop-color:#0A1A0A"/></linearGradient>
    <pattern id="grassPattern" x="0" y="0" width="15" height="15" patternUnits="userSpaceOnUse"><rect width="15" height="15" fill="url(#floorGrad)"/><circle cx="5" cy="5" r="2" fill="#1F2F1F" opacity="0.4"/></pattern>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#5A3A1A"/><stop offset="50%" style="stop-color:#7B5B3B"/><stop offset="100%" style="stop-color:#4A2A0A"/></linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#FFD700"/><stop offset="100%" style="stop-color:#B8860B"/></linearGradient>
    <linearGradient id="stoneGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#6A6A6A"/><stop offset="100%" style="stop-color:#3A3A3A"/></linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceAlpha" stdDeviation="2"/><feOffset dx="2" dy="2"/><feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="8" y="8" width="84" height="84" fill="url(#grassPattern)" stroke="#0A0F0A" stroke-width="2"/>
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1"/>
    <circle cx="55" cy="6" r="2" fill="url(#goldTrim)"/>
  </g>
  <rect x="15" y="20" width="25" height="35" fill="url(#stoneGrad)" stroke="#1A1A1A" filter="url(#softShadow)"/>
  <rect x="60" y="15" width="25" height="40" fill="url(#stoneGrad)" stroke="#1A1A1A" filter="url(#softShadow)"/>
  <rect x="40" y="60" width="20" height="30" fill="url(#stoneGrad)" stroke="#1A1A1A" filter="url(#softShadow)"/>
  <path d="M20,25 L35,25 M20,30 L35,30 M65,20 L80,20" stroke="#222" stroke-width="1"/>
