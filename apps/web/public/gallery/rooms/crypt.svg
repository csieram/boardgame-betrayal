<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5A5A5A"/>
      <stop offset="100%" style="stop-color:#3A3A3A"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A2A0A"/>
      <stop offset="50%" style="stop-color:#6B4B2B"/>
      <stop offset="100%" style="stop-color:#3A1A00"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="3" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#1A0A00" stroke-width="2"/>
  
  <!-- Large central tomb -->
  <g filter="url(#softShadow)">
    <rect x="22" y="28" width="56" height="32" fill="#4A4A5A" stroke="#2A2A3A" stroke-width="3" rx="3"/>
    <rect x="26" y="32" width="48" height="24" fill="#3A3A4A"/>
    <!-- Tomb lid lines -->
    <line x1="50" y1="32" x2="50" y2="56" stroke="#2A2A3A" stroke-width="2"/>
    <line x1="36" y1="32" x2="36" y2="56" stroke="#2A2A3A" stroke-width="1"/>
    <line x1="64" y1="32" x2="64" y2="56" stroke="#2A2A3A" stroke-width="1"/>
    <!-- Cross -->
    <line x1="50" y1="38" x2="50" y2="50" stroke="#5A5A6A" stroke-width="3"/>
    <line x1="44" y1="44" x2="56" y2="44" stroke="#5A5A6A" stroke-width="3"/>
  </g>
  
  <!-- Side sarcophagus -->
  <g filter="url(#softShadow)">
    <rect x="38" y="65" width="24" height="15" fill="#3A3A4A" stroke="#2A2A3A" stroke-width="2" rx="1"/>
    <circle cx="50" cy="72" r="5" fill="#2A2A3A"/>
    <line x1="46" y1="72" x2="54" y2="72" stroke="#4A4A5A" stroke-width="1"/>
  </g>
  
  <!-- Candles -->
  <g filter="url(#softShadow)">
    <rect x="18" y="50" width="3" height="10" fill="#DDD" stroke="#999" stroke-width="0.5"/>
    <circle cx="19.5" cy="48" r="2.5" fill="#FF6B35" opacity="0.8"/>
    <rect x="79" y="48" width="3" height="10" fill="#DDD" stroke="#999" stroke-width="0.5"/>
    <circle cx="80.5" cy="46" r="2.5" fill="#FF6B35" opacity="0.8"/>
  </g>
  
  <!-- Door North -->
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="-2" x2="50" y2="12" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="5" x2="62" y2="5" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="6" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="6" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Symbol E (Event) -->
  <g filter="url(#softShadow)">
    <circle cx="85" cy="15" r="8" fill="#4A9A4A" stroke="#2A7A2A" stroke-width="1"/>
    <circle cx="85" cy="15" r="6" fill="#5ABA5A" opacity="0.5"/>
    <text x="85" y="19" text-anchor="middle" font-size="11" fill="#FFF" font-weight="bold" font-family="serif">E</text>
  </g>
  
  <!-- Mental damage indicator - brain icon -->
  <g transform="translate(12, 82)">
    <ellipse cx="6" cy="6" rx="5" ry="4" fill="#9370DB" stroke="#7B68EE" stroke-width="1"/>
    <path d="M4,4 Q6,2 8,4" fill="none" stroke="#7B68EE" stroke-width="0.5"/>
    <circle cx="5" cy="6" r="1" fill="#4B0082"/>
    <circle cx="7" cy="6" r="1" fill="#4B0082"/>
  </g>
</svg>
