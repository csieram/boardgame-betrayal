<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="300" height="300">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5A4A4A"/>
      <stop offset="100%" style="stop-color:#3A2A2A"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5A3A1A"/>
      <stop offset="50%" style="stop-color:#7B5B3B"/>
      <stop offset="100%" style="stop-color:#4A2A0A"/>
    </linearGradient>
    <linearGradient id="curtainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B4A4A"/>
      <stop offset="50%" style="stop-color:#6A3A3A"/>
      <stop offset="100%" style="stop-color:#4A2A2A"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="2"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 地板 -->
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#2A1A1A" stroke-width="2"/>
  
  <!-- 地板紋理 -->
  <line x1="8" y1="33" x2="92" y2="33" stroke="#4A3A3A" stroke-width="1"/>
  <line x1="8" y1="58" x2="92" y2="58" stroke="#4A3A3A" stroke-width="1"/>
  <line x1="8" y1="83" x2="92" y2="83" stroke="#4A3A3A" stroke-width="1"/>
  
  <!-- 門: 東 -->
  <g filter="url(#softShadow)">
    <rect x="88" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="90" y1="50" x2="102" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <circle cx="96" cy="55" r="2" fill="#8B7355"/>
  </g>
  
  <!-- 門: 西 -->
  <g filter="url(#softShadow)">
    <rect x="-4" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="-2" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="-2" y1="50" x2="10" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <circle cx="4" cy="55" r="2" fill="#8B7355"/>
  </g>
  
  <!-- 舞台 -->
  <rect x="15" y="60" width="70" height="25" fill="#4A3A3A" stroke="#2A1A1A" stroke-width="1"/>
  <line x1="15" y1="65" x2="85" y2="65" stroke="#3A2A2A" stroke-width="1"/>
  <line x1="15" y1="70" x2="85" y2="70" stroke="#3A2A2A" stroke-width="1"/>
  <line x1="15" y1="75" x2="85" y2="75" stroke="#3A2A2A" stroke-width="1"/>
  <line x1="15" y1="80" x2="85" y2="80" stroke="#3A2A2A" stroke-width="1"/>
  
  <!-- 舞台幕布 -->
  <rect x="15" y="15" width="15" height="45" fill="url(#curtainGrad)" stroke="#2A1A1A" stroke-width="1"/>
  <rect x="70" y="15" width="15" height="45" fill="url(#curtainGrad)" stroke="#2A1A1A" stroke-width="1"/>
  
  <!-- 幕布褶皺 -->
  <line x1="20" y1="15" x2="20" y2="60" stroke="#3A2A2A" stroke-width="1"/>
  <line x1="25" y1="15" x2="25" y2="60" stroke="#3A2A2A" stroke-width="1"/>
  <line x1="75" y1="15" x2="75" y2="60" stroke="#3A2A2A" stroke-width="1"/>
  <line x1="80" y1="15" x2="80" y2="60" stroke="#3A2A2A" stroke-width="1"/>
  
  <!-- 舞台燈 -->
  <circle cx="35" cy="25" r="5" fill="#FFD700" opacity="0.6"/>
  <circle cx="50" cy="20" r="5" fill="#FFD700" opacity="0.6"/>
  <circle cx="65" cy="25" r="5" fill="#FFD700" opacity="0.6"/>
  
  <!-- 預兆符號 O -->
  <circle cx="85" cy="15" r="6" fill="#8B4DA8"/>
  <text x="85" y="18" text-anchor="middle" font-size="8" fill="#FFF" font-family="Arial">O</text>
</svg>