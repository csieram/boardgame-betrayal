<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5A5A5A"/>
      <stop offset="100%" style="stop-color:#3A3A3A"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A2A0A"/>
      <stop offset="50%" style="stop-color:#6B4B2B"/>
      <stop offset="100%" style="stop-color:#3A1A00"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="3" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#1A0A00" stroke-width="2"/>
  
  <!-- Lab table -->
  <g filter="url(#softShadow)">
    <rect x="15" y="38" width="35" height="22" fill="#6B6B6B" stroke="#4A4A4A" stroke-width="2" rx="2"/>
    <!-- Beakers -->
    <rect x="18" y="32" width="6" height="10" fill="#87CEEB" opacity="0.6" stroke="#5A9AC8" stroke-width="0.5"/>
    <rect x="26" y="30" width="5" height="12" fill="#90EE90" opacity="0.6" stroke="#6B8E6B" stroke-width="0.5"/>
    <rect x="33" y="33" width="4" height="9" fill="#FFB6C1" opacity="0.6" stroke="#DDA0AA" stroke-width="0.5"/>
  </g>
  
  <!-- Microscope -->
  <g filter="url(#softShadow)">
    <circle cx="62" cy="52" r="14" fill="#87CEEB" opacity="0.25" stroke="#5A9AC8" stroke-width="1"/>
    <line x1="52" y1="42" x2="72" y2="62" stroke="#5A9AC8" stroke-width="1" opacity="0.5"/>
    <line x1="72" y1="42" x2="52" y2="62" stroke="#5A9AC8" stroke-width="1" opacity="0.5"/>
    <!-- Microscope body -->
    <rect x="58" y="38" width="4" height="12" fill="#666"/>
    <rect x="56" y="48" width="8" height="4" fill="#555"/>
  </g>
  
  <!-- Bookshelf -->
  <g filter="url(#softShadow)">
    <rect x="78" y="40" width="14" height="35" fill="#5A6A6A" stroke="#4A5A5A" stroke-width="1"/>
    <line x1="78" y1="50" x2="92" y2="50" stroke="#4A5A5A" stroke-width="1"/>
    <line x1="78" y1="60" x2="92" y2="60" stroke="#4A5A5A" stroke-width="1"/>
    <line x1="78" y1="70" x2="92" y2="70" stroke="#4A5A5A" stroke-width="1"/>
    <!-- Books -->
    <rect x="80" y="42" width="3" height="8" fill="#8B0000" opacity="0.7"/>
    <rect x="84" y="42" width="2" height="8" fill="#006400" opacity="0.7"/>
    <rect x="87" y="52" width="3" height="8" fill="#00008B" opacity="0.7"/>
    <rect x="80" y="62" width="2" height="8" fill="#8B4513" opacity="0.7"/>
  </g>
  
  <!-- Door North -->
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="-2" x2="50" y2="12" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="5" x2="62" y2="5" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="6" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="6" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Door South -->
  <g filter="url(#softShadow)">
    <rect x="36" y="88" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="90" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="90" x2="50" y2="104" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="97" x2="62" y2="97" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="90" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="94" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="94" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Symbol E -->
  <g filter="url(#softShadow)">
    <circle cx="85" cy="15" r="8" fill="#4A9A4A" stroke="#3A8A3A" stroke-width="1"/>
    <circle cx="85" cy="15" r="6" fill="#6ABA6A" opacity="0.5"/>
    <text x="85" y="19" text-anchor="middle" font-size="11" fill="#FFF" font-weight="bold" font-family="serif">E</text>
  </g>
</svg>
