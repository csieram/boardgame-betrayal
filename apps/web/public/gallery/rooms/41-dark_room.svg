<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1A1A1A"/><stop offset="50%" style="stop-color:#0A0A0A"/><stop offset="100%" style="stop-color:#000"/></linearGradient>
    <pattern id="darkPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><rect width="20" height="20" fill="url(#floorGrad)"/><circle cx="10" cy="10" r="1" fill="#333" opacity="0.3"/></pattern>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#3A2A1A"/><stop offset="50%" style="stop-color:#5A4A3A"/><stop offset="100%" style="stop-color:#2A1A0A"/></linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#FFD700"/><stop offset="50%" style="stop-color:#B8860B"/><stop offset="100%" style="stop-color:#D4AF37"/></linearGradient>
    <radialGradient id="redGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" style="stop-color:#FF0000;stop-opacity:0.3"/><stop offset="100%" style="stop-color:#FF0000;stop-opacity:0"/></radialGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/><feOffset in="blur" dx="2" dy="2" result="offsetBlur"/><feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer><feMerge><feMergeNode in="offsetBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="8" y="8" width="84" height="84" fill="url(#darkPattern)" stroke="#000" stroke-width="2"/>
  <g filter="url(#softShadow)">
    <rect x="-4" y="36" width="16" height="28" fill="#0A0000"/>
    <rect x="-2" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="-2" y1="50" x2="10" y2="50" stroke="#1A0A00" stroke-width="0.5"/>
    <line x1="4" y1="38" x2="4" y2="62" stroke="#1A0A00" stroke-width="0.5"/>
    <rect x="-2" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="4" cy="55" r="2" fill="url(#goldTrim)"/>
    <circle cx="4" cy="55" r="1" fill="#B8860B"/>
  </g>
  <rect x="25" y="25" width="50" height="50" fill="#000" stroke="#111" filter="url(#softShadow)"/>
  <circle cx="35" cy="40" r="5" fill="#FF0000" opacity="0.2"/>
  <circle cx="65" cy="40" r="5" fill="#FF0000" opacity="0.2"/>
  <rect x="40" y="60" width="20" height="10" fill="#111" stroke="#222"/>
  <circle cx="50" cy="50" r="20" fill="url(#redGlow)" opacity="0.3"/>
</svg>
