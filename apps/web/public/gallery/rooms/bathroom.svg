<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5A6A7B"/>
      <stop offset="100%" style="stop-color:#3A4A5B"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A2A0A"/>
      <stop offset="50%" style="stop-color:#6B4B2B"/>
      <stop offset="100%" style="stop-color:#3A1A00"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <linearGradient id="tileGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E0E0E0"/>
      <stop offset="100%" style="stop-color:#B0B0B0"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="3" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Floor -->
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#2A3A4A" stroke-width="2"/>
  
  <!-- INTERIOR: Bathroom - Bathtub and sink -->
  <!-- Tile pattern -->
  <g opacity="0.3">
    <line x1="20" y1="20" x2="20" y2="80" stroke="#FFF" stroke-width="0.5"/>
    <line x1="40" y1="20" x2="40" y2="80" stroke="#FFF" stroke-width="0.5"/>
    <line x1="60" y1="20" x2="60" y2="80" stroke="#FFF" stroke-width="0.5"/>
    <line x1="80" y1="20" x2="80" y2="80" stroke="#FFF" stroke-width="0.5"/>
    <line x1="15" y1="30" x2="85" y2="30" stroke="#FFF" stroke-width="0.5"/>
    <line x1="15" y1="50" x2="85" y2="50" stroke="#FFF" stroke-width="0.5"/>
    <line x1="15" y1="70" x2="85" y2="70" stroke="#FFF" stroke-width="0.5"/>
  </g>
  
  <!-- Bathtub -->
  <g filter="url(#softShadow)">
    <rect x="20" y="25" width="35" height="25" rx="3" fill="url(#tileGrad)" stroke="#999" stroke-width="1"/>
    <rect x="22" y="27" width="31" height="18" rx="2" fill="#87CEEB" opacity="0.4"/>
    <!-- Faucet -->
    <path d="M50,25 L50,20 L55,20" fill="none" stroke="#888" stroke-width="2"/>
    <circle cx="55" cy="20" r="2" fill="#888"/>
  </g>
  
  <!-- Sink -->
  <g filter="url(#softShadow)">
    <rect x="62" y="30" width="20" height="15" rx="2" fill="url(#tileGrad)" stroke="#999" stroke-width="1"/>
    <ellipse cx="72" cy="35" rx="6" ry="4" fill="#87CEEB" opacity="0.4"/>
    <!-- Faucet -->
    <path d="M72,30 L72,26" fill="none" stroke="#888" stroke-width="2"/>
    <circle cx="72" cy="26" r="2" fill="#888"/>
    <!-- Mirror above sink -->
    <rect x="65" y="12" width="14" height="12" fill="#ADD8E6" opacity="0.3" stroke="#999" stroke-width="1"/>
  </g>
  
  <!-- Toilet -->
  <g filter="url(#softShadow)">
    <rect x="65" y="55" width="15" height="12" rx="1" fill="url(#tileGrad)" stroke="#999" stroke-width="1"/>
    <ellipse cx="72" cy="55" rx="7" ry="4" fill="url(#tileGrad)" stroke="#999" stroke-width="1"/>
    <!-- Tank -->
    <rect x="67" y="48" width="10" height="8" rx="1" fill="url(#tileGrad)" stroke="#999" stroke-width="1"/>
  </g>
  
  <!-- Towel rack -->
  <g filter="url(#softShadow)">
    <line x1="25" y1="60" x2="45" y2="60" stroke="#888" stroke-width="2"/>
    <rect x="28" y="58" width="6" height="12" fill="#FFF" opacity="0.7"/>
    <rect x="36" y="58" width="6" height="12" fill="#FFF" opacity="0.7"/>
  </g>
  
  <!-- Door South only -->
  <g filter="url(#softShadow)">
    <rect x="36" y="88" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="90" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="90" x2="50" y2="104" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="97" x2="62" y2="97" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="90" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="94" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="94" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Symbol E -->
  <g filter="url(#softShadow)">
    <circle cx="85" cy="15" r="8" fill="#4A9A4A" stroke="#2A7A2A" stroke-width="1"/>
    <circle cx="85" cy="15" r="6" fill="#5ABA5A" opacity="0.5"/>
    <text x="85" y="19" text-anchor="middle" font-size="11" fill="#FFF" font-weight="bold" font-family="serif">E</text>
  </g>
</svg>