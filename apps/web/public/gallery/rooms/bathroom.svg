<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5A6A7B"/>
      <stop offset="50%" style="stop-color:#3A4A5B"/>
      <stop offset="100%" style="stop-color:#1A2A3B"/>
    </linearGradient>
    <pattern id="tilePattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="url(#floorGrad)"/>
      <line x1="0" y1="0" x2="0" y2="20" stroke="#2A3A4B" stroke-width="0.5" opacity="0.5"/>
      <line x1="0" y1="0" x2="20" y2="0" stroke="#2A3A4B" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5A3A1A"/>
      <stop offset="50%" style="stop-color:#7B5B3B"/>
      <stop offset="100%" style="stop-color:#4A2A0A"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
    <linearGradient id="tubGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF"/>
      <stop offset="100%" style="stop-color:#E0E0E0"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset in="blur" dx="2" dy="2" result="offsetBlur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode in="offsetBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Floor -->
  <rect x="8" y="8" width="84" height="84" fill="url(#tilePattern)" stroke="#0A1A2B" stroke-width="2"/>
  <rect x="10" y="10" width="80" height="80" fill="none" stroke="#2A3A4B" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Bathtub -->
  <g filter="url(#softShadow)">
    <rect x="15" y="55" width="35" height="25" fill="url(#tubGrad)" stroke="#C0C0C0" stroke-width="1" rx="3"/>
    <ellipse cx="32" cy="55" rx="17" ry="5" fill="#F0F0F0" stroke="#C0C0C0" stroke-width="1"/>
    <!-- Feet -->
    <circle cx="18" cy="78" r="3" fill="#888"/>
    <circle cx="47" cy="78" r="3" fill="#888"/>
    <!-- Faucet -->
    <path d="M 35 50 Q 35 45 40 45" stroke="#888" stroke-width="2" fill="none"/>
    <circle cx="40" cy="45" r="2" fill="#888"/>
  </g>
  
  <!-- Sink/Vanity -->
  <g filter="url(#softShadow)">
    <rect x="60" y="20" width="25" height="30" fill="#FFF" stroke="#CCC" stroke-width="1"/>
    <!-- Sink basin -->
    <ellipse cx="72" cy="30" rx="8" ry="5" fill="#E0E0E0" stroke="#CCC" stroke-width="1"/>
    <!-- Mirror -->
    <rect x="62" y="8" width="21" height="12" fill="#C0D0E0" stroke="#999" stroke-width="1"/>
    <line x1="72" y1="8" x2="72" y2="20" stroke="#999" stroke-width="0.5"/>
    <!-- Faucet -->
    <path d="M 72 25 L 72 22" stroke="#888" stroke-width="2"/>
  </g>
  
  <!-- Toilet -->
  <g filter="url(#softShadow)">
    <rect x="20" y="20" width="15" height="20" fill="#FFF" stroke="#CCC" stroke-width="1" rx="2"/>
    <ellipse cx="27" cy="18" rx="8" ry="4" fill="#FFF" stroke="#CCC" stroke-width="1"/>
    <ellipse cx="27" cy="18" rx="5" ry="2" fill="#E0E0E0" stroke="#CCC" stroke-width="0.5"/>
    <!-- Tank -->
    <rect x="18" y="8" width="18" height="10" fill="#FFF" stroke="#CCC" stroke-width="1" rx="1"/>
  </g>
  
  <!-- Towel rack -->
  <g filter="url(#softShadow)">
    <line x1="55" y1="25" x2="75" y2="25" stroke="#888" stroke-width="2"/>
    <rect x="58" y="26" width="8" height="12" fill="#FFF" stroke="#CCC" stroke-width="0.5"/>
    <rect x="68" y="26" width="8" height="12" fill="#FFF" stroke="#CCC" stroke-width="0.5"/>
  </g>
  
  <!-- Rug -->
  <ellipse cx="50" cy="75" rx="15" ry="8" fill="#8B6B5B" stroke="#6B4B3B" stroke-width="1" opacity="0.7"/>
  
  <!-- Door North -->
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="-2" x2="50" y2="12" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="5" x2="62" y2="5" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="6" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="6" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Door West -->
  <g filter="url(#softShadow)">
    <rect x="-4" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="-2" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="-2" y1="50" x2="10" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="4" y1="38" x2="4" y2="62" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="-2" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="4" cy="55" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="4" cy="55" r="1.5" fill="#B8860B"/>
  </g>
</svg>
