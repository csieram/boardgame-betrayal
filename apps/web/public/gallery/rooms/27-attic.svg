<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#5A4A3A"/><stop offset="50%" style="stop-color:#3A2A1A"/><stop offset="100%" style="stop-color:#1A0A00"/></linearGradient>
    <pattern id="woodPattern" x="0" y="0" width="10" height="40" patternUnits="userSpaceOnUse"><rect width="10" height="40" fill="url(#floorGrad)"/><line x1="0" y1="0" x2="0" y2="40" stroke="#0A0000" stroke-width="0.3"/></pattern>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#5A3A1A"/><stop offset="50%" style="stop-color:#7B5B3B"/><stop offset="100%" style="stop-color:#4A2A0A"/></linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#FFD700"/><stop offset="50%" style="stop-color:#B8860B"/><stop offset="100%" style="stop-color:#D4AF37"/></linearGradient>
    <linearGradient id="furnitureGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#FFF"/><stop offset="100%" style="stop-color:#DDD"/></linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/><feOffset in="blur" dx="2" dy="2" result="offsetBlur"/><feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer><feMerge><feMergeNode in="offsetBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="8" y="8" width="84" height="84" fill="url(#woodPattern)" stroke="#000" stroke-width="2"/>
  <rect x="10" y="10" width="80" height="80" fill="none" stroke="#1A0A00" stroke-width="0.5" opacity="0.3"/>
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="-2" x2="50" y2="12" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="5" x2="62" y2="5" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="6" r="2" fill="url(#goldTrim)"/>
    <circle cx="55" cy="6" r="1" fill="#B8860B"/>
  </g>
  <rect x="15" y="20" width="25" height="20" fill="url(#furnitureGrad)" stroke="#999" filter="url(#softShadow)"/>
  <rect x="45" y="15" width="20" height="25" fill="url(#furnitureGrad)" stroke="#999" filter="url(#softShadow)"/>
  <rect x="20" y="50" width="30" height="20" fill="url(#furnitureGrad)" stroke="#999" filter="url(#softShadow)"/>
  <rect x="60" y="55" width="25" height="20" fill="url(#furnitureGrad)" stroke="#999" filter="url(#softShadow)"/>
  <path d="M15,70 Q50,55 85,70" fill="none" stroke="#4A3728" stroke-width="2"/>
  <circle cx="12" cy="12" r="2" fill="#1A0A00" opacity="0.4"/>
  <circle cx="88" cy="12" r="2" fill="#1A0A00" opacity="0.4"/>
  <circle cx="12" cy="88" r="2" fill="#1A0A00" opacity="0.4"/>
  <circle cx="88" cy="88" r="2" fill="#1A0A00" opacity="0.4"/>
</svg>
