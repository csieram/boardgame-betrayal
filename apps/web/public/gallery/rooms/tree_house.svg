<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="300" height="300">
  <defs>
    <linearGradient id="grassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3A6A3A"/>
      <stop offset="100%" style="stop-color:#1A4A1A"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5A3A1A"/>
      <stop offset="50%" style="stop-color:#7B5B3B"/>
      <stop offset="100%" style="stop-color:#4A2A0A"/>
    </linearGradient>
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6A5A4A"/>
      <stop offset="100%" style="stop-color:#4A3A2A"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="2"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 草地背景 (Outside) -->
  <rect x="8" y="8" width="84" height="84" fill="url(#grassGrad)" stroke="#0A3A0A" stroke-width="2"/>
  
  <!-- 草地紋理 -->
  <circle cx="20" cy="20" r="3" fill="#2A5A2A" opacity="0.5"/>
  <circle cx="35" cy="15" r="4" fill="#2A5A2A" opacity="0.5"/>
  <circle cx="70" cy="25" r="3" fill="#2A5A2A" opacity="0.5"/>
  <circle cx="80" cy="40" r="4" fill="#2A5A2A" opacity="0.5"/>
  <circle cx="25" cy="50" r="3" fill="#2A5A2A" opacity="0.5"/>
  <circle cx="75" cy="60" r="4" fill="#2A5A2A" opacity="0.5"/>
  <circle cx="15" cy="70" r="3" fill="#2A5A2A" opacity="0.5"/>
  <circle cx="85" cy="75" r="3" fill="#2A5A2A" opacity="0.5"/>
  
  <!-- 樹幹 -->
  <rect x="42" y="50" width="16" height="35" fill="#4A3728" stroke="#2A1708"/>
  
  <!-- 樹枝 -->
  <line x1="42" y1="60" x2="25" y2="50" stroke="#4A3728" stroke-width="3"/>
  <line x1="58" y1="60" x2="75" y2="50" stroke="#4A3728" stroke-width="3"/>
  <line x1="50" y1="55" x2="50" y2="35" stroke="#4A3728" stroke-width="3"/>
  
  <!-- 樹葉 -->
  <circle cx="25" cy="45" r="12" fill="#2F5F2F" stroke="#1F4F1F"/>
  <circle cx="75" cy="45" r="12" fill="#2F5F2F" stroke="#1F4F1F"/>
  <circle cx="50" cy="30" r="15" fill="#3F6F3F" stroke="#2F5F2F"/>
  <circle cx="35" cy="35" r="10" fill="#2F5F2F" stroke="#1F4F1F"/>
  <circle cx="65" cy="35" r="10" fill="#2F5F2F" stroke="#1F4F1F"/>
  
  <!-- 樹屋 -->
  <rect x="35" y="25" width="30" height="20" fill="url(#woodGrad)" stroke="#3A2A1A" stroke-width="2"/>
  
  <!-- 樹屋窗戶 -->
  <rect x="40" y="30" width="6" height="6" fill="#2A2A3A"/>
  <rect x="54" y="30" width="6" height="6" fill="#2A2A3A"/>
  
  <!-- 樹屋門 -->
  <rect x="47" y="38" width="6" height="7" fill="#3A2A1A"/>
  
  <!-- 門: 南 -->
  <g filter="url(#softShadow)">
    <rect x="36" y="88" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="90" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="90" x2="50" y2="104" stroke="#2A1A0A" stroke-width="0.5"/>
    <circle cx="55" cy="94" r="2" fill="#8B7355"/>
  </g>
  
  <!-- 門: 東 -->
  <g filter="url(#softShadow)">
    <rect x="88" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="90" y1="50" x2="102" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <circle cx="96" cy="55" r="2" fill="#8B7355"/>
  </g>
  
  <!-- 事件符號 E -->
  <circle cx="85" cy="15" r="6" fill="#4A9A4A"/>
  <text x="85" y="18" text-anchor="middle" font-size="8" fill="#FFF" font-family="Arial">E</text>
  
  <!-- 太陽 (Outside 標記) -->
  <circle cx="15" cy="15" r="8" fill="#FFD700" opacity="0.8"/>
  <circle cx="15" cy="15" r="10" fill="#FFD700" opacity="0.3"/>
</svg>