<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#4A5A4A"/><stop offset="100%" style="stop-color:#2A3A2A"/></linearGradient>
    <pattern id="tilePattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><rect width="20" height="20" fill="url(#floorGrad)"/><line x1="0" y1="0" x2="0" y2="20" stroke="#3A4A3A" stroke-width="0.5"/></pattern>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#5A3A1A"/><stop offset="50%" style="stop-color:#7B5B3B"/><stop offset="100%" style="stop-color:#4A2A0A"/></linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#FFD700"/><stop offset="100%" style="stop-color:#B8860B"/></linearGradient>
    <filter id="softShadow"><feGaussianBlur in="SourceAlpha" stdDeviation="3"/><feOffset dx="2" dy="2"/><feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="8" y="8" width="84" height="84" fill="url(#tilePattern)" stroke="#1A2A1A" stroke-width="2"/>
  
  <!-- Door South -->
  <g filter="url(#softShadow)">
    <rect x="36" y="88" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="90" width="24" height="14" fill="url(#doorWood)"/>
    <rect x="38" y="90" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="94" r="2" fill="url(#goldTrim)"/>
  </g>
  
  <!-- Door East -->
  <g filter="url(#softShadow)">
    <rect x="88" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <rect x="90" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="96" cy="55" r="2" fill="url(#goldTrim)"/>
  </g>
  
  <!-- Lab table -->
  <rect x="10" y="60" width="80" height="25" fill="#5A6A5A" stroke="#3A4A3A" filter="url(#softShadow)"/>
  
  <!-- Test tubes -->
  <rect x="15" y="45" width="25" height="18" fill="#8B7355" stroke="#654321" filter="url(#softShadow)"/>
  <rect x="18" y="35" width="4" height="15" fill="#00FF00" opacity="0.5"/>
  <rect x="24" y="38" width="4" height="12" fill="#FF0000" opacity="0.5"/>
  <rect x="30" y="33" width="4" height="17" fill="#0000FF" opacity="0.5"/>
  
  <!-- Beaker -->
  <circle cx="60" cy="50" r="10" fill="#4682B4" opacity="0.4" stroke="#2E5A8B"/>
  <circle cx="60" cy="50" r="6" fill="#00FF00" opacity="0.3"/>
  
  <!-- Strange machine -->
  <rect x="35" y="20" width="25" height="18" fill="#4A4A4A" stroke="#333" filter="url(#softShadow)"/>
  <circle cx="47" cy="29" r="5" fill="#00FF00" opacity="0.5"/>
  
  <!-- Symbol I -->
  <g filter="url(#softShadow)">
    <circle cx="85" cy="15" r="8" fill="#3D7AB8" stroke="#1D5A98" stroke-width="1"/>
    <circle cx="85" cy="15" r="6" fill="#5A9AD8" opacity="0.5"/>
    <text x="85" y="19" text-anchor="middle" font-size="11" fill="#FFF" font-weight="bold" font-family="serif">I</text>
  </g>
</svg>
