<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B5B4B"/>
      <stop offset="100%" style="stop-color:#3A2A1A"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5A3A1A"/>
      <stop offset="50%" style="stop-color:#7B5B3B"/>
      <stop offset="100%" style="stop-color:#4A2A0A"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
    <linearGradient id="organGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A3728"/>
      <stop offset="50%" style="stop-color:#2A1708"/>
      <stop offset="100%" style="stop-color:#1A0A00"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset in="blur" dx="2" dy="2" result="offsetBlur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode in="offsetBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Floor -->
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#1A0A00" stroke-width="2"/>
  
  <!-- Large Pipe Organ -->
  <g filter="url(#softShadow)">
    <!-- Main organ body -->
    <rect x="20" y="15" width="60" height="50" fill="url(#organGrad)" stroke="#1A0A00" stroke-width="2"/>
    
    <!-- Organ pipes - tall center -->
    <rect x="35" y="5" width="6" height="45" fill="#C0C0C0" stroke="#808080" stroke-width="1"/>
    <rect x="43" y="8" width="6" height="42" fill="#D0D0D0" stroke="#909090" stroke-width="1"/>
    <rect x="51" y="5" width="6" height="45" fill="#C0C0C0" stroke="#808080" stroke-width="1"/>
    <rect x="59" y="10" width="6" height="40" fill="#D0D0D0" stroke="#909090" stroke-width="1"/>
    
    <!-- Shorter pipes on sides -->
    <rect x="25" y="20" width="5" height="30" fill="#B0B0B0" stroke="#707070" stroke-width="1"/>
    <rect x="31" y="25" width="4" height="25" fill="#B8B8B8" stroke="#787878" stroke-width="1"/>
    <rect x="66" y="25" width="4" height="25" fill="#B8B8B8" stroke="#787878" stroke-width="1"/>
    <rect x="71" y="20" width="5" height="30" fill="#B0B0B0" stroke="#707070" stroke-width="1"/>
    
    <!-- Organ keyboard/console -->
    <rect x="30" y="55" width="40" height="12" fill="#2A1A0A" stroke="#1A0A00" stroke-width="1"/>
    <!-- Keys -->
    <rect x="32" y="57" width="3" height="8" fill="#FFF" stroke="#CCC" stroke-width="0.5"/>
    <rect x="36" y="57" width="3" height="8" fill="#FFF" stroke="#CCC" stroke-width="0.5"/>
    <rect x="40" y="57" width="3" height="8" fill="#FFF" stroke="#CCC" stroke-width="0.5"/>
    <rect x="44" y="57" width="3" height="8" fill="#FFF" stroke="#CCC" stroke-width="0.5"/>
    <rect x="48" y="57" width="3" height="8" fill="#FFF" stroke="#CCC" stroke-width="0.5"/>
    <rect x="52" y="57" width="3" height="8" fill="#FFF" stroke="#CCC" stroke-width="0.5"/>
    <rect x="56" y="57" width="3" height="8" fill="#FFF" stroke="#CCC" stroke-width="0.5"/>
    <rect x="60" y="57" width="3" height="8" fill="#FFF" stroke="#CCC" stroke-width="0.5"/>
    <rect x="64" y="57" width="3" height="8" fill="#FFF" stroke="#CCC" stroke-width="0.5"/>
    <!-- Black keys -->
    <rect x="34" y="57" width="2" height="5" fill="#000"/>
    <rect x="38" y="57" width="2" height="5" fill="#000"/>
    <rect x="46" y="57" width="2" height="5" fill="#000"/>
    <rect x="50" y="57" width="2" height="5" fill="#000"/>
    <rect x="54" y="57" width="2" height="5" fill="#000"/>
    <rect x="62" y="57" width="2" height="5" fill="#000"/>
  </g>
  
  <!-- Organ bench -->
  <g filter="url(#softShadow)">
    <rect x="35" y="70" width="30" height="12" fill="#4A3728" stroke="#2A1708" stroke-width="1"/>
    <rect x="37" y="72" width="26" height="6" fill="#654321"/>
  </g>
  
  <!-- Music stand with sheet music -->
  <g filter="url(#softShadow)">
    <line x1="75" y1="65" x2="75" y2="80" stroke="#444" stroke-width="2"/>
    <rect x="70" y="60" width="10" height="8" fill="#FFF" stroke="#CCC" stroke-width="0.5"/>
    <!-- Music notes -->
    <line x1="72" y1="63" x2="78" y2="63" stroke="#000" stroke-width="0.5"/>
    <line x1="72" y1="65" x2="78" y2="65" stroke="#000" stroke-width="0.5"/>
    <circle cx="74" cy="64" r="1" fill="#000"/>
    <circle cx="76" cy="64" r="1" fill="#000"/>
  </g>
  
  <!-- Door South -->
  <g filter="url(#softShadow)">
    <rect x="36" y="88" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="90" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="90" x2="50" y2="104" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="97" x2="62" y2="97" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="90" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="94" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="94" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Door West -->
  <g filter="url(#softShadow)">
    <rect x="-4" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="-2" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="-2" y1="50" x2="10" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="4" y1="38" x2="4" y2="62" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="-2" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="4" cy="55" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="4" cy="55" r="1.5" fill="#B8860B"/>
  </g>
</svg>
