<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="300" height="300">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5A5A5A"/>
      <stop offset="100%" style="stop-color:#3A3A3A"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5A3A1A"/>
      <stop offset="50%" style="stop-color:#7B5B3B"/>
      <stop offset="100%" style="stop-color:#4A2A0A"/>
    </linearGradient>
    <linearGradient id="stairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6A6A6A"/>
      <stop offset="100%" style="stop-color:#4A4A4A"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="2"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 地板 -->
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#2A2A2A" stroke-width="2"/>
  
  <!-- 地板紋理 -->
  <line x1="8" y1="33" x2="92" y2="33" stroke="#4A4A4A" stroke-width="1"/>
  <line x1="8" y1="58" x2="92" y2="58" stroke="#4A4A4A" stroke-width="1"/>
  <line x1="8" y1="83" x2="92" y2="83" stroke="#4A4A4A" stroke-width="1"/>
  <line x1="33" y1="8" x2="33" y2="92" stroke="#4A4A4A" stroke-width="1"/>
  <line x1="58" y1="8" x2="58" y2="92" stroke="#4A4A4A" stroke-width="1"/>
  <line x1="83" y1="8" x2="83" y2="92" stroke="#4A4A4A" stroke-width="1"/>
  
  <!-- 門: 北 -->
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="-2" x2="50" y2="12" stroke="#2A1A0A" stroke-width="0.5"/>
    <circle cx="55" cy="6" r="2" fill="#8B7355"/>
  </g>
  
  <!-- 門: 南 -->
  <g filter="url(#softShadow)">
    <rect x="36" y="88" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="90" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="90" x2="50" y2="104" stroke="#2A1A0A" stroke-width="0.5"/>
    <circle cx="55" cy="94" r="2" fill="#8B7355"/>
  </g>
  
  <!-- 門: 東 -->
  <g filter="url(#softShadow)">
    <rect x="88" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="90" y1="50" x2="102" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <circle cx="96" cy="55" r="2" fill="#8B7355"/>
  </g>
  
  <!-- 門: 西 -->
  <g filter="url(#softShadow)">
    <rect x="-4" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="-2" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="-2" y1="50" x2="10" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <circle cx="4" cy="55" r="2" fill="#8B7355"/>
  </g>
  
  <!-- 螺旋樓梯 (中央) -->
  <ellipse cx="50" cy="50" rx="20" ry="20" fill="none" stroke="url(#stairGrad)" stroke-width="3"/>
  <ellipse cx="50" cy="50" rx="15" ry="15" fill="none" stroke="url(#stairGrad)" stroke-width="2"/>
  <ellipse cx="50" cy="50" rx="10" ry="10" fill="none" stroke="url(#stairGrad)" stroke-width="2"/>
  <ellipse cx="50" cy="50" rx="5" ry="5" fill="#3A3A3A"/>
  
  <!-- 樓梯階梯標記 -->
  <line x1="50" y1="30" x2="50" y2="25" stroke="#5A5A5A" stroke-width="2"/>
  <line x1="65" y1="35" x2="69" y2="31" stroke="#5A5A5A" stroke-width="2"/>
  <line x1="70" y1="50" x2="75" y2="50" stroke="#5A5A5A" stroke-width="2"/>
  <line x1="65" y1="65" x2="69" y2="69" stroke="#5A5A5A" stroke-width="2"/>
  <line x1="50" y1="70" x2="50" y2="75" stroke="#5A5A5A" stroke-width="2"/>
  <line x1="35" y1="65" x2="31" y2="69" stroke="#5A5A5A" stroke-width="2"/>
  <line x1="30" y1="50" x2="25" y2="50" stroke="#5A5A5A" stroke-width="2"/>
  <line x1="35" y1="35" x2="31" y2="31" stroke="#5A5A5A" stroke-width="2"/>
</svg>