<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5A5A5A"/>
      <stop offset="100%" style="stop-color:#3A3A3A"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A2A0A"/>
      <stop offset="50%" style="stop-color:#6B4B2B"/>
      <stop offset="100%" style="stop-color:#3A1A00"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="3" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Simple floor -->
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#1A0A00" stroke-width="2"/>
  
  <!-- ENHANCED INTERIOR: Bloody Room -->
  <!-- Large blood stains -->
  <ellipse cx="50" cy="65" rx="32" ry="20" fill="#4A0000" opacity="0.55"/>
  <ellipse cx="34" cy="52" rx="14" ry="10" fill="#6B0000" opacity="0.65"/>
  <ellipse cx="68" cy="60" rx="12" ry="8" fill="#6B0000" opacity="0.6"/>
  
  <!-- Blood splatter -->
  <path d="M38,46 Q48,40 58,50 Q66,44 70,54" fill="none" stroke="#8B0000" stroke-width="6" opacity="0.7" stroke-linecap="round"/>
  <path d="M28,72 Q42,64 54,76" fill="none" stroke="#8B0000" stroke-width="5" opacity="0.6"/>
  <path d="M45,38 Q52,35 58,42" fill="none" stroke="#8B0000" stroke-width="4" opacity="0.5"/>
  
  <!-- Bloody handprints -->
  <circle cx="58" cy="34" r="5" fill="#6B0000" opacity="0.7"/>
  <ellipse cx="53" cy="40" rx="3" ry="4" fill="#6B0000" opacity="0.6" transform="rotate(-30 53 40)"/>
  <ellipse cx="63" cy="37" rx="3" ry="4" fill="#6B0000" opacity="0.6" transform="rotate(30 63 37)"/>
  
  <!-- Large operating table -->
  <g filter="url(#softShadow)">
    <rect x="22" y="55" width="26" height="16" fill="#5A5A5A" stroke="#444" stroke-width="2" rx="2"/>
    <!-- Table legs -->
    <line x1="26" y1="71" x2="26" y2="82" stroke="#444" stroke-width="3"/>
    <line x1="44" y1="71" x2="44" y2="80" stroke="#444" stroke-width="2"/>
    <!-- Blood on table -->
    <ellipse cx="35" cy="60" rx="8" ry="4" fill="#6B0000" opacity="0.5"/>
  </g>
  
  <!-- Blood drips on wall -->
  <path d="M72,28 L72,42" stroke="#6B0000" stroke-width="3" opacity="0.6"/>
  <circle cx="72" cy="46" r="3" fill="#6B0000" opacity="0.5"/>
  <path d="M78,32 L78,38" stroke="#6B0000" stroke-width="2" opacity="0.5"/>
  <circle cx="78" cy="41" r="2" fill="#6B0000" opacity="0.4"/>
  
  <!-- Medical tools tray -->
  <rect x="55" y="72" width="18" height="5" fill="#888" stroke="#666" stroke-width="0.5"/>
  <line x1="58" y1="72" x2="58" y2="68" stroke="#AAA" stroke-width="1"/>
  <line x1="62" y1="72" x2="62" y2="66" stroke="#AAA" stroke-width="1"/>
  <line x1="66" y1="72" x2="66" y2="69" stroke="#AAA" stroke-width="1"/>
  
  <!-- Door North -->
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="-2" x2="50" y2="12" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="5" x2="62" y2="5" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="6" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="6" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Door South -->
  <g filter="url(#softShadow)">
    <rect x="36" y="88" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="90" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="90" x2="50" y2="104" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="97" x2="62" y2="97" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="90" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="96" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="96" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Door East -->
  <g filter="url(#softShadow)">
    <rect x="88" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="90" y1="50" x2="102" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="96" y1="38" x2="96" y2="62" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="90" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="96" cy="55" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="96" cy="55" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Door West -->
  <g filter="url(#softShadow)">
    <rect x="-4" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="-2" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="-2" y1="50" x2="10" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="4" y1="38" x2="4" y2="62" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="-2" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="4" cy="55" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="4" cy="55" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Symbol E -->
  <g filter="url(#softShadow)">
    <circle cx="85" cy="15" r="8" fill="#4A9A4A" stroke="#2A7A2A" stroke-width="1"/>
    <circle cx="85" cy="15" r="6" fill="#5ABA5A" opacity="0.5"/>
    <text x="85" y="19" text-anchor="middle" font-size="11" fill="#FFF" font-weight="bold" font-family="serif">E</text>
  </g>
</svg>
