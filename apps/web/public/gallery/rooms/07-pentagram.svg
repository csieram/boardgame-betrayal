<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="300" height="300">
  <!-- 地板 -->
  <rect x="8" y="8" width="84" height="84" fill="#3D2B6E" stroke="#1A0F2E" stroke-width="2"/>
  
  <!-- 門: 南 -->
  <rect x="40" y="90" width="20" height="12" fill="#3D2B1A" stroke="#2A1A0A" stroke-width="2"/>
  <rect x="42" y="90" width="16" height="10" fill="#7B5B3B" stroke="#A08060" stroke-width="2"/>
  <rect x="44" y="92" width="12" height="6" fill="#5A4A3A" opacity="0.8"/>
  
  <!-- 門: 西 -->
  <rect x="-2" y="40" width="12" height="20" fill="#3D2B1A" stroke="#2A1A0A" stroke-width="2"/>
  <rect x="0" y="42" width="10" height="16" fill="#7B5B3B" stroke="#A08060" stroke-width="2"/>
  <rect x="2" y="44" width="6" height="12" fill="#5A4A3A" opacity="0.8"/>
  
  <!-- 地板紋理 -->
  <rect x="15" y="15" width="70" height="70" fill="#4D3B7E" stroke="#3D2B6E"/>
  
  <!-- 五芒星 -->
  <polygon points="50,22 60,45 82,45 64,60 72,82 50,68 28,82 36,60 18,45 40,45" 
           fill="none" stroke="#8B0000" stroke-width="3"/>
  <polygon points="50,22 60,45 82,45 64,60 72,82 50,68 28,82 36,60 18,45 40,45" 
           fill="#8B0000" opacity="0.15"/>
  
  <!-- 蠟燭 -->
  <circle cx="22" cy="22" r="5" fill="#FFD700" opacity="0.6"/>
  <circle cx="78" cy="22" r="5" fill="#FFD700" opacity="0.6"/>
  <circle cx="22" cy="78" r="5" fill="#FFD700" opacity="0.6"/>
  <circle cx="78" cy="78" r="5" fill="#FFD700" opacity="0.6"/>
  
  <!-- 祭壇 -->
  <rect x="40" y="40" width="20" height="20" fill="#4A3728" stroke="#2A1708"/>
  <rect x="43" y="35" width="14" height="10" fill="#8B0000" stroke="#600000"/>
</svg>
