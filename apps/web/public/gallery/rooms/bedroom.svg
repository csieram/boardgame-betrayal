<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355"/>
      <stop offset="100%" style="stop-color:#5A4A3A"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B4B2A"/>
      <stop offset="50%" style="stop-color:#8B6B4B"/>
      <stop offset="100%" style="stop-color:#4A2A0A"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="3" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Floor - subtle -->
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#2A1A0A" stroke-width="2"/>
  
  <!-- INTERIOR: BEDROOM - Large prominent bed -->
  <g filter="url(#softShadow)">
    <!-- Bed headboard -->
    <rect x="22" y="25" width="56" height="35" fill="#654321" stroke="#3A2A1A" stroke-width="2" rx="3"/>
    <!-- Bed frame details -->
    <line x1="28" y1="25" x2="28" y2="60" stroke="#3A2A1A" stroke-width="3"/>
    <line x1="72" y1="25" x2="72" y2="60" stroke="#3A2A1A" stroke-width="3"/>
    <line x1="22" y1="35" x2="78" y2="35" stroke="#3A2A1A" stroke-width="1"/>
    <line x1="22" y1="45" x2="78" y2="45" stroke="#3A2A1A" stroke-width="1"/>
    <!-- Mattress -->
    <rect x="24" y="38" width="52" height="20" fill="#F5F5DC" stroke="#D4C4A8" stroke-width="1"/>
    <!-- Pillows -->
    <rect x="28" y="30" width="18" height="12" fill="#FFF" stroke="#DDD" stroke-width="1" rx="2"/>
    <rect x="54" y="30" width="18" height="12" fill="#FFF" stroke="#DDD" stroke-width="1" rx="2"/>
    <!-- Blanket -->
    <rect x="24" y="48" width="52" height="15" fill="#8B4513" stroke="#654321" stroke-width="1"/>
    <line x1="24" y1="55" x2="76" y2="55" stroke="#654321" stroke-width="0.5"/>
  </g>
  
  <!-- Nightstand left -->
  <g filter="url(#softShadow)">
    <rect x="12" y="50" width="14" height="18" fill="#6B5344" stroke="#4A3324" stroke-width="1" rx="1"/>
    <rect x="14" y="52" width="10" height="6" fill="#5A4324"/>
    <circle cx="19" cy="62" r="2" fill="#444"/>
  </g>
  
  <!-- Nightstand right -->
  <g filter="url(#softShadow)">
    <rect x="74" y="50" width="14" height="18" fill="#6B5344" stroke="#4A3324" stroke-width="1" rx="1"/>
    <rect x="76" y="52" width="10" height="6" fill="#5A4324"/>
    <circle cx="81" cy="62" r="2" fill="#444"/>
  </g>
  
  <!-- Lamp on right nightstand -->
  <g filter="url(#softShadow)">
    <rect x="78" y="42" width="6" height="10" fill="#DDD" stroke="#999" stroke-width="0.5"/>
    <ellipse cx="81" cy="40" rx="5" ry="3" fill="#FFD700" opacity="0.8"/>
    <circle cx="81" cy="38" r="3" fill="#FFF8DC" opacity="0.9"/>
  </g>
  
  <!-- Rug -->
  <ellipse cx="50" cy="78" rx="30" ry="10" fill="#8B0000" opacity="0.4"/>
  
  <!-- Door North -->
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="-2" x2="50" y2="12" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="5" x2="62" y2="5" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="6" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="6" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Door East -->
  <g filter="url(#softShadow)">
    <rect x="88" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="90" y1="50" x2="102" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="96" y1="38" x2="96" y2="62" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="90" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="96" cy="55" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="96" cy="55" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Door West -->
  <g filter="url(#softShadow)">
    <rect x="-4" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="-2" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="-2" y1="50" x2="10" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="4" y1="38" x2="4" y2="62" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="-2" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="4" cy="55" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="4" cy="55" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Symbol O -->
  <g filter="url(#softShadow)">
    <circle cx="85" cy="15" r="8" fill="#8B4DA8" stroke="#6B2D88" stroke-width="1"/>
    <circle cx="85" cy="15" r="6" fill="#AB6DC8" opacity="0.5"/>
    <text x="85" y="19" text-anchor="middle" font-size="11" fill="#FFF" font-weight="bold" font-family="serif">O</text>
  </g>
</svg>
