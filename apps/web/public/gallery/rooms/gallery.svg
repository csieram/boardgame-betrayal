<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B6B5B"/>
      <stop offset="100%" style="stop-color:#4B3B2B"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5A3A2A"/>
      <stop offset="50%" style="stop-color:#7B5B4B"/>
      <stop offset="100%" style="stop-color:#3A1A0A"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="3" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#1A0A00" stroke-width="2"/>
  
  <!-- Large paintings on walls -->
  <g filter="url(#softShadow)">
    <rect x="12" y="20" width="10" height="25" fill="#8B7355" stroke="#654321" stroke-width="2" rx="1"/>
    <rect x="14" y="22" width="6" height="18" fill="#4A3728"/>
    <circle cx="17" cy="30" r="3" fill="#666" opacity="0.5"/>
    
    <rect x="12" y="50" width="10" height="20" fill="#8B7355" stroke="#654321" stroke-width="2" rx="1"/>
    <rect x="14" y="52" width="6" height="14" fill="#5A4A3A"/>
  </g>
  
  <g filter="url(#softShadow)">
    <rect x="78" y="18" width="10" height="28" fill="#8B7355" stroke="#654321" stroke-width="2" rx="1"/>
    <rect x="80" y="20" width="6" height="20" fill="#3A5A8A" opacity="0.5"/>
    
    <rect x="78" y="50" width="10" height="22" fill="#8B7355" stroke="#654321" stroke-width="2" rx="1"/>
    <rect x="80" y="52" width="6" height="16" fill="#8A4A4A" opacity="0.5"/>
  </g>
  
  <!-- Center statue -->
  <g filter="url(#softShadow)">
    <ellipse cx="50" cy="65" rx="8" ry="12" fill="#666" stroke="#444" stroke-width="1"/>
    <circle cx="50" cy="52" r="5" fill="#777" stroke="#555" stroke-width="1"/>
    <rect x="46" y="75" width="8" height="6" fill="#555"/>
  </g>
  
  <!-- Bench -->
  <g filter="url(#softShadow)">
    <rect x="30" y="72" width="40" height="10" fill="#6B5344" stroke="#4A3324" stroke-width="1" rx="1"/>
    <line x1="34" y1="82" x2="34" y2="88" stroke="#4A3324" stroke-width="2"/>
    <line x1="66" y1="82" x2="66" y2="88" stroke="#4A3324" stroke-width="2"/>
  </g>
  
  <!-- Door North -->
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="-2" x2="50" y2="12" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="5" x2="62" y2="5" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="6" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="6" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Door South -->
  <g filter="url(#softShadow)">
    <rect x="36" y="88" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="90" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="90" x2="50" y2="104" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="97" x2="62" y2="97" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="90" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="94" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="94" r="1.5" fill="#B8860B"/>
  </g>
</svg>
