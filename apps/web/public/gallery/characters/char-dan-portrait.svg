<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 125" width="200" height="250">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F5F5"/>
      <stop offset="100%" style="stop-color:#C0C0C0"/>
    </linearGradient>
    <radialGradient id="faceGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFE4C4"/>
      <stop offset="100%" style="stop-color:#DEB887"/>
    </radialGradient>
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect x="2" y="2" width="96" height="121" rx="8" fill="url(#bgGrad)" stroke="#A9A9A9" stroke-width="2"/>
  
  <!-- 頭髮 -->
  <ellipse cx="22" cy="45" rx="10" ry="16" fill="#4A4A4A" filter="url(#softShadow)"/>
  <ellipse cx="78" cy="45" rx="10" ry="16" fill="#4A4A4A" filter="url(#softShadow)"/>
  
  <!-- 脖子 -->
  <rect x="44" y="70" width="12" height="15" fill="#FFE4C4"/>
  
  <!-- 醫生袍 -->
  <path d="M35,80 L50,95 L65,80 L65,110 L35,110 Z" fill="#FFF" stroke="#E0E0E0" stroke-width="1"/>
  <path d="M50,95 L50,110" stroke="#E0E0E0" stroke-width="1"/>
  <!-- 領帶 -->
  <path d="M47,80 L53,80 L50,100 Z" fill="#DC143C"/>
  
  <!-- 頭 -->
  <circle cx="50" cy="48" r="28" fill="url(#faceGrad)" filter="url(#softShadow)"/>
  
  <!-- 瀏海 -->
  <path d="M22,35 Q35,25 50,30 Q65,25 78,35 Q72,20 50,18 Q28,20 22,35" fill="#4A4A4A"/>
  
  <!-- 眉毛 -->
  <path d="M38,40 Q42,38 46,40" fill="none" stroke="#4A4A4A" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M54,40 Q58,38 62,40" fill="none" stroke="#4A4A4A" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 眼睛 -->
  <ellipse cx="42" cy="50" rx="5" ry="5" fill="#FFF"/>
  <ellipse cx="58" cy="50" rx="5" ry="5" fill="#FFF"/>
  <circle cx="43" cy="51" r="3" fill="#4682B4"/>
  <circle cx="57" cy="51" r="3" fill="#4682B4"/>
  <circle cx="44" cy="50" r="1" fill="#FFF"/>
  <circle cx="56" cy="50" r="1" fill="#FFF"/>
  
  <!-- 眼鏡 -->
  <circle cx="42" cy="50" r="7" fill="none" stroke="#333" stroke-width="1"/>
  <circle cx="58" cy="50" r="7" fill="none" stroke="#333" stroke-width="1"/>
  <line x1="49" y1="50" x2="51" y2="50" stroke="#333" stroke-width="1"/>
  
  <!-- 鼻子 -->
  <circle cx="50" cy="58" r="1.5" fill="#DEB887"/>
  
  <!-- 嘴巴 -->
  <path d="M46,66 Q50,70 54,66" fill="none" stroke="#CD853F" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 名字 -->
  <text x="50" y="118" text-anchor="middle" font-size="9" font-weight="bold" fill="#4A4A4A">Dan</text>
</svg>