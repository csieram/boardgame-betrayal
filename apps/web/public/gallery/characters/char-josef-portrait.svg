<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 125" width="200" height="250">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC143C"/>
      <stop offset="100%" style="stop-color:#8B0000"/>
    </linearGradient>
    <radialGradient id="faceGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFE4C4"/>
      <stop offset="100%" style="stop-color:#DEB887"/>
    </radialGradient>
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect x="2" y="2" width="96" height="121" rx="8" fill="url(#bgGrad)" stroke="#8B0000" stroke-width="2"/>
  
  <!-- 頭髮 -->
  <ellipse cx="25" cy="42" rx="12" ry="16" fill="#8B7355" filter="url(#softShadow)"/>
  <ellipse cx="75" cy="42" rx="12" ry="16" fill="#8B7355" filter="url(#softShadow)"/>
  <rect x="30" y="20" width="40" height="25" rx="5" fill="#8B7355"/>
  
  <!-- 脖子 -->
  <rect x="44" y="70" width="12" height="15" fill="#FFE4C4"/>
  
  <!-- 格子襯衫領子 -->
  <path d="M35,80 L50,95 L65,80 L65,110 L35,110 Z" fill="#DC143C" stroke="#8B0000" stroke-width="1"/>
  <path d="M40,80 L45,110 M60,80 L55,110" stroke="#FFF" stroke-width="2" opacity="0.3"/>
  <path d="M50,95 L50,110" stroke="#8B0000" stroke-width="1"/>
  
  <!-- 頭 -->
  <circle cx="50" cy="48" r="28" fill="url(#faceGrad)" filter="url(#softShadow)"/>
  
  <!-- 帽子 -->
  <ellipse cx="50" cy="25" rx="30" ry="8" fill="#F4A460" stroke="#8B4513" stroke-width="2"/>
  <path d="M30,25 Q50,10 70,25" fill="#F4A460" stroke="#8B4513" stroke-width="2"/>
  
  <!-- 眉毛 -->
  <path d="M38,40 Q42,38 46,40" fill="none" stroke="#8B4513" stroke-width="2" stroke-linecap="round"/>
  <path d="M54,40 Q58,38 62,40" fill="none" stroke="#8B4513" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 眼睛 -->
  <ellipse cx="42" cy="50" rx="5" ry="5" fill="#FFF"/>
  <ellipse cx="58" cy="50" rx="5" ry="5" fill="#FFF"/>
  <circle cx="43" cy="51" r="3" fill="#4682B4"/>
  <circle cx="57" cy="51" r="3" fill="#4682B4"/>
  <circle cx="44" cy="50" r="1" fill="#FFF"/>
  <circle cx="56" cy="50" r="1" fill="#FFF"/>
  
  <!-- 鬍子 -->
  <ellipse cx="50" cy="68" rx="15" ry="8" fill="#8B7355" opacity="0.6"/>
  
  <!-- 鼻子 -->
  <circle cx="50" cy="58" r="2" fill="#DEB887"/>
  
  <!-- 嘴巴 -->
  <path d="M45,68 Q50,72 55,68" fill="none" stroke="#8B4513" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 名字 -->
  <text x="50" y="118" text-anchor="middle" font-size="8" font-weight="bold" fill="#FFF">Josef</text>
</svg>