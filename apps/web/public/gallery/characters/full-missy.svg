<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140" width="200" height="280">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF69B4"/><stop offset="100%" style="stop-color:#C71585"/>
    </linearGradient>
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- 卡牌背景 -->
  <rect x="5" y="5" width="90" height="130" rx="10" fill="url(#bgGrad)" stroke="#8B008B" stroke-width="3"/>
  <rect x="10" y="10" width="80" height="120" rx="8" fill="#FFF8DC"/>
  
  <!-- 頭髮後層（雙馬尾） -->
  <ellipse cx="28" cy="32" rx="8" ry="12" fill="#8B4513" filter="url(#softShadow)"/>
  <ellipse cx="72" cy="32" rx="8" ry="12" fill="#8B4513" filter="url(#softShadow)"/>
  
  <!-- 身體/裙子 -->
  <path d="M30,70 L70,70 L78,115 L22,115 Z" fill="#FF69B4" stroke="#C71585" stroke-width="2" filter="url(#softShadow)"/>
  <path d="M35,70 L40,115 M65,70 L60,115" fill="none" stroke="#FF1493" stroke-width="1"/>
  
  <!-- 手臂 -->
  <ellipse cx="20" cy="88" rx="5" ry="14" fill="#FFE4E1" transform="rotate(-15 20 88)"/>
  <ellipse cx="80" cy="88" rx="5" ry="14" fill="#FFE4E1" transform="rotate(15 80 88)"/>
  
  <!-- 脖子 -->
  <rect x="46" y="62" width="8" height="10" fill="#FFE4E1"/>
  
  <!-- 頭 -->
  <circle cx="50" cy="42" r="23" fill="#FFE4E1" filter="url(#softShadow)"/>
  
  <!-- 瀏海 -->
  <path d="M28,30 Q40,20 50,23 Q60,20 72,30 Q66,16 50,14 Q34,16 28,30" fill="#8B4513"/>
  
  <!-- 眉毛 -->
  <path d="M40,36 Q44,34 48,36" fill="none" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M52,36 Q56,34 60,36" fill="none" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 眼睛 -->
  <ellipse cx="43" cy="43" rx="4" ry="5" fill="#FFF"/>
  <ellipse cx="57" cy="43" rx="4" ry="5" fill="#FFF"/>
  <circle cx="44" cy="44" r="3" fill="#4682B4"/>
  <circle cx="56" cy="44" r="3" fill="#4682B4"/>
  <circle cx="44.5" cy="43" r="1" fill="#FFF"/>
  <circle cx="55.5" cy="43" r="1" fill="#FFF"/>
  
  <!-- 腮紅 -->
  <ellipse cx="37" cy="52" rx="3.5" ry="2" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="63" cy="52" rx="3.5" ry="2" fill="#FFB6C1" opacity="0.6"/>
  
  <!-- 鼻子 -->
  <circle cx="50" cy="50" r="1" fill="#FFB6C1"/>
  
  <!-- 微笑 -->
  <path d="M45,58 Q50,63 55,58" fill="none" stroke="#CD853F" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 蝴蝶結 -->
  <path d="M50,16 L44,11 L44,19 Z" fill="#FF1493" filter="url(#softShadow)"/>
  <path d="M50,16 L56,11 L56,19 Z" fill="#FF1493" filter="url(#softShadow)"/>
  <circle cx="50" cy="16" r="2" fill="#C71585"/>
  
  <!-- 裙子花邊 -->
  <path d="M22,115 L78,115" fill="none" stroke="#FF1493" stroke-width="2" stroke-dasharray="5,3"/>
  
  <!-- 名字 -->
  <text x="50" y="132" text-anchor="middle" font-size="9" font-weight="bold" fill="#8B008B">米西 Missy</text>
  <text x="50" y="138" text-anchor="middle" font-size="7" fill="#666">9歲</text>
</svg>
