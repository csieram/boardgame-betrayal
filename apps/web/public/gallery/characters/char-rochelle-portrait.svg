<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 125" width="200" height="250">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9932CC"/>
      <stop offset="100%" style="stop-color:#4B0082"/>
    </linearGradient>
    <radialGradient id="faceGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFE4E1"/>
      <stop offset="100%" style="stop-color:#FFC0CB"/>
    </radialGradient>
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect x="2" y="2" width="96" height="121" rx="8" fill="url(#bgGrad)" stroke="#4B0082" stroke-width="2"/>
  
  <!-- 頭髮 -->
  <ellipse cx="20" cy="48" rx="10" ry="20" fill="#1C1C1C" filter="url(#softShadow)"/>
  <ellipse cx="80" cy="48" rx="10" ry="20" fill="#1C1C1C" filter="url(#softShadow)"/>
  
  <!-- 脖子 -->
  <rect x="44" y="70" width="12" height="15" fill="#FFE4E1"/>
  
  <!-- 高領毛衣 -->
  <path d="M35,80 L50,95 L65,80 L65,110 L35,110 Z" fill="#4B0082" stroke="#2E0052" stroke-width="1"/>
  <path d="M50,95 L50,110" stroke="#2E0052" stroke-width="1"/>
  
  <!-- 頭 -->
  <circle cx="50" cy="48" r="28" fill="url(#faceGrad)" filter="url(#softShadow)"/>
  
  <!-- 瀏海 -->
  <path d="M22,38 Q35,28 50,32 Q65,28 78,38 Q72,22 50,20 Q28,22 22,38" fill="#1C1C1C"/>
  
  <!-- 眉毛 -->
  <path d="M38,40 Q42,38 46,40" fill="none" stroke="#1C1C1C" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M54,40 Q58,38 62,40" fill="none" stroke="#1C1C1C" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 眼睛 -->
  <ellipse cx="42" cy="50" rx="5" ry="6" fill="#FFF"/>
  <ellipse cx="58" cy="50" rx="5" ry="6" fill="#FFF"/>
  <circle cx="43" cy="51" r="3.5" fill="#9932CC"/>
  <circle cx="57" cy="51" r="3.5" fill="#9932CC"/>
  <circle cx="44" cy="50" r="1.5" fill="#FFF"/>
  <circle cx="56" cy="50" r="1.5" fill="#FFF"/>
  
  <!-- 神秘眼罩 -->
  <ellipse cx="58" cy="50" rx="6" ry="6" fill="#4B0082" opacity="0.3"/>
  
  <!-- 鼻子 -->
  <circle cx="50" cy="58" r="1.5" fill="#FFB6C1"/>
  
  <!-- 嘴巴 -->
  <path d="M46,68 Q50,72 54,68" fill="none" stroke="#CD853F" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 耳環 -->
  <circle cx="18" cy="55" r="2" fill="#FFD700"/>
  <circle cx="82" cy="55" r="2" fill="#FFD700"/>
  
  <!-- 名字 -->
  <text x="50" y="118" text-anchor="middle" font-size="8" font-weight="bold" fill="#FFF">Rochelle</text>
</svg>