<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 125" width="200" height="250">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#DAA520"/>
    </linearGradient>
    <radialGradient id="faceGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFE4C4"/>
      <stop offset="100%" style="stop-color:#DEB887"/>
    </radialGradient>
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect x="2" y="2" width="96" height="121" rx="8" fill="url(#bgGrad)" stroke="#DAA520" stroke-width="2"/>
  
  <!-- 頭髮 -->
  <ellipse cx="22" cy="48" rx="10" ry="18" fill="#8B4513" filter="url(#softShadow)"/>
  <ellipse cx="78" cy="48" rx="10" ry="18" fill="#8B4513" filter="url(#softShadow)"/>
  
  <!-- 脖子 -->
  <rect x="44" y="70" width="12" height="15" fill="#FFE4C4"/>
  
  <!-- 探險服 -->
  <path d="M35,80 L50,95 L65,80 L65,110 L35,110 Z" fill="#F4A460" stroke="#8B4513" stroke-width="1"/>
  <path d="M50,95 L50,110" stroke="#8B4513" stroke-width="1"/>
  <rect x="40" y="85" width="8" height="10" fill="#8B4513"/>
  
  <!-- 頭 -->
  <circle cx="50" cy="48" r="28" fill="url(#faceGrad)" filter="url(#softShadow)"/>
  
  <!-- 瀏海 -->
  <path d="M22,38 Q35,28 50,32 Q65,28 78,38 Q72,22 50,20 Q28,22 22,38" fill="#8B4513"/>
  
  <!-- 探險帽 -->
  <ellipse cx="50" cy="25" rx="28" ry="7" fill="#F4A460" stroke="#8B4513" stroke-width="2"/>
  <path d="M28,25 Q50,10 72,25" fill="#F4A460" stroke="#8B4513" stroke-width="2"/>
  
  <!-- 眉毛 -->
  <path d="M38,40 Q42,38 46,40" fill="none" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M54,40 Q58,38 62,40" fill="none" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 眼睛 -->
  <ellipse cx="42" cy="50" rx="5" ry="6" fill="#FFF"/>
  <ellipse cx="58" cy="50" rx="5" ry="6" fill="#FFF"/>
  <circle cx="43" cy="51" r="3.5" fill="#8B4513"/>
  <circle cx="57" cy="51" r="3.5" fill="#8B4513"/>
  <circle cx="44" cy="50" r="1.5" fill="#FFF"/>
  <circle cx="56" cy="50" r="1.5" fill="#FFF"/>
  
  <!-- 鼻子 -->
  <circle cx="50" cy="58" r="1.5" fill="#DEB887"/>
  
  <!-- 微笑 -->
  <path d="M44,66 Q50,72 56,66" fill="none" stroke="#CD853F" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 名字 -->
  <text x="50" y="118" text-anchor="middle" font-size="8" font-weight="bold" fill="#8B4513">Anita</text>
</svg>