<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 200" width="300" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4169E1"/>
      <stop offset="100%" style="stop-color:#1E3A8A"/>
    </linearGradient>
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect x="5" y="5" width="140" height="190" rx="12" fill="url(#bgGrad)" stroke="#1E3A8A" stroke-width="3"/>
  <rect x="12" y="12" width="126" height="176" rx="8" fill="#F0F8FF"/>
  
  <!-- 頭髮後層 -->
  <ellipse cx="45" cy="50" rx="18" ry="25" fill="#2F1B14" filter="url(#softShadow)"/>
  <ellipse cx="105" cy="50" rx="18" ry="25" fill="#2F1B14" filter="url(#softShadow)"/>
  
  <!-- 身體/實驗室外套 -->
  <path d="M40,100 L110,100 L120,170 L30,170 Z" fill="#FFF" stroke="#E0E0E0" stroke-width="2" filter="url(#softShadow)"/>
  <path d="M75,100 L75,170" stroke="#E0E0E0" stroke-width="1"/>
  
  <!-- 口袋 -->
  <rect x="45" y="130" width="20" height="15" fill="none" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="85" y="130" width="20" height="15" fill="none" stroke="#E0E0E0" stroke-width="1"/>
  
  <!-- 手臂 -->
  <ellipse cx="28" cy="130" rx="10" ry="25" fill="#FFE4E1" transform="rotate(-15 28 130)"/>
  <ellipse cx="122" cy="130" rx="10" ry="25" fill="#FFE4E1" transform="rotate(15 122 130)"/>
  
  <!-- 試管 -->
  <rect x="115" y="110" width="6" height="25" fill="#87CEEB" stroke="#4682B4" stroke-width="1" opacity="0.7"/>
  <rect x="115" y="125" width="6" height="10" fill="#32CD32" opacity="0.5"/>
  
  <!-- 脖子 -->
  <rect x="65" y="85" width="20" height="18" fill="#FFE4E1"/>
  
  <!-- 頭 -->
  <circle cx="75" cy="60" r="32" fill="#FFE4E1" filter="url(#softShadow)"/>
  
  <!-- 瀏海 -->
  <path d="M38,45 Q55,32 75,38 Q95,32 112,45 Q105,25 75,22 Q45,25 38,45" fill="#2F1B14"/>
  
  <!-- 眉毛 -->
  <path d="M60,52 Q65,50 70,52" fill="none" stroke="#2F1B14" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M80,52 Q85,50 90,52" fill="none" stroke="#2F1B14" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 眼睛 -->
  <ellipse cx="65" cy="62" rx="6" ry="7" fill="#FFF"/>
  <ellipse cx="85" cy="62" rx="6" ry="7" fill="#FFF"/>
  <circle cx="66" cy="63" r="4" fill="#4169E1"/>
  <circle cx="84" cy="63" r="4" fill="#4169E1"/>
  <circle cx="67" cy="62" r="1.5" fill="#FFF"/>
  <circle cx="83" cy="62" r="1.5" fill="#FFF"/>
  
  <!-- 眼鏡 -->
  <circle cx="65" cy="62" r="10" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="85" cy="62" r="10" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="75" y1="62" x2="75" y2="62" stroke="#333" stroke-width="2"/>
  <line x1="55" y1="60" x2="35" y2="55" stroke="#333" stroke-width="1.5"/>
  <line x1="95" y1="60" x2="115" y2="55" stroke="#333" stroke-width="1.5"/>
  
  <!-- 鼻子 -->
  <circle cx="75" cy="72" r="2" fill="#FFB6C1"/>
  
  <!-- 嘴巴 -->
  <path d="M68,85 Q75,90 82,85" fill="none" stroke="#CD853F" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 名字 -->
  <text x="75" y="188" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E3A8A">Persephone Fauci</text>
</svg>