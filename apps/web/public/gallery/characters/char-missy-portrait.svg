<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF69B4"/><stop offset="100%" style="stop-color:#C71585"/>
    </linearGradient>
    <radialGradient id="faceGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFE4E1"/><stop offset="100%" style="stop-color:#FFC0CB"/>
    </radialGradient>
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="1" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- 背景圓形 -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)" stroke="#8B008B" stroke-width="2"/>
  
  <!-- 頭髮後層 -->
  <ellipse cx="25" cy="45" rx="12" ry="15" fill="#8B4513" filter="url(#softShadow)"/>
  <ellipse cx="75" cy="45" rx="12" ry="15" fill="#8B4513" filter="url(#softShadow)"/>
  
  <!-- 臉 -->
  <circle cx="50" cy="50" r="28" fill="url(#faceGrad)" filter="url(#softShadow)"/>
  
  <!-- 瀏海 -->
  <path d="M25,35 Q35,25 50,28 Q65,25 75,35 Q70,20 50,18 Q30,20 25,35" fill="#8B4513"/>
  
  <!-- 眉毛 -->
  <path d="M38,40 Q42,38 46,40" fill="none" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M54,40 Q58,38 62,40" fill="none" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 眼睛 -->
  <ellipse cx="42" cy="48" rx="5" ry="6" fill="#FFF"/>
  <ellipse cx="58" cy="48" rx="5" ry="6" fill="#FFF"/>
  <circle cx="43" cy="49" r="3.5" fill="#4682B4"/>
  <circle cx="57" cy="49" r="3.5" fill="#4682B4"/>
  <circle cx="44" cy="48" r="1.5" fill="#FFF"/>
  <circle cx="56" cy="48" r="1.5" fill="#FFF"/>
  
  <!-- 腮紅 -->
  <ellipse cx="35" cy="58" rx="5" ry="3" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="65" cy="58" rx="5" ry="3" fill="#FFB6C1" opacity="0.6"/>
  
  <!-- 鼻子 -->
  <circle cx="50" cy="55" r="1.5" fill="#FFB6C1"/>
  
  <!-- 嘴巴 -->
  <path d="M44,64 Q50,70 56,64" fill="none" stroke="#CD853F" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 蝴蝶結 -->
  <path d="M50,22 L40,15 L40,25 Z" fill="#FF1493" filter="url(#softShadow)"/>
  <path d="M50,22 L60,15 L60,25 Z" fill="#FF1493" filter="url(#softShadow)"/>
  <circle cx="50" cy="22" r="3" fill="#C71585"/>
</svg>
