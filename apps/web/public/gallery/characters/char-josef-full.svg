<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 200" width="300" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC143C"/>
      <stop offset="100%" style="stop-color:#8B0000"/>
    </linearGradient>
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect x="5" y="5" width="140" height="190" rx="12" fill="url(#bgGrad)" stroke="#8B0000" stroke-width="3"/>
  <rect x="12" y="12" width="126" height="176" rx="8" fill="#FFF8DC"/>
  
  <!-- 頭髮 -->
  <ellipse cx="45" cy="48" rx="15" ry="20" fill="#8B7355" filter="url(#softShadow)"/>
  <ellipse cx="105" cy="48" rx="15" ry="20" fill="#8B7355" filter="url(#softShadow)"/>
  <rect x="45" y="22" width="60" height="30" rx="8" fill="#8B7355"/>
  
  <!-- 身體/格子襯衫 -->
  <path d="M40,100 L110,100 L120,170 L30,170 Z" fill="#DC143C" stroke="#8B0000" stroke-width="2" filter="url(#softShadow)"/>
  <!-- 格子圖案 -->
  <line x1="50" y1="100" x2="45" y2="170" stroke="#FFF" stroke-width="1.5" opacity="0.4"/>
  <line x1="65" y1="100" x2="60" y2="170" stroke="#FFF" stroke-width="1.5" opacity="0.4"/>
  <line x1="80" y1="100" x2="80" y2="170" stroke="#FFF" stroke-width="1.5" opacity="0.4"/>
  <line x1="95" y1="100" x2="100" y2="170" stroke="#FFF" stroke-width="1.5" opacity="0.4"/>
  <line x1="40" y1="120" x2="110" y2="120" stroke="#FFF" stroke-width="1.5" opacity="0.4"/>
  <line x1="35" y1="145" x2="115" y2="145" stroke="#FFF" stroke-width="1.5" opacity="0.4"/>
  <path d="M75,100 L75,170" stroke="#8B0000" stroke-width="1"/>
  
  <!-- 背帶 -->
  <rect x="48" y="100" width="8" height="70" fill="#8B4513"/>
  <rect x="94" y="100" width="8" height="70" fill="#8B4513"/>
  
  <!-- 手臂 -->
  <ellipse cx="28" cy="130" rx="12" ry="28" fill="#FFE4C4" transform="rotate(-10 28 130)"/>
  <ellipse cx="122" cy="130" rx="12" ry="28" fill="#FFE4C4" transform="rotate(10 122 130)"/>
  
  <!-- 草叉 -->
  <line x1="125" y1="80" x2="115" y2="170" stroke="#8B4513" stroke-width="4"/>
  <path d="M115,80 L110,60 M115,80 L115,55 M115,80 L120,60" stroke="#696969" stroke-width="3" fill="none"/>
  
  <!-- 脖子 -->
  <rect x="65" y="85" width="20" height="18" fill="#FFE4C4"/>
  
  <!-- 頭 -->
  <circle cx="75" cy="62" r="32" fill="#FFE4C4" filter="url(#softShadow)"/>
  
  <!-- 帽子 -->
  <ellipse cx="75" cy="32" rx="35" ry="10" fill="#F4A460" stroke="#8B4513" stroke-width="2"/>
  <path d="M45,32 Q75,12 105,32" fill="#F4A460" stroke="#8B4513" stroke-width="2"/>
  
  <!-- 眉毛 -->
  <path d="M60,52 Q65,49 70,52" fill="none" stroke="#8B4513" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M80,52 Q85,49 90,52" fill="none" stroke="#8B4513" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- 眼睛 -->
  <ellipse cx="65" cy="64" rx="6" ry="6" fill="#FFF"/>
  <ellipse cx="85" cy="64" rx="6" ry="6" fill="#FFF"/>
  <circle cx="66" cy="65" r="3.5" fill="#4682B4"/>
  <circle cx="84" cy="65" r="3.5" fill="#4682B4"/>
  <circle cx="67" cy="64" r="1.2" fill="#FFF"/>
  <circle cx="83" cy="64" r="1.2" fill="#FFF"/>
  
  <!-- 鬍子 -->
  <ellipse cx="75" cy="88" rx="18" ry="10" fill="#8B7355" opacity="0.7"/>
  
  <!-- 鼻子 -->
  <circle cx="75" cy="75" r="2.5" fill="#DEB887"/>
  
  <!-- 嘴巴 -->
  <path d="M68,88 Q75,93 82,88" fill="none" stroke="#8B4513" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 名字 -->
  <text x="75" y="188" text-anchor="middle" font-size="10" font-weight="bold" fill="#8B0000">Josef Billy-Bob Hooper</text>
</svg>