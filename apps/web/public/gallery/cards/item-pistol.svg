<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 210" width="150" height="210">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3D7AB8"/><stop offset="100%" style="stop-color:#1E5A8B"/>
    </linearGradient>
    <linearGradient id="gunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A4A4A"/><stop offset="100%" style="stop-color:#1A1A1A"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect x="5" y="5" width="140" height="200" rx="12" fill="url(#cardBg)" stroke="#5A9AD8" stroke-width="3"/>
  <rect x="12" y="12" width="126" height="186" rx="8" fill="none" stroke="#7AB8E8" stroke-width="1"/>
  
  <rect x="55" y="18" width="40" height="18" rx="9" fill="#5A9AD8"/>
  <text x="75" y="31" text-anchor="middle" font-size="10" fill="#FFF" font-weight="bold">物品</text>
  
  <!-- 手槍 -->
  <g transform="translate(75, 100) scale(1.3) rotate(-15)" filter="url(#shadow)">
    <rect x="-25" y="-8" width="50" height="16" fill="url(#gunGrad)" rx="2"/>
    <rect x="15" y="-6" width="20" height="12" fill="url(#gunGrad)" rx="1"/>
    <rect x="-20" y="8" width="15" height="20" fill="#5A3A1A" rx="2"/>
    <rect x="-8" y="-12" width="8" height="4" fill="#333"/>
  </g>
  
  <text x="75" y="170" text-anchor="middle" font-size="14" fill="#FFF" font-weight="bold">手槍</text>
  <text x="75" y="188" text-anchor="middle" font-size="11" fill="#B8D8F8">Pistol</text>
  <circle cx="75" cy="200" r="3" fill="#5A9AD8"/>
</svg>
