<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#2A2A1A"/>
  
  <!-- Frame -->
  <rect x="5" y="5" width="190" height="190" fill="none" stroke="#2F4F4F" stroke-width="4"/>
  
  <!-- Dramatic shadow overlay -->
  <defs>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  
  <!-- Neck -->
  <rect x="85" y="130" width="30" height="25" fill="#E5C4A8"/>
  
  <!-- Shirt collar -->
  <path d="M75 145 L100 162 L125 145 L125 155 L100 172 L75 155 Z" fill="#2C3E50"/>
  
  <!-- Face shape -->
  <ellipse cx="100" cy="95" rx="37" ry="45" fill="#E5C4A8"/>
  
  <!-- Ears -->
  <ellipse cx="63" cy="95" rx="7" ry="11" fill="#E5C4A8"/>
  <ellipse cx="137" cy="95" rx="7" ry="11" fill="#E5C4A8"/>
  
  <!-- Hair - neat black -->
  <path d="M63 88 Q59 55 73 43 Q86 33 100 33 Q114 33 127 43 Q141 55 137 88 Q139 70 131 56 Q117 41 100 41 Q83 41 69 56 Q61 70 63 88" fill="#1A1A1A"/>
  <path d="M68 56 Q84 47 100 49 Q116 47 132 56" fill="none" stroke="#0F0F0F" stroke-width="2"/>
  
  <!-- Glasses - rectangular frames -->
  <rect x="72" y="84" width="26" height="18" rx="2" fill="none" stroke="#1A1A1A" stroke-width="2.5"/>
  <rect x="102" y="84" width="26" height="18" rx="2" fill="none" stroke="#1A1A1A" stroke-width="2.5"/>
  <line x1="98" y1="93" x2="102" y2="93" stroke="#1A1A1A" stroke-width="2"/>
  <line x1="72" y1="90" x2="65" y2="87" stroke="#1A1A1A" stroke-width="1.5"/>
  <line x1="128" y1="90" x2="135" y2="87" stroke="#1A1A1A" stroke-width="1.5"/>
  
  <!-- Eyes behind glasses - serious -->
  <ellipse cx="85" cy="93" rx="6" ry="4" fill="#D4C4B4"/>
  <ellipse cx="115" cy="93" rx="6" ry="4" fill="#D4C4B4"/>
  <circle cx="85" cy="93" r="3.5" fill="#3D3225"/>
  <circle cx="115" cy="93" r="3.5" fill="#3D3225"/>
  <circle cx="86" cy="92" r="1" fill="#FFF" opacity="0.5"/>
  <circle cx="116" cy="92" r="1" fill="#FFF" opacity="0.5"/>
  
  <!-- Eyebrows - serious, focused -->
  <path d="M78 82 Q85 80 92 82" stroke="#1A1A1A" stroke-width="2.5" fill="none"/>
  <path d="M108 82 Q115 80 122 82" stroke="#1A1A1A" stroke-width="2.5" fill="none"/>
  
  <!-- Nose -->
  <path d="M100 97 L97 112 L103 112 Z" fill="#D4A880"/>
  
  <!-- Mouth - serious, contemplative -->
  <path d="M90 122 Q100 120 110 122" stroke="#C49570" stroke-width="2.5" fill="none"/>
  
  <!-- Dramatic shadows -->
  <ellipse cx="75" cy="105" rx="15" ry="20" fill="#000" opacity="0.15"/>
  <ellipse cx="125" cy="105" rx="15" ry="20" fill="#000" opacity="0.15"/>
  
  <!-- Shadow overlay -->
  <rect width="200" height="200" fill="url(#shadow)"/>
</svg>