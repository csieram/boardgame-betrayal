<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#B0C4DE"/>
  
  <!-- Frame -->
  <rect x="5" y="5" width="190" height="190" fill="none" stroke="#191970" stroke-width="4"/>
  
  <!-- Dramatic shadow overlay -->
  <defs>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  
  <!-- Neck -->
  <rect x="85" y="130" width="30" height="22" fill="#D4B896"/>
  
  <!-- Priest collar -->
  <rect x="75" y="145" width="50" height="15" fill="#F5F5F5"/>
  <rect x="95" y="145" width="10" height="15" fill="#1A1A1A"/>
  
  <!-- Face shape - aged -->
  <ellipse cx="100" cy="95" rx="38" ry="44" fill="#D4B896"/>
  
  <!-- Wrinkles - more pronounced -->
  <path d="M75 85 Q85 88 95 85" stroke="#C4A886" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M105 85 Q115 88 125 85" stroke="#C4A886" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M85 70 Q100 73 115 70" stroke="#C4A886" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M90 105 Q100 108 110 105" stroke="#C4A886" stroke-width="1" fill="none" opacity="0.4"/>
  
  <!-- Ears -->
  <ellipse cx="62" cy="95" rx="7" ry="10" fill="#D4B896"/>
  <ellipse cx="138" cy="95" rx="7" ry="10" fill="#D4B896"/>
  
  <!-- Gray/white hair - receding -->
  <path d="M62 92 Q60 60 75 50 Q88 42 100 42 Q112 42 125 50 Q140 60 138 92 Q138 72 128 58 Q115 48 100 48 Q85 48 72 58 Q62 72 62 92" fill="#A0A0A0"/>
  <path d="M75 52 Q88 58 100 56 Q112 58 125 52" fill="none" stroke="#909090" stroke-width="2"/>
  
  <!-- Eyes - serious, solemn -->
  <ellipse cx="87" cy="92" rx="6" ry="5" fill="#E8D8C8"/>
  <ellipse cx="113" cy="92" rx="6" ry="5" fill="#E8D8C8"/>
  <circle cx="87" cy="92" r="3.5" fill="#5D4E37"/>
  <circle cx="113" cy="92" r="3.5" fill="#5D4E37"/>
  <circle cx="88" cy="91" r="1.2" fill="#FFF" opacity="0.5"/>
  <circle cx="114" cy="91" r="1.2" fill="#FFF" opacity="0.5"/>
  
  <!-- Eyebrows - bushy, gray -->
  <path d="M81 84 Q87 82 93 84" stroke="#A0A0A0" stroke-width="3" fill="none"/>
  <path d="M107 84 Q113 82 119 84" stroke="#A0A0A0" stroke-width="3" fill="none"/>
  
  <!-- Nose -->
  <path d="M100 96 L97 112 L103 112 Z" fill="#C4A886"/>
  
  <!-- Mouth - solemn, serious -->
  <path d="M88 120 Q100 118 112 120" stroke="#B49576" stroke-width="2.5" fill="none"/>
  
  <!-- Rosary hint -->
  <circle cx="100" cy="168" r="4" fill="#8B7355"/>
  
  <!-- Dramatic shadows -->
  <ellipse cx="75" cy="105" rx="15" ry="20" fill="#000" opacity="0.15"/>
  <ellipse cx="125" cy="105" rx="15" ry="20" fill="#000" opacity="0.15"/>
  
  <!-- Shadow overlay -->
  <rect width="200" height="200" fill="url(#shadow)"/>
</svg>