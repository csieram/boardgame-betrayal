<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#2A2A1A"/>
  
  <!-- Frame -->
  <rect x="5" y="5" width="190" height="190" fill="none" stroke="#8B4513" stroke-width="4"/>
  
  <!-- Dramatic shadow overlay -->
  <defs>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  
  <!-- Neck -->
  <rect x="85" y="130" width="30" height="25" fill="#C4956A"/>
  
  <!-- Shirt collar -->
  <path d="M75 145 L100 162 L125 145 L125 155 L100 172 L75 155 Z" fill="#5D4037"/>
  
  <!-- Face shape - more realistic proportions -->
  <ellipse cx="100" cy="95" rx="38" ry="46" fill="#C4956A"/>
  
  <!-- Ears -->
  <ellipse cx="62" cy="95" rx="7" ry="11" fill="#C4956A"/>
  <ellipse cx="138" cy="95" rx="7" ry="11" fill="#C4956A"/>
  
  <!-- Hair - messy brown, realistic -->
  <path d="M62 88 Q58 55 72 42 Q85 32 100 32 Q115 32 128 42 Q142 55 138 88 Q140 70 132 55 Q118 40 100 40 Q82 40 68 55 Q60 70 62 88" fill="#4A3728"/>
  <path d="M65 55 Q80 45 100 48 Q120 45 135 55" fill="none" stroke="#3D2E22" stroke-width="2"/>
  
  <!-- Eyes - serious, determined -->
  <ellipse cx="85" cy="90" rx="7" ry="5" fill="#E8D5C4"/>
  <ellipse cx="115" cy="90" rx="7" ry="5" fill="#E8D5C4"/>
  <circle cx="85" cy="90" r="4" fill="#2C5F6F"/>
  <circle cx="115" cy="90" r="4" fill="#2C5F6F"/>
  <circle cx="86" cy="89" r="1.5" fill="#FFF" opacity="0.6"/>
  <circle cx="116" cy="89" r="1.5" fill="#FFF" opacity="0.6"/>
  
  <!-- Eyebrows - furrowed, serious -->
  <path d="M78 82 Q85 84 92 81" stroke="#4A3728" stroke-width="3" fill="none"/>
  <path d="M108 81 Q115 84 122 82" stroke="#4A3728" stroke-width="3" fill="none"/>
  
  <!-- Nose - realistic -->
  <path d="M100 95 L97 112 L103 112 Z" fill="#B0855A"/>
  <path d="M96 110 Q100 115 104 110" stroke="#A07550" stroke-width="1" fill="none"/>
  
  <!-- Mouth - serious, closed -->
  <path d="M88 122 Q100 120 112 122" stroke="#A07550" stroke-width="2.5" fill="none"/>
  
  <!-- Dramatic shadows -->
  <ellipse cx="75" cy="105" rx="15" ry="20" fill="#000" opacity="0.15"/>
  <ellipse cx="125" cy="105" rx="15" ry="20" fill="#000" opacity="0.15"/>
  
  <!-- Shadow overlay -->
  <rect width="200" height="200" fill="url(#shadow)"/>
</svg>