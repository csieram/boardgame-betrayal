<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background - academic brown -->
  <rect width="200" height="200" fill="#5D4E37"/>
  
  <!-- Neck -->
  <rect x="87" y="130" width="26" height="20" fill="#F5D0C5"/>
  
  <!-- Academic gown/turtleneck -->
  <path d="M78 142 L100 155 L122 142 L125 150 L100 165 L75 150 Z" fill="#2C3E50"/>
  
  <!-- Face shape - wise, aged -->
  <ellipse cx="100" cy="92" rx="36" ry="42" fill="#F5D0C5"/>
  
  <!-- Wrinkles - wise lines -->
  <path d="M78 78 Q85 76 92 78" stroke="#D4A8A0" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M108 78 Q115 76 122 78" stroke="#D4A8A0" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M82 65 Q100 68 118 65" stroke="#D4A8A0" stroke-width="1" fill="none" opacity="0.4"/>
  
  <!-- Ears -->
  <ellipse cx="64" cy="92" rx="6" ry="10" fill="#F5D0C5"/>
  <ellipse cx="136" cy="92" rx="6" ry="10" fill="#F5D0C5"/>
  
  <!-- Gray hair - distinguished professor -->
  <path d="M64 88 Q62 58 75 48 Q88 38 100 38 Q112 38 125 48 Q138 58 136 88 Q138 70 130 56 Q116 42 100 42 Q84 42 70 56 Q62 70 64 88" fill="#808080"/>
  <path d="M70 52 Q85 45 100 47 Q115 45 130 52" fill="none" stroke="#606060" stroke-width="2"/>
  
  <!-- Glasses - round academic frames -->
  <circle cx="88" cy="88" r="12" fill="none" stroke="#2C3E50" stroke-width="2"/>
  <circle cx="112" cy="88" r="12" fill="none" stroke="#2C3E50" stroke-width="2"/>
  <line x1="100" y1="88" x2="100" y2="88" stroke="#2C3E50" stroke-width="2"/>
  <line x1="76" y1="85" x2="64" y2="82" stroke="#2C3E50" stroke-width="1.5"/>
  <line x1="124" y1="85" x2="136" y2="82" stroke="#2C3E50" stroke-width="1.5"/>
  
  <!-- Eyes behind glasses -->
  <ellipse cx="88" cy="88" rx="5" ry="4" fill="#FFF"/>
  <ellipse cx="112" cy="88" rx="5" ry="4" fill="#FFF"/>
  <circle cx="88" cy="88" r="3" fill="#5D4E37"/>
  <circle cx="112" cy="88" r="3" fill="#5D4E37"/>
  <circle cx="89" cy="87" r="1" fill="#FFF"/>
  <circle cx="113" cy="87" r="1" fill="#FFF"/>
  
  <!-- Eyebrows - gray, thoughtful -->
  <path d="M82 78 Q88 76 94 78" stroke="#808080" stroke-width="2" fill="none"/>
  <path d="M106 78 Q112 76 118 78" stroke="#808080" stroke-width="2" fill="none"/>
  
  <!-- Nose -->
  <path d="M100 92 L97 106 L103 106 Z" fill="#E5B8A8"/>
  
  <!-- Mouth - wise, gentle smile -->
  <path d="M92 115 Q100 118 108 115" stroke="#C98B7A" stroke-width="2" fill="none"/>
  
  <!-- Bow tie -->
  <path d="M92 148 L100 152 L108 148 L108 154 L100 158 L92 154 Z" fill="#8B4513"/>
</svg>