<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140" width="200" height="280">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF69B4"/><stop offset="100%" style="stop-color:#C71585"/>
    </linearGradient>
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- 卡牌背景 -->
  <rect x="5" y="5" width="90" height="130" rx="10" fill="url(#bgGrad)" stroke="#8B008B" stroke-width="3"/>
  <rect x="10" y="10" width="80" height="120" rx="8" fill="#FFF8DC"/>
  
  <!-- 頭髮後層 -->
  <ellipse cx="30" cy="35" rx="10" ry="12" fill="#8B4513" filter="url(#softShadow)"/>
  <ellipse cx="70" cy="35" rx="10" ry="12" fill="#8B4513" filter="url(#softShadow)"/>
  
  <!-- 身體/衣服 -->
  <path d="M30,75 L70,75 L75,115 L25,115 Z" fill="#FF69B4" stroke="#C71585" stroke-width="2" filter="url(#softShadow)"/>
  <path d="M35,75 L40,115 M65,75 L60,115" fill="none" stroke="#FF1493" stroke-width="1"/>
  
  <!-- 手臂 -->
  <ellipse cx="22" cy="90" rx="6" ry="15" fill="#FFE4E1" transform="rotate(-20 22 90)"/>
  <ellipse cx="78" cy="90" rx="6" ry="15" fill="#FFE4E1" transform="rotate(20 78 90)"/>
  
  <!-- 脖子 -->
  <rect x="45" y="65" width="10" height="12" fill="#FFE4E1"/>
  
  <!-- 頭 -->
  <circle cx="50" cy="45" r="25" fill="#FFE4E1" filter="url(#softShadow)"/>
  
  <!-- 瀏海 -->
  <path d="M28,32 Q38,22 50,25 Q62,22 72,32 Q68,18 50,16 Q32,18 28,32" fill="#8B4513"/>
  
  <!-- 眉毛 -->
  <path d="M40,38 Q44,36 48,38" fill="none" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M52,38 Q56,36 60,38" fill="none" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 眼睛 -->
  <ellipse cx="43" cy="45" rx="4" ry="5" fill="#FFF"/>
  <ellipse cx="57" cy="45" rx="4" ry="5" fill="#FFF"/>
  <circle cx="44" cy="46" r="3" fill="#4682B4"/>
  <circle cx="56" cy="46" r="3" fill="#4682B4"/>
  <circle cx="44.5" cy="45" r="1" fill="#FFF"/>
  <circle cx="55.5" cy="45" r="1" fill="#FFF"/>
  
  <!-- 腮紅 -->
  <ellipse cx="36" cy="54" rx="4" ry="2.5" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="64" cy="54" rx="4" ry="2.5" fill="#FFB6C1" opacity="0.6"/>
  
  <!-- 鼻子 -->
  <circle cx="50" cy="52" r="1.2" fill="#FFB6C1"/>
  
  <!-- 嘴巴 -->
  <path d="M45,60 Q50,65 55,60" fill="none" stroke="#CD853F" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 蝴蝶結 -->
  <path d="M50,18 L42,12 L42,22 Z" fill="#FF1493" filter="url(#softShadow)"/>
  <path d="M50,18 L58,12 L58,22 Z" fill="#FF1493" filter="url(#softShadow)"/>
  <circle cx="50" cy="18" r="2.5" fill="#C71585"/>
  
  <!-- 裙子細節 -->
  <path d="M25,115 L30,125 L35,115 L40,125 L45,115 L50,125 L55,115 L60,125 L65,115 L70,125 L75,115" fill="#FF1493" opacity="0.5"/>
  
  <!-- 名字 -->
  <text x="50" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="#8B008B">米西 Missy</text>
</svg>
