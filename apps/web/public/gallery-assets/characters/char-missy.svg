<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140" width="200" height="280">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF69B4"/><stop offset="100%" style="stop-color:#C71585"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- 卡牌背景 -->
  <rect x="5" y="5" width="90" height="130" rx="10" fill="url(#bgGrad)" stroke="#8B008B" stroke-width="3"/>
  <rect x="10" y="10" width="80" height="120" rx="8" fill="#FFF8DC"/>
  
  <!-- 頭像圓形 -->
  <circle cx="50" cy="45" r="30" fill="#FFE4E1" stroke="#FFB6C1" stroke-width="2"/>
  
  <!-- 髮型 - 雙馬尾小女孩 -->
  <path d="M20,35 Q25,15 50,15 Q75,15 80,35" fill="#8B4513" stroke="#654321" stroke-width="1"/>
  <circle cx="15" cy="40" r="8" fill="#8B4513"/>
  <circle cx="85" cy="40" r="8" fill="#8B4513"/>
  
  <!-- 瀏海 -->
  <path d="M35,25 Q50,20 65,25" fill="none" stroke="#8B4513" stroke-width="3"/>
  
  <!-- 眼睛 -->
  <circle cx="40" cy="45" r="4" fill="#4682B4"/>
  <circle cx="60" cy="45" r="4" fill="#4682B4"/>
  <circle cx="41" cy="44" r="1.5" fill="#FFF"/>
  <circle cx="61" cy="44" r="1.5" fill="#FFF"/>
  
  <!-- 微笑 -->
  <path d="M42,55 Q50,62 58,55" fill="none" stroke="#CD853F" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 衣服 -->
  <path d="M25,75 L75,75 L80,110 L20,110 Z" fill="#FF69B4" stroke="#C71585" stroke-width="2"/>
  
  <!-- 名字 -->
  <text x="50" y="125" text-anchor="middle" font-size="10" font-weight="bold" fill="#8B008B">米西 Missy</text>
  <text x="50" y="135" text-anchor="middle" font-size="8" fill="#666">9歲</text>
</svg>
