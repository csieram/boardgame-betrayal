<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#5A4A3A"/><stop offset="50%" style="stop-color:#3A2A1A"/><stop offset="100%" style="stop-color:#1A0A00"/></linearGradient>
    <pattern id="woodPattern" x="0" y="0" width="8" height="40" patternUnits="userSpaceOnUse"><rect width="8" height="40" fill="url(#floorGrad)"/><line x1="0" y1="0" x2="0" y2="40" stroke="#1A0A00" stroke-width="0.3"/></pattern>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#5A3A1A"/><stop offset="50%" style="stop-color:#7B5B3B"/><stop offset="100%" style="stop-color:#4A2A0A"/></linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#FFD700"/><stop offset="50%" style="stop-color:#B8860B"/><stop offset="100%" style="stop-color:#D4AF37"/></linearGradient>
    <linearGradient id="carpetGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#8B0000"/><stop offset="100%" style="stop-color:#4A0000"/></linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/><feOffset in="blur" dx="2" dy="2" result="offsetBlur"/><feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer><feMerge><feMergeNode in="offsetBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="30" y="8" width="40" height="84" fill="url(#woodPattern)" stroke="#0A0000" stroke-width="2"/>
  <g filter="url(#softShadow)">
    <rect x="38" y="-4" width="24" height="16" fill="#1A0A00"/>
    <rect x="40" y="-2" width="20" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="-2" x2="50" y2="12" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="40" y="-2" width="20" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="6" r="2" fill="url(#goldTrim)"/>
    <circle cx="55" cy="6" r="1" fill="#B8860B"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="38" y="88" width="24" height="16" fill="#1A0A00"/>
    <rect x="40" y="90" width="20" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="90" x2="50" y2="104" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="40" y="90" width="20" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="94" r="2" fill="url(#goldTrim)"/>
    <circle cx="55" cy="94" r="1" fill="#B8860B"/>
  </g>
  <rect x="35" y="15" width="30" height="70" fill="url(#carpetGrad)" opacity="0.4" filter="url(#softShadow)"/>
  <rect x="32" y="25" width="6" height="10" fill="#D4AF37" stroke="#8B7355" filter="url(#softShadow)"/>
  <rect x="32" y="45" width="6" height="10" fill="#D4AF37" stroke="#8B7355" filter="url(#softShadow)"/>
  <rect x="62" y="30" width="6" height="10" fill="#D4AF37" stroke="#8B7355" filter="url(#softShadow)"/>
  <rect x="62" y="55" width="6" height="10" fill="#D4AF37" stroke="#8B7355" filter="url(#softShadow)"/>
  <circle cx="35" cy="70" r="3" fill="#FFD700" opacity="0.4"/>
  <circle cx="65" cy="70" r="3" fill="#FFD700" opacity="0.4"/>
</svg>
