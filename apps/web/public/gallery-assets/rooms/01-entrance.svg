<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="300" height="300">
  <defs>
    <linearGradient id="floor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B6354"/>
      <stop offset="100%" style="stop-color:#5A4A3A"/>
    </linearGradient>
  </defs>
  <!-- 地板 -->
  <rect x="8" y="8" width="84" height="84" fill="url(#floor)" stroke="#4A3728" stroke-width="2"/>
  
  <!-- 門: 北 -->
  <rect x="40" y="-2" width="20" height="12" fill="#3D2B1A" stroke="#2A1A0A" stroke-width="2"/>
  <rect x="42" y="0" width="16" height="10" fill="#7B5B3B" stroke="#A08060" stroke-width="2"/>
  <rect x="44" y="2" width="12" height="6" fill="#5A4A3A" opacity="0.8"/>
  
  <!-- 門: 東 -->
  <rect x="90" y="40" width="12" height="20" fill="#3D2B1A" stroke="#2A1A0A" stroke-width="2"/>
  <rect x="90" y="42" width="10" height="16" fill="#7B5B3B" stroke="#A08060" stroke-width="2"/>
  <rect x="92" y="44" width="6" height="12" fill="#5A4A3A" opacity="0.8"/>
  
  <!-- 門: 西 -->
  <rect x="-2" y="40" width="12" height="20" fill="#3D2B1A" stroke="#2A1A0A" stroke-width="2"/>
  <rect x="0" y="42" width="10" height="16" fill="#7B5B3B" stroke="#A08060" stroke-width="2"/>
  <rect x="2" y="44" width="6" height="12" fill="#5A4A3A" opacity="0.8"/>
  
  <!-- 中央區域 -->
  <rect x="20" y="20" width="60" height="60" fill="#8B7355" stroke="#6B5344" stroke-width="1" opacity="0.5"/>
  
  <!-- 吊燈 -->
  <line x1="50" y1="20" x2="50" y2="35" stroke="#D4AF37" stroke-width="2"/>
  <circle cx="50" cy="42" r="10" fill="#FFD700" opacity="0.5"/>
  <circle cx="50" cy="42" r="6" fill="#FFF8DC" opacity="0.8"/>
  
  <!-- 樓梯 -->
  <rect x="25" y="55" width="50" height="20" fill="#6B5344" stroke="#4A3728"/>
  <line x1="25" y1="60" x2="75" y2="60" stroke="#3A2A1A" stroke-width="1"/>
  <line x1="25" y1="67" x2="75" y2="67" stroke="#3A2A1A" stroke-width="1"/>
  <line x1="25" y1="74" x2="75" y2="74" stroke="#3A2A1A" stroke-width="1"/>
</svg>
