<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#4A4A4A"/><stop offset="50%" style="stop-color:#2A2A2A"/><stop offset="100%" style="stop-color:#0A0A0A"/></linearGradient>
    <pattern id="stonePattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><rect width="20" height="20" fill="url(#floorGrad)"/><line x1="0" y1="0" x2="20" y2="20" stroke="#3A3A3A" stroke-width="0.5" opacity="0.4"/><line x1="20" y1="0" x2="0" y2="20" stroke="#3A3A3A" stroke-width="0.5" opacity="0.4"/></pattern>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#5A3A1A"/><stop offset="50%" style="stop-color:#7B5B3B"/><stop offset="100%" style="stop-color:#4A2A0A"/></linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#FFD700"/><stop offset="50%" style="stop-color:#B8860B"/><stop offset="100%" style="stop-color:#D4AF37"/></linearGradient>
    <linearGradient id="barrelGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#8B7355"/><stop offset="100%" style="stop-color:#4A3728"/></linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/><feOffset in="blur" dx="2" dy="2" result="offsetBlur"/><feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer><feMerge><feMergeNode in="offsetBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="8" y="8" width="84" height="84" fill="url(#stonePattern)" stroke="#000" stroke-width="2"/>
  <rect x="10" y="10" width="80" height="80" fill="none" stroke="#1A1A1A" stroke-width="0.5" opacity="0.3"/>
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="-2" x2="50" y2="12" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="5" x2="62" y2="5" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="6" r="2" fill="url(#goldTrim)"/>
    <circle cx="55" cy="6" r="1" fill="#B8860B"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="88" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="90" y1="50" x2="102" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="96" y1="38" x2="96" y2="62" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="90" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="96" cy="55" r="2" fill="url(#goldTrim)"/>
    <circle cx="96" cy="55" r="1" fill="#B8860B"/>
  </g>
  <ellipse cx="35" cy="35" rx="8" ry="10" fill="url(#barrelGrad)" stroke="#2A1A0A" filter="url(#softShadow)"/>
  <ellipse cx="65" cy="30" rx="8" ry="10" fill="url(#barrelGrad)" stroke="#2A1A0A" filter="url(#softShadow)"/>
  <ellipse cx="30" cy="65" rx="8" ry="10" fill="url(#barrelGrad)" stroke="#2A1A0A" filter="url(#softShadow)"/>
  <ellipse cx="70" cy="70" rx="8" ry="10" fill="url(#barrelGrad)" stroke="#2A1A0A" filter="url(#softShadow)"/>
  <circle cx="12" cy="12" r="2" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="88" cy="12" r="2" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="12" cy="88" r="2" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="88" cy="88" r="2" fill="#0A0A0A" opacity="0.4"/>
</svg>
