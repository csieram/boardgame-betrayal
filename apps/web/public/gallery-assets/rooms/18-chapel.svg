<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#4A4A5B"/><stop offset="100%" style="stop-color:#1A1A2B"/></linearGradient>
    <pattern id="tilePattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><rect width="20" height="20" fill="url(#floorGrad)"/><line x1="10" y1="0" x2="10" y2="20" stroke="#2A2A3B" stroke-width="0.5" opacity="0.5"/></pattern>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#5A3A1A"/><stop offset="50%" style="stop-color:#7B5B3B"/><stop offset="100%" style="stop-color:#4A2A0A"/></linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#FFD700"/><stop offset="100%" style="stop-color:#B8860B"/></linearGradient>
    <linearGradient id="stainedGlass" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#FF6B6B"/><stop offset="33%" style="stop-color:#4ECDC4"/><stop offset="66%" style="stop-color:#45B7D1"/><stop offset="100%" style="stop-color:#96CEB4"/></linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceAlpha" stdDeviation="2"/><feOffset dx="2" dy="2"/><feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="8" y="8" width="84" height="84" fill="url(#tilePattern)" stroke="#0A0A1B" stroke-width="2"/>
  <g filter="url(#softShadow)">
    <rect x="36" y="88" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="90" width="24" height="14" fill="url(#doorWood)"/>
    <rect x="38" y="90" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1"/>
    <circle cx="55" cy="94" r="2" fill="url(#goldTrim)"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="88" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <rect x="90" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1"/>
    <circle cx="96" cy="55" r="2" fill="url(#goldTrim)"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="-4" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="-2" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <rect x="-2" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1"/>
    <circle cx="4" cy="55" r="2" fill="url(#goldTrim)"/>
  </g>
  <rect x="35" y="60" width="30" height="25" fill="#5A4A3A" stroke="#2A1A0A" filter="url(#softShadow)"/>
  <circle cx="50" cy="45" r="12" fill="url(#stainedGlass)" opacity="0.6" filter="url(#softShadow)"/>
  <rect x="20" y="20" width="15" height="25" fill="url(#stainedGlass)" opacity="0.5" filter="url(#softShadow)"/>
  <rect x="65" y="20" width="15" height="25" fill="url(#stainedGlass)" opacity="0.5" filter="url(#softShadow)"/>
</svg>
