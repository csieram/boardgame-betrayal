  <rect x="12" y="29" width="16" height="4" fill="#00008B"/>
  <rect x="12" y="36" width="16" height="4" fill="#4B0082"/>
  <rect x="70" y="10" width="20" height="80" fill="#2A1708" stroke="#0A0000" filter="url(#softShadow)"/>
