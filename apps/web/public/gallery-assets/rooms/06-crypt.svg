<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="300" height="300">
  <!-- 地板 -->
  <rect x="8" y="8" width="84" height="84" fill="#4A4A4A" stroke="#2A2A2A" stroke-width="2"/>
  
  <!-- 門: 北 -->
  <rect x="40" y="-2" width="20" height="12" fill="#3D2B1A" stroke="#2A1A0A" stroke-width="2"/>
  <rect x="42" y="0" width="16" height="10" fill="#7B5B3B" stroke="#A08060" stroke-width="2"/>
  <rect x="44" y="2" width="12" height="6" fill="#5A4A3A" opacity="0.8"/>
  
  <!-- 門: 東 -->
  <rect x="90" y="40" width="12" height="20" fill="#3D2B1A" stroke="#2A1A0A" stroke-width="2"/>
  <rect x="90" y="42" width="10" height="16" fill="#7B5B3B" stroke="#A08060" stroke-width="2"/>
  <rect x="92" y="44" width="6" height="12" fill="#5A4A3A" opacity="0.8"/>
  
  <!-- 地板石磚花紋 -->
  <line x1="8" y1="33" x2="92" y2="33" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="8" y1="58" x2="92" y2="58" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="33" y1="8" x2="33" y2="92" stroke="#5A5A5A" stroke-width="1"/>
  <line x1="58" y1="8" x2="58" y2="92" stroke="#5A5A5A" stroke-width="1"/>
  
  <!-- 棺材 - 左上 -->
  <rect x="15" y="15" width="15" height="12" fill="#4A3728" stroke="#2A1708"/>
  <rect x="15" y="15" width="15" height="4" fill="#5A4738"/>
  
  <!-- 棺材 - 右上 -->
  <rect x="62" y="15" width="15" height="12" fill="#4A3728" stroke="#2A1708"/>
  <rect x="62" y="15" width="15" height="4" fill="#5A4738"/>
  
  <!-- 棺材 - 左下 -->
  <rect x="15" y="65" width="15" height="12" fill="#4A3728" stroke="#2A1708"/>
  
  <!-- 棺材 - 右下 -->
  <rect x="62" y="65" width="15" height="12" fill="#4A3728" stroke="#2A1708"/>
  
  <!-- 打開的棺材 (中央) -->
  <rect x="38" y="38" width="24" height="16" fill="#2A1A0A" stroke="#1A0A00"/>
  <rect x="38" y="38" width="24" height="5" fill="#5A4738"/>
</svg>
