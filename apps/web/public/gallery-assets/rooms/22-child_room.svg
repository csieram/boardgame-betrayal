<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6B6B7B"/><stop offset="50%" style="stop-color:#4A4A5A"/><stop offset="100%" style="stop-color:#2A2A3A"/></linearGradient>
    <pattern id="carpetPattern" x="0" y="0" width="15" height="15" patternUnits="userSpaceOnUse"><rect width="15" height="15" fill="url(#floorGrad)"/><circle cx="5" cy="5" r="2" fill="#5A5A6B" opacity="0.3"/><circle cx="10" cy="10" r="1.5" fill="#3A3A4A" opacity="0.4"/></pattern>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#5A3A1A"/><stop offset="50%" style="stop-color:#7B5B3B"/><stop offset="100%" style="stop-color:#4A2A0A"/></linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#FFD700"/><stop offset="50%" style="stop-color:#B8860B"/><stop offset="100%" style="stop-color:#D4AF37"/></linearGradient>
    <linearGradient id="bedGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#8B9BAB"/><stop offset="100%" style="stop-color:#4A5A6A"/></linearGradient>
    <radialGradient id="toyGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:0.6"/><stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:0"/></radialGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/><feOffset in="blur" dx="2" dy="2" result="offsetBlur"/><feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer><feMerge><feMergeNode in="offsetBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="8" y="8" width="84" height="84" fill="url(#carpetPattern)" stroke="#1A1A2A" stroke-width="2"/>
  <rect x="10" y="10" width="80" height="80" fill="none" stroke="#3A3A4A" stroke-width="0.5" opacity="0.3"/>
