<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355"/>
      <stop offset="100%" style="stop-color:#5A4A3A"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B4B2A"/>
      <stop offset="50%" style="stop-color:#8B6B4B"/>
      <stop offset="100%" style="stop-color:#4A2A0A"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="3" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Floor -->
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#2A1A0A" stroke-width="2"/>
  
  <!-- INTERIOR: GARDEN - Large trees and plants -->
  <!-- Large tree left -->
  <g filter="url(#softShadow)">
    <circle cx="25" cy="35" r="18" fill="#2F5F2F" stroke="#1F4F1F" stroke-width="2"/>
    <circle cx="20" cy="30" r="8" fill="#3F7F3F"/>
    <circle cx="30" cy="28" r="7" fill="#3F7F3F"/>
    <circle cx="28" cy="40" r="6" fill="#3F7F3F"/>
    <!-- Trunk -->
    <rect x="22" y="50" width="6" height="15" fill="#654321"/>
  </g>
  
  <!-- Large tree right -->
  <g filter="url(#softShadow)">
    <circle cx="75" cy="40" r="20" fill="#2F5F2F" stroke="#1F4F1F" stroke-width="2"/>
    <circle cx="70" cy="35" r="9" fill="#3F7F3F"/>
    <circle cx="80" cy="32" r="8" fill="#3F7F3F"/>
    <circle cx="78" cy="48" r="7" fill="#3F7F3F"/>
    <!-- Trunk -->
    <rect x="72" y="58" width="6" height="15" fill="#654321"/>
  </g>
  
  <!-- Bush center -->
  <g filter="url(#softShadow)">
    <circle cx="50" cy="55" r="15" fill="#3F7F3F" stroke="#2F6F2F" stroke-width="1"/>
    <circle cx="45" cy="50" r="6" fill="#4F8F4F"/>
    <circle cx="55" cy="52" r="5" fill="#4F8F4F"/>
  </g>
  
  <!-- Stone path -->
  <ellipse cx="50" cy="78" rx="25" ry="8" fill="#8B8680" stroke="#6B6660" stroke-width="1"/>
  <ellipse cx="40" cy="76" rx="6" ry="3" fill="#9B9690"/>
  <ellipse cx="55" cy="79" rx="7" ry="3" fill="#9B9690"/>
  <ellipse cx="50" cy="75" rx="5" ry="2" fill="#9B9690"/>
  
  <!-- Small plants -->
  <circle cx="15" cy="65" r="4" fill="#4F8F4F"/>
  <circle cx="18" cy="68" r="3" fill="#3F7F3F"/>
  <circle cx="85" cy="70" r="5" fill="#4F8F4F"/>
  <circle cx="88" cy="67" r="3" fill="#3F7F3F"/>
  
  <!-- Flowers -->
  <circle cx="35" cy="72" r="2" fill="#FF6B6B"/>
  <circle cx="65" cy="70" r="2" fill="#FFE66D"/>
  <circle cx="45" cy="75" r="2" fill="#4ECDC4"/>
  
  <!-- Door North -->
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="-2" x2="50" y2="12" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="5" x2="62" y2="5" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="6" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="6" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Door East -->
  <g filter="url(#softShadow)">
    <rect x="88" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="90" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="90" y1="50" x2="102" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="96" y1="38" x2="96" y2="62" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="90" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="96" cy="55" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="96" cy="55" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Symbol E -->
  <g filter="url(#softShadow)">
    <circle cx="85" cy="15" r="8" fill="#4A9A4A" stroke="#2A7A2A" stroke-width="1"/>
    <circle cx="85" cy="15" r="6" fill="#5ABA5A" opacity="0.5"/>
    <text x="85" y="19" text-anchor="middle" font-size="11" fill="#FFF" font-weight="bold" font-family="serif">E</text>
  </g>
</svg>
