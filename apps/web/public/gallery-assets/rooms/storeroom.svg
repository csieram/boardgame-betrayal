<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355"/>
      <stop offset="100%" style="stop-color:#5A4A3A"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B4B2A"/>
      <stop offset="50%" style="stop-color:#8B6B4B"/>
      <stop offset="100%" style="stop-color:#4A2A0A"/>
    </linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="3" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect x="8" y="8" width="84" height="84" fill="url(#floorGrad)" stroke="#2A1A0A" stroke-width="2"/>
  
  <!-- Large crate stack left -->
  <g filter="url(#softShadow)">
    <rect x="15" y="25" width="22" height="22" fill="#6B6B5B" stroke="#4A4A4A" stroke-width="2" rx="1"/>
    <line x1="15" y1="36" x2="37" y2="36" stroke="#4A4A4A" stroke-width="1"/>
    <line x1="26" y1="25" x2="26" y2="47" stroke="#4A4A4A" stroke-width="1"/>
    
    <rect x="15" y="50" width="22" height="20" fill="#5A5A4A" stroke="#3A3A3A" stroke-width="2" rx="1"/>
    <line x1="15" y1="60" x2="37" y2="60" stroke="#3A3A3A" stroke-width="1"/>
  </g>
  
  <!-- Large crate stack right -->
  <g filter="url(#softShadow)">
    <rect x="55" y="30" width="24" height="24" fill="#6B6B5B" stroke="#4A4A4A" stroke-width="2" rx="1"/>
    <line x1="55" y1="42" x2="79" y2="42" stroke="#4A4A4A" stroke-width="1"/>
    <line x1="67" y1="30" x2="67" y2="54" stroke="#4A4A4A" stroke-width="1"/>
    
    <rect x="58" y="58" width="20" height="18" fill="#5A5A4A" stroke="#3A3A3A" stroke-width="2" rx="1"/>
  </g>
  
  <!-- Barrels -->
  <g filter="url(#softShadow)">
    <rect x="42" y="55" width="12" height="18" fill="#8B7355" stroke="#6B5335" stroke-width="1" rx="2"/>
    <ellipse cx="48" cy="55" rx="6" ry="2" fill="#9B8365" stroke="#6B5335" stroke-width="1"/>
    <line x1="42" y1="62" x2="54" y2="62" stroke="#6B5335" stroke-width="0.5"/>
    <line x1="42" y1="68" x2="54" y2="68" stroke="#6B5335" stroke-width="0.5"/>
  </g>
  
  <!-- Sacks -->
  <ellipse cx="45" cy="78" rx="8" ry="5" fill="#A08060" stroke="#806040" stroke-width="1"/>
  <ellipse cx="58" cy="80" rx="6" ry="4" fill="#908070" stroke="#706050" stroke-width="1"/>
  
  <!-- Door North -->
  <g filter="url(#softShadow)">
    <rect x="36" y="-4" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="-2" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="-2" x2="50" y2="12" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="5" x2="62" y2="5" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="-2" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="6" r="2.5" fill="url(#goldTrim)"/>
    <circle cx="55" cy="6" r="1.5" fill="#B8860B"/>
  </g>
  
  <!-- Symbol I -->
  <g filter="url(#softShadow)">
    <circle cx="85" cy="15" r="8" fill="#3D7AB8" stroke="#2D5A98" stroke-width="1"/>
    <circle cx="85" cy="15" r="6" fill="#5A9AD8" opacity="0.5"/>
    <text x="85" y="19" text-anchor="middle" font-size="11" fill="#FFF" font-weight="bold" font-family="serif">I</text>
  </g>
</svg>
