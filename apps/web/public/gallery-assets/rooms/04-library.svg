<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="300" height="300">
  <!-- 地板 -->
  <rect x="8" y="8" width="84" height="84" fill="#7B6B5B" stroke="#4A3A2A" stroke-width="2"/>
  
  <!-- 門: 南 -->
  <rect x="40" y="90" width="20" height="12" fill="#3D2B1A" stroke="#2A1A0A" stroke-width="2"/>
  <rect x="42" y="90" width="16" height="10" fill="#7B5B3B" stroke="#A08060" stroke-width="2"/>
  <rect x="44" y="92" width="12" height="6" fill="#5A4A3A" opacity="0.8"/>
  
  <!-- 門: 東 -->
  <rect x="90" y="40" width="12" height="20" fill="#3D2B1A" stroke="#2A1A0A" stroke-width="2"/>
  <rect x="90" y="42" width="10" height="16" fill="#7B5B3B" stroke="#A08060" stroke-width="2"/>
  <rect x="92" y="44" width="6" height="12" fill="#5A4A3A" opacity="0.8"/>
  
  <!-- 門: 西 -->
  <rect x="-2" y="40" width="12" height="20" fill="#3D2B1A" stroke="#2A1A0A" stroke-width="2"/>
  <rect x="0" y="42" width="10" height="16" fill="#7B5B3B" stroke="#A08060" stroke-width="2"/>
  <rect x="2" y="44" width="6" height="12" fill="#5A4A3A" opacity="0.8"/>
  
  <!-- 書架 - 左 -->
  <rect x="12" y="12" width="15" height="76" fill="#4A3728" stroke="#2A1708"/>
  <rect x="14" y="15" width="11" height="3" fill="#8B0000"/>
  <rect x="14" y="22" width="11" height="3" fill="#006400"/>
  <rect x="14" y="29" width="11" height="3" fill="#00008B"/>
  <rect x="14" y="36" width="11" height="3" fill="#4B0082"/>
  <rect x="14" y="43" width="11" height="3" fill="#8B4513"/>
  
  <!-- 書架 - 右 -->
  <rect x="73" y="12" width="15" height="76" fill="#4A3728" stroke="#2A1708"/>
  <rect x="75" y="15" width="11" height="3" fill="#8B0000"/>
  <rect x="75" y="22" width="11" height="3" fill="#006400"/>
  <rect x="75" y="29" width="11" height="3" fill="#00008B"/>
  
  <!-- 中央閱讀桌 -->
  <rect x="38" y="38" width="24" height="28" fill="#8B4513" stroke="#654321"/>
  
  <!-- 檯燈 -->
  <circle cx="50" cy="48" r="6" fill="#FFD700" opacity="0.6"/>
  <circle cx="50" cy="48" r="3" fill="#FFF8DC"/>
</svg>
