<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6B5B6B"/><stop offset="50%" style="stop-color:#4A3A4A"/><stop offset="100%" style="stop-color:#2A1A2A"/></linearGradient>
    <pattern id="carpetPattern" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse"><rect width="12" height="12" fill="url(#floorGrad)"/><circle cx="3" cy="3" r="1.5" fill="#3A2A3A" opacity="0.4"/><circle cx="9" cy="9" r="2" fill="#2A1A2A" opacity="0.3"/></pattern>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#5A3A1A"/><stop offset="50%" style="stop-color:#7B5B3B"/><stop offset="100%" style="stop-color:#4A2A0A"/></linearGradient>
    <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#FFD700"/><stop offset="50%" style="stop-color:#B8860B"/><stop offset="100%" style="stop-color:#D4AF37"/></linearGradient>
    <linearGradient id="bedGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#7B6B7B"/><stop offset="100%" style="stop-color:#4A3A4A"/></linearGradient>
    <radialGradient id="lampGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" style="stop-color:#FFF8DC;stop-opacity:0.9"/><stop offset="40%" style="stop-color:#FFE4E1;stop-opacity:0.5"/><stop offset="100%" style="stop-color:#FFE4E1;stop-opacity:0"/></radialGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/><feOffset in="blur" dx="2" dy="2" result="offsetBlur"/><feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer><feMerge><feMergeNode in="offsetBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="innerGlow"><feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/><feComposite in="blur" in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadowDiff"/><feFlood flood-color="#FFD700" flood-opacity="0.3"/><feComposite in2="shadowDiff" operator="in"/><feComposite in2="SourceGraphic" operator="over"/></filter>
  </defs>
  <rect x="8" y="8" width="84" height="84" fill="url(#carpetPattern)" stroke="#1A0A1A" stroke-width="2"/>
  <rect x="10" y="10" width="80" height="80" fill="none" stroke="#3A2A3A" stroke-width="0.5" opacity="0.3"/>
  <g filter="url(#softShadow)">
    <rect x="36" y="88" width="28" height="16" fill="#1A0A00"/>
    <rect x="38" y="90" width="24" height="14" fill="url(#doorWood)"/>
    <line x1="50" y1="90" x2="50" y2="104" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="38" y1="97" x2="62" y2="97" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="38" y="90" width="24" height="14" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="55" cy="94" r="2" fill="url(#goldTrim)"/>
    <circle cx="55" cy="94" r="1" fill="#B8860B"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="-4" y="36" width="16" height="28" fill="#1A0A00"/>
    <rect x="-2" y="38" width="12" height="24" fill="url(#doorWood)"/>
    <line x1="-2" y1="50" x2="10" y2="50" stroke="#2A1A0A" stroke-width="0.5"/>
    <line x1="4" y1="38" x2="4" y2="62" stroke="#2A1A0A" stroke-width="0.5"/>
    <rect x="-2" y="38" width="12" height="24" fill="none" stroke="url(#goldTrim)" stroke-width="1.5"/>
    <circle cx="4" cy="55" r="2" fill="url(#goldTrim)"/>
    <circle cx="4" cy="55" r="1" fill="#B8860B"/>
  </g>
  <rect x="25" y="25" width="50" height="30" fill="url(#bedGrad)" stroke="#2A1A2A" rx="2" filter="url(#softShadow)"/>
  <rect x="25" y="20" width="50" height="8" fill="#5A4A5A" stroke="#2A1A2A"/>
  <rect x="28" y="27" width="20" height="12" fill="#FFF8DC" stroke="#DDD" rx="1"/>
  <rect x="52" y="27" width="20" height="12" fill="#FFF8DC" stroke="#DDD" rx="1"/>
  <rect x="25" y="40" width="50" height="15" fill="#8B7B8B" opacity="0.6" stroke="#5A4A5A"/>
  <ellipse cx="45" cy="48" rx="4" ry="2" fill="#6B5B6B" opacity="0.5"/>
  <rect x="10" y="30" width="12" height="18" fill="#5A4A5A" stroke="#2A1A2A" filter="url(#softShadow)"/>
  <circle cx="16" cy="35" r="3" fill="url(#lampGlow)" filter="url(#innerGlow)"/>
  <circle cx="16" cy="35" r="5" fill="url(#lampGlow)" opacity="0.5"/>
  <rect x="70" y="60" width="22" height="28" fill="#4A3A4A" stroke="#2A1A2A" filter="url(#softShadow)"/>
  <line x1="72" y1="65" x2="90" y2="65" stroke="#2A1A2A" stroke-width="1"/>
  <line x1="72" y1="75" x2="90" y2="75" stroke="#2A1A2A" stroke-width="1"/>
  <line x1="72" y1="85" x2="90" y2="85" stroke="#2A1A2A" stroke-width="1"/>
  <circle cx="12" cy="12" r="2" fill="#3A2A3A" opacity="0.4"/>
  <circle cx="88" cy="12" r="2" fill="#3A2A3A" opacity="0.4"/>
  <circle cx="12" cy="88" r="2" fill="#3A2A3A" opacity="0.4"/>
  <circle cx="88" cy="88" r="2" fill="#3A2A3A" opacity="0.4"/>
</svg>
