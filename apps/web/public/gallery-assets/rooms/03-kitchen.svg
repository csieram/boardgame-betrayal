<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="300" height="300">
  <!-- 地板 -->
  <rect x="8" y="8" width="84" height="84" fill="#6A6A5A" stroke="#3A3A2A" stroke-width="2"/>
  
  <!-- 門: 北 -->
  <rect x="40" y="-2" width="20" height="12" fill="#3D2B1A" stroke="#2A1A0A" stroke-width="2"/>
  <rect x="42" y="0" width="16" height="10" fill="#7B5B3B" stroke="#A08060" stroke-width="2"/>
  <rect x="44" y="2" width="12" height="6" fill="#5A4A3A" opacity="0.8"/>
  
  <!-- 門: 南 -->
  <rect x="40" y="90" width="20" height="12" fill="#3D2B1A" stroke="#2A1A0A" stroke-width="2"/>
  <rect x="42" y="90" width="16" height="10" fill="#7B5B3B" stroke="#A08060" stroke-width="2"/>
  <rect x="44" y="92" width="12" height="6" fill="#5A4A3A" opacity="0.8"/>
  
  <!-- 門: 東 -->
  <rect x="90" y="40" width="12" height="20" fill="#3D2B1A" stroke="#2A1A0A" stroke-width="2"/>
  <rect x="90" y="42" width="10" height="16" fill="#7B5B3B" stroke="#A08060" stroke-width="2"/>
  <rect x="92" y="44" width="6" height="12" fill="#5A4A3A" opacity="0.8"/>
  
  <!-- 廚房台面 -->
  <rect x="15" y="15" width="70" height="18" fill="#7B7B6B" stroke="#4A4A3A"/>
  
  <!-- 爐子 -->
  <rect x="20" y="18" width="20" height="12" fill="#333" stroke="#111"/>
  <circle cx="26" cy="24" r="3" fill="#666"/>
  <circle cx="34" cy="24" r="3" fill="#666"/>
  
  <!-- 水槽 -->
  <rect x="55" y="18" width="25" height="12" fill="#4682B4" stroke="#2E5A8B"/>
  
  <!-- 中央餐桌 -->
  <rect x="32" y="45" width="36" height="24" fill="#8B4513" stroke="#654321"/>
  
  <!-- 椅子 -->
  <rect x="25" y="50" width="7" height="12" fill="#654321"/>
  <rect x="68" y="50" width="7" height="12" fill="#654321"/>
  <rect x="46" y="72" width="8" height="10" fill="#654321"/>
</svg>
