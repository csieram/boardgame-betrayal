<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 210" width="150" height="210">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B3D8B"/><stop offset="100%" style="stop-color:#6B3D8B"/>
    </linearGradient>
    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/><stop offset="100%" style="stop-color:#808080"/>
    </linearGradient>
    <filter id="bloodGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#8B0000" result="color"/>
      <feComposite in="color" in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- 背景更亮 -->
  <rect x="5" y="5" width="140" height="200" rx="12" fill="url(#cardBg)" stroke="#8B5DA8" stroke-width="3"/>
  <rect x="12" y="12" width="126" height="186" rx="8" fill="none" stroke="#AB7DC8" stroke-width="1"/>
  
  <rect x="55" y="18" width="40" height="18" rx="9" fill="#8B5DA8"/>
  <text x="75" y="31" text-anchor="middle" font-size="10" fill="#FFF" font-weight="bold">預兆</text>
  
  <!-- 染血匕首 - 變大 -->
  <g transform="translate(75, 100) rotate(45) scale(1.3)">
    <polygon points="0,-35 -8,15 0,20 8,15" fill="url(#bladeGrad)" stroke="#666" stroke-width="1"/>
    <rect x="-6" y="18" width="12" height="20" fill="#4A2511" rx="2"/>
    <rect x="-10" y="35" width="20" height="8" fill="#8B4513" rx="2"/>
    <path d="M-3,-20 L-5,-10 L-2,-12 Z" fill="#8B0000" filter="url(#bloodGlow)"/>
    <path d="M2,-25 L4,-15 L1,-18 Z" fill="#8B0000" filter="url(#bloodGlow)"/>
    <circle cx="0" cy="-5" r="3" fill="#8B0000" filter="url(#bloodGlow)"/>
  </g>
  
  <text x="75" y="170" text-anchor="middle" font-size="13" fill="#FFF" font-weight="bold">染血匕首</text>
  <text x="75" y="188" text-anchor="middle" font-size="11" fill="#D8B8E8">Bloody Dagger</text>
  <circle cx="75" cy="200" r="3" fill="#8B5DA8"/>
</svg>
