<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 210" width="150" height="210">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3D7AB8"/><stop offset="100%" style="stop-color:#1E5A8B"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/><stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- 卡牌背景 - 更亮 -->
  <rect x="5" y="5" width="140" height="200" rx="12" fill="url(#cardBg)" stroke="#5A9AD8" stroke-width="3"/>
  <rect x="12" y="12" width="126" height="186" rx="8" fill="none" stroke="#7AB8E8" stroke-width="1"/>
  
  <!-- 類型標籤 -->
  <rect x="55" y="18" width="40" height="18" rx="9" fill="#5A9AD8"/>
  <text x="75" y="31" text-anchor="middle" font-size="10" fill="#FFF" font-weight="bold">物品</text>
  
  <!-- 十字架圖示 - 變大 -->
  <g transform="translate(75, 100) scale(1.3)" filter="url(#glow)">
    <rect x="-8" y="-35" width="16" height="70" fill="url(#goldGrad)" rx="2"/>
    <rect x="-25" y="-15" width="50" height="16" fill="url(#goldGrad)" rx="2"/>
    <rect x="-6" y="-33" width="12" height="66" fill="#FFD700" opacity="0.5"/>
    <rect x="-23" y="-13" width="46" height="12" fill="#FFD700" opacity="0.5"/>
  </g>
  
  <!-- 名稱 -->
  <text x="75" y="170" text-anchor="middle" font-size="14" fill="#FFF" font-weight="bold">十字架</text>
  <text x="75" y="188" text-anchor="middle" font-size="11" fill="#B8D8F8">Cross</text>
  
  <!-- 底部裝飾 -->
  <circle cx="75" cy="200" r="3" fill="#5A9AD8"/>
</svg>
