<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Betrayal - 官方房間 + 擴充房間</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 20px; }
    h1 { text-align: center; margin-bottom: 10px; color: #ff6b6b; text-shadow: 0 0 20px rgba(255, 107, 107, 0.5); }
    .progress { text-align: center; color: #4ade80; margin-bottom: 20px; font-size: 16px; }
    h2 { margin: 30px 0 15px; padding-bottom: 10px; border-bottom: 2px solid #ff6b6b; color: #ffd93d; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
    .item { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; text-align: center; position: relative; }
    .item img { width: 150px; height: 150px; margin-bottom: 10px; border-radius: 8px; background: #0f0f1a; object-fit: contain; }
    .item-name { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
    .item-en { font-size: 12px; color: #aaa; }
    .badges { margin-top: 5px; display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; }
    .symbol-e { color: #4ade80; font-size: 10px; background: rgba(74,222,128,0.2); padding: 2px 6px; border-radius: 4px; }
    .symbol-i { color: #60a5fa; font-size: 10px; background: rgba(96,165,250,0.2); padding: 2px 6px; border-radius: 4px; }
    .symbol-o { color: #a78bfa; font-size: 10px; background: rgba(167,139,250,0.2); padding: 2px 6px; border-radius: 4px; }
    .symbol-none { color: #9ca3af; font-size: 10px; background: rgba(156,163,175,0.2); padding: 2px 6px; border-radius: 4px; }
    .official-badge { position: absolute; top: 10px; right: 10px; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
    .official { background: #4ade80; color: #000; }
    .unofficial { background: #f87171; color: #fff; }
    .level-1f { border-left: 3px solid #4ade80; }
    .level-2f { border-left: 3px solid #fbbf24; }
    .level-b1 { border-left: 3px solid #f87171; }
    .section-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab { padding: 10px 20px; background: rgba(255,255,255,0.1); border-radius: 20px; cursor: pointer; transition: all 0.3s; }
    .tab:hover { background: rgba(255,255,255,0.2); }
    .tab.active { background: #ff6b6b; }
    .section { display: none; }
    .section.active { display: block; }
    .stats { text-align: center; margin-bottom: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 10px; }
    .stat-item { padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; }
    .stat-number { font-size: 24px; font-weight: bold; color: #4ade80; }
    .stat-label { font-size: 12px; color: #aaa; }
  </style>
</head>
<body>
  <h1>🏚️ Betrayal - 房間圖鑑</h1>
  <p class="progress">官方 45 房間 + 擴充房間 | 含 Symbol 標記</p>
  
  <div class="stats">
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-number" id="b1-count">18</div>
        <div class="stat-label">地下室 (B1)</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="g-count">12</div>
        <div class="stat-label">一樓 (1F)</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="u-count">10</div>
        <div class="stat-label">二樓 (2F)</div>
      </div>
    </div>
  </div>
  
  <div class="section-tabs">
    <div class="tab active" onclick="showSection('rooms')">🚪 房間</div>
    <div class="tab" onclick="showSection('characters')">👤 角色</div>
    <div class="tab" onclick="showSection('items')">🎒 卡牌</div>
  </div>

  <div id="rooms" class="section active">
    <h2>🔴 Basement (B1) - 官方 18 個</h2>
    <div class="grid" id="basement"></div>
    
    <h2>🟢 Ground Floor (1F) - 官方 12 個</h2>
    <div class="grid" id="ground"></div>
    
    <h2>🟡 Upper Floor (2F) - 官方 10 個</h2>
    <div class="grid" id="upper"></div>
    
    <h2>⚪ 跨樓層 / 擴充房間</h2>
    <div class="grid" id="multi"></div>
  </div>

  <div id="characters" class="section">
    <h2>👥 可玩角色 (6)</h2>
    <div class="grid" id="characters-grid"></div>
  </div>

  <div id="items" class="section">
    <h2>🎒 物品卡 (12)</h2>
    <div class="grid" id="items-grid"></div>
    
    <h2>🔮 預兆卡 (10)</h2>
    <div class="grid" id="omens-grid"></div>
    
    <h2>📜 事件卡 (12)</h2>
    <div class="grid" id="events-grid"></div>
  </div>

  <script>
    // 官方房間資料 - 使用新生成的 SVG 檔案
    const officialRooms = {
      basement: [
        { id: 'abandoned_room', name: '廢棄房間', en: 'Abandoned Room', symbol: 'O', doors: 'N' },
        { id: 'arsenal', name: '軍械庫', en: 'Arsenal', symbol: 'I', doors: 'N,E' },
        { id: 'bloody_room', name: '血跡房間', en: 'Bloody Room', symbol: 'E', doors: 'N' },
        { id: 'catacombs', name: '地下墓穴', en: 'Catacombs', symbol: null, doors: 'N,E,S' },
        { id: 'cavern', name: '洞穴', en: 'Cavern', symbol: 'E', doors: 'N' },
        { id: 'charred_room', name: '燒焦房間', en: 'Charred Room', symbol: 'O', doors: 'N' },
        { id: 'chasm', name: '深淵', en: 'Chasm', symbol: null, doors: 'N,E' },
        { id: 'crypt', name: '墓穴', en: 'Crypt', symbol: 'I', doors: 'N' },
        { id: 'dungeon', name: '地牢', en: 'Dungeon', symbol: null, doors: 'N' },
        { id: 'furnace_room', name: '鍋爐房', en: 'Furnace Room', symbol: 'O', doors: 'N,E' },
        { id: 'graveyard', name: '墓地', en: 'Graveyard', symbol: null, doors: 'N,E' },
        { id: 'larder', name: '儲藏室', en: 'Larder', symbol: 'I', doors: 'N' },
        { id: 'operating_lab', name: '手術實驗室', en: 'Operating Laboratory', symbol: 'I', doors: 'N' },
        { id: 'pentagram_chamber', name: '五芒星密室', en: 'Pentagram Chamber', symbol: 'O', doors: 'N' },
        { id: 'research_lab', name: '研究實驗室', en: 'Research Laboratory', symbol: 'I', doors: 'N' },
        { id: 'servants_quarters', name: '僕人房', en: 'Servants Quarters', symbol: null, doors: 'N,E' },
        { id: 'underground_lake', name: '地下湖', en: 'Underground Lake', symbol: null, doors: 'N' },
        { id: 'vault', name: '金庫', en: 'Vault', symbol: 'I', doors: 'N' },
      ],
      ground: [
        { id: 'ballroom', name: '舞廳', en: 'Ballroom', symbol: null, doors: 'N,S' },
        { id: 'chapel', name: '禮拜堂', en: 'Chapel', symbol: 'O', doors: 'N' },
        { id: 'dining_room', name: '餐廳', en: 'Dining Room', symbol: 'I', doors: 'N,E' },
        { id: 'entrance_hall', name: '入口大廳', en: 'Entrance Hall', symbol: null, doors: 'N,S' },
        { id: 'foyer', name: '玄關', en: 'Foyer', symbol: null, doors: 'N,S' },
        { id: 'garden', name: '花園', en: 'Garden', symbol: 'E', doors: 'N,E' },
        { id: 'gymnasium', name: '健身房', en: 'Gymnasium', symbol: 'E', doors: 'N,E' },
        { id: 'kitchen', name: '廚房', en: 'Kitchen', symbol: 'I', doors: 'N,E' },
        { id: 'library', name: '圖書室', en: 'Library', symbol: 'I', doors: 'N,E' },
        { id: 'patio', name: '庭院', en: 'Patio', symbol: null, doors: 'N,E' },
        { id: 'storeroom', name: '儲物間', en: 'Storeroom', symbol: 'I', doors: 'N' },
        { id: 'tower', name: '塔樓', en: 'Tower', symbol: null, doors: 'N' },
      ],
      upper: [
        { id: 'attic', name: '閣樓', en: 'Attic', symbol: 'I', doors: 'N' },
        { id: 'balcony', name: '陽台', en: 'Balcony', symbol: null, doors: 'N,S' },
        { id: 'bedroom', name: '臥室', en: 'Bedroom', symbol: 'O', doors: 'N' },
        { id: 'gallery', name: '畫廊', en: 'Gallery', symbol: null, doors: 'N,E' },
        { id: 'junk_room', name: '雜物間', en: 'Junk Room', symbol: 'O', doors: 'N' },
        { id: 'master_bedroom', name: '主臥室', en: 'Master Bedroom', symbol: 'O', doors: 'N,E' },
        { id: 'nursery', name: '嬰兒房', en: 'Nursery', symbol: 'O', doors: 'N' },
        { id: 'walkway', name: '走道', en: 'Walkway', symbol: null, doors: 'N,S' },
      ],
      multi: [
        { id: 'grand_staircase', name: '大樓梯', en: 'Grand Staircase', symbol: null, doors: 'N,S', note: 'G↔U' },
        { id: 'stairs_from_basement', name: '地下室樓梯', en: 'Stairs from Basement', symbol: null, doors: 'N', note: 'to G' },
        { id: 'mystic_elevator', name: '神秘電梯', en: 'Mystic Elevator', symbol: null, doors: 'N', note: 'Any floor' },
        { id: 'collapsed_room', name: '坍塌房間', en: 'Collapsed Room', symbol: null, doors: 'N', note: 'Drop to B' },
      ]
    };

    // 擴充房間（非官方）- 標記為擴充內容
    const unofficialRooms = [
      { id: 'conservatory', name: '溫室 (擴充)', en: 'Conservatory (Unofficial)', floor: 'ground', symbol: null, note: '非官方' },
      { id: 'game_room', name: '遊戲室 (擴充)', en: 'Game Room (Unofficial)', floor: 'ground', symbol: null, note: '非官方' },
      { id: 'music_room', name: '音樂室 (擴充)', en: 'Music Room (Unofficial)', floor: 'ground', symbol: 'O', note: '非官方' },
      { id: 'art_studio', name: '畫室 (擴充)', en: 'Art Studio (Unofficial)', floor: 'ground', symbol: null, note: '非官方' },
      { id: 'hallway', name: '走廊 (擴充)', en: 'Hallway (Unofficial)', floor: 'ground', symbol: null, note: '非官方' },
      { id: 'sunroom', name: '日光室 (擴充)', en: 'Sunroom (Unofficial)', floor: 'ground', symbol: null, note: '非官方' },
      { id: 'living_room', name: '客廳 (擴充)', en: 'Living Room (Unofficial)', floor: 'ground', symbol: null, note: '非官方' },
      { id: 'study', name: '書房 (擴充)', en: 'Study (Unofficial)', floor: 'ground', symbol: null, note: '非官方' },
    ];

    function getSymbolBadge(symbol) {
      if (symbol === 'E') return '<span class="symbol-e">⚡ 事件</span>';
      if (symbol === 'I') return '<span class="symbol-i">🎒 物品</span>';
      if (symbol === 'O') return '<span class="symbol-o">🔮 預兆</span>';
      return '<span class="symbol-none">○ 無</span>';
    }

    function renderRoom(room, container, level, isOfficial = true) {
      const div = document.createElement('div');
      div.className = `item level-${level}`;
      
      const badgeClass = isOfficial ? 'official' : 'unofficial';
      const badgeText = isOfficial ? '✓ 官方' : '✗ 擴充';
      
      // 使用房間 ID 作為檔案名稱（新生成的 SVG）
      const svgFile = `${room.id}.svg`;
      
      div.innerHTML = `
        <span class="official-badge ${badgeClass}">${badgeText}</span>
        <img src="rooms/${svgFile}" alt="${room.name}" 
             onerror="this.style.opacity='0.3'; this.parentElement.innerHTML+='<div style=\'color:#666;font-size:12px;margin-top:10px\'>圖片製作中</div>';"
             style="width:150px; height:150px; object-fit:contain;">
        <div class="item-name">${room.name}</div>
        <div class="item-en">${room.en}</div>
        <div class="badges">
          ${getSymbolBadge(room.symbol)}
          ${room.doors ? `<span style="font-size:10px; color:#888;">🚪 ${room.doors}</span>` : ''}
          ${room.note ? `<span style="font-size:10px; color:#fbbf24;">📌 ${room.note}</span>` : ''}
        </div>
      `;
      container.appendChild(div);
    }

    // 渲染官方房間
    officialRooms.basement.forEach(r => renderRoom(r, document.getElementById('basement'), 'b1', true));
    officialRooms.ground.forEach(r => renderRoom(r, document.getElementById('ground'), '1f', true));
    officialRooms.upper.forEach(r => renderRoom(r, document.getElementById('upper'), '2f', true));
    officialRooms.multi.forEach(r => renderRoom(r, document.getElementById('multi'), '1f', true));

    // 渲染擴充房間
    unofficialRooms.forEach(r => {
      const container = document.getElementById(r.floor === 'ground' ? 'ground' : 'upper');
      renderRoom(r, container, r.floor === 'ground' ? '1f' : '2f', false);
    });

    // Tab 切換
    function showSection(sectionId) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(sectionId).classList.add('active');
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
