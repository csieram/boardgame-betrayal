  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #ff6b6b;
      text-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
    }
    h2 {
      margin: 30px 0 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #ff6b6b;
      color: #ffd93d;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }
    .item {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
    }
    .item svg {
      width: 150px;
      height: 150px;
      margin-bottom: 10px;
      border-radius: 8px;
    }
    .item-name {
      font-weight: bold;
      margin-bottom: 5px;
      font-size: 14px;
    }
    .item-desc {
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

    rooms.forEach(room => {
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        ${room.svg}
        <div class="item-name">${room.name}</div>
        <div class="item-desc">${room.nameEn}</div>

</body>
</html>
