<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Betrayal - 遊戲素材 (與遊戲同步)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #ff6b6b;
      text-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
    }
    .sync-info {
      text-align: center;
      color: #4ade80;
      margin-bottom: 20px;
      font-size: 14px;
    }
    h2 {
      margin: 30px 0 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #ff6b6b;
      color: #ffd93d;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }
    .item {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
    }
    .item svg {
      width: 150px;
      height: 150px;
      margin-bottom: 10px;
      border-radius: 8px;
      background: #0f0f1a;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .item-name {
      font-weight: bold;
      margin-bottom: 5px;
      font-size: 14px;
    }
    .item-desc {
      font-size: 12px;
      color: #aaa;
    }
    .doors {
      font-size: 11px;
      color: #4ade80;
      margin-top: 5px;
    }
    .omen-badge {
      color: #9F7AEA;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <h1>🏚️ Betrayal - 遊戲素材</h1>
  <p class="sync-info">✅ 與遊戲完全同步 | 來源: src/data/rooms.ts</p>
  
  <h2>🚪 房間板塊 (10種)</h2>
  <div class="grid" id="rooms"></div>

  <script>
    // 門的 SVG - 淡色版 (柔和木色)
    const doorN = '<rect x="40" y="-2" width="20" height="12" fill="#3D2B1A" stroke="#2A1A0A" stroke-width="2"/><rect x="42" y="0" width="16" height="10" fill="#7B5B3B" stroke="#A08060" stroke-width="2"/><rect x="44" y="2" width="12" height="6" fill="#5A4A3A" opacity="0.8"/>';
    const doorS = '<rect x="40" y="90" width="20" height="12" fill="#3D2B1A" stroke="#2A1A0A" stroke-width="2"/><rect x="42" y="90" width="16" height="10" fill="#7B5B3B" stroke="#A08060" stroke-width="2"/><rect x="44" y="92" width="12" height="6" fill="#5A4A3A" opacity="0.8"/>';
    const doorE = '<rect x="90" y="40" width="12" height="20" fill="#3D2B1A" stroke="#2A1A0A" stroke-width="2"/><rect x="90" y="42" width="10" height="16" fill="#7B5B3B" stroke="#A08060" stroke-width="2"/><rect x="92" y="44" width="6" height="12" fill="#5A4A3A" opacity="0.8"/>';
    const doorW = '<rect x="-2" y="40" width="12" height="20" fill="#3D2B1A" stroke="#2A1A0A" stroke-width="2"/><rect x="0" y="42" width="10" height="16" fill="#7B5B3B" stroke="#A08060" stroke-width="2"/><rect x="2" y="44" width="6" height="12" fill="#5A4A3A" opacity="0.8"/>';

    const rooms = [
      {
        name: '大廳入口', en: 'Entrance Hall', color: '#8B7355', doors: ['北','東','西'], omen: false,
        svg: `<rect x="8" y="8" width="84" height="84" fill="#6B5344" stroke="#4A3728" stroke-width="2"/>${doorN}${doorE}${doorW}<rect x="20" y="20" width="60" height="60" fill="#7B6354" stroke="#5A4334" stroke-width="1" opacity="0.5"/><line x1="50" y1="20" x2="50" y2="35" stroke="#D4AF37" stroke-width="2"/><circle cx="50" cy="42" r="10" fill="#FFD700" opacity="0.5"/><circle cx="50" cy="42" r="6" fill="#FFF8DC" opacity="0.8"/><rect x="25" y="55" width="50" height="20" fill="#5A4A3A" stroke="#4A3728"/><line x1="25" y1="60" x2="75" y2="60" stroke="#3A2A1A" stroke-width="1"/><line x1="25" y1="67" x2="75" y2="67" stroke="#3A2A1A" stroke-width="1"/><line x1="25" y1="74" x2="75" y2="74" stroke="#3A2A1A" stroke-width="1"/>`
      },
      {
        name: '走廊', en: 'Hallway', color: '#6B5B4F', doors: ['北','南'], omen: false,
        svg: `<rect x="30" y="8" width="40" height="84" fill="#5A4A3A" stroke="#4A3728" stroke-width="2"/>${doorN}${doorS}<rect x="35" y="15" width="30" height="70" fill="#8B0000" opacity="0.4"/><rect x="32" y="25" width="6" height="10" fill="#D4AF37" stroke="#8B7355"/><rect x="32" y="45" width="6" height="10" fill="#D4AF37" stroke="#8B7355"/><rect x="62" y="30" width="6" height="10" fill="#D4AF37" stroke="#8B7355"/><rect x="62" y="55" width="6" height="10" fill="#D4AF37" stroke="#8B7355"/><circle cx="35" cy="70" r="3" fill="#FFD700" opacity="0.5"/><circle cx="65" cy="70" r="3" fill="#FFD700" opacity="0.5"/>`
      },
      {
        name: '廚房', en: 'Kitchen', color: '#4A6741', doors: ['北','南','東'], omen: false,
        svg: `<rect x="8" y="8" width="84" height="84" fill="#5A5A4A" stroke="#3A3A2A" stroke-width="2"/>${doorN}${doorS}${doorE}<rect x="15" y="15" width="70" height="18" fill="#6B6B5B" stroke="#4A4A3A"/><rect x="20" y="18" width="20" height="12" fill="#333" stroke="#111"/><circle cx="26" cy="24" r="3" fill="#666"/><circle cx="34" cy="24" r="3" fill="#666"/><rect x="55" y="18" width="25" height="12" fill="#4682B4" stroke="#2E5A8B"/><rect x="32" y="45" width="36" height="24" fill="#8B4513" stroke="#654321"/>`
      },
      {
        name: '圖書室', en: 'Library', color: '#5D4E37', doors: ['南','東','西'], omen: false,
        svg: `<rect x="8" y="8" width="84" height="84" fill="#6B5B4B" stroke="#4A3A2A" stroke-width="2"/>${doorS}${doorE}${doorW}<rect x="12" y="12" width="15" height="76" fill="#4A3728" stroke="#2A1708"/><rect x="14" y="15" width="11" height="3" fill="#8B0000"/><rect x="14" y="22" width="11" height="3" fill="#006400"/><rect x="14" y="29" width="11" height="3" fill="#00008B"/><rect x="14" y="36" width="11" height="3" fill="#4B0082"/><rect x="14" y="43" width="11" height="3" fill="#8B4513"/><rect x="73" y="12" width="15" height="76" fill="#4A3728" stroke="#2A1708"/><rect x="75" y="15" width="11" height="3" fill="#8B0000"/><rect x="75" y="22" width="11" height="3" fill="#006400"/><rect x="38" y="38" width="24" height="28" fill="#8B4513" stroke="#654321"/><circle cx="50" cy="48" r="6" fill="#FFD700" opacity="0.6"/>`
      },
      {
        name: '臥室', en: 'Bedroom', color: '#7B4B4B', doors: ['北','南'], omen: false,
        svg: `<rect x="8" y="8" width="84" height="84" fill="#6B4B4B" stroke="#4A2A2A" stroke-width="2"/>${doorN}${doorS}<rect x="25" y="20" width="50" height="35" fill="#8B4513" stroke="#654321"/><rect x="25" y="15" width="50" height="8" fill="#654321" stroke="#4A3218"/><rect x="30" y="22" width="18" height="10" fill="#FFF8DC" stroke="#DDD"/><rect x="52" y="22" width="18" height="10" fill="#FFF8DC" stroke="#DDD"/><rect x="25" y="35" width="50" height="20" fill="#8B0000" opacity="0.7" stroke="#600000"/><ellipse cx="45" cy="45" rx="5" ry="3" fill="#8B0000" opacity="0.6"/><rect x="10" y="30" width="12" height="15" fill="#654321" stroke="#4A3218"/><circle cx="16" cy="35" r="3" fill="#FFD700" opacity="0.4"/><rect x="70" y="55" width="18" height="30" fill="#654321" stroke="#4A3218"/>`
      },
      {

        svg: `<rect x="8" y="8" width="84" height="84" fill="#3A3A3A" stroke="#2A2A2A" stroke-width="2"/>${doorN}${doorE}<line x1="8" y1="33" x2="92" y2="33" stroke="#4A4A4A" stroke-width="1"/><line x1="8" y1="58" x2="92" y2="58" stroke="#4A4A4A" stroke-width="1"/><line x1="33" y1="8" x2="33" y2="92" stroke="#4A4A4A" stroke-width="1"/><line x1="58" y1="8" x2="58" y2="92" stroke="#4A4A4A" stroke-width="1"/><rect x="15" y="15" width="15" height="12" fill="#4A3728"/><rect x="62" y="15" width="15" height="12" fill="#4A3728"/><rect x="15" y="65" width="15" height="12" fill="#4A3728"/><rect x="62" y="65" width="15" height="12" fill="#4A3728"/><rect x="38" y="38" width="24" height="16" fill="#2A1A0A" stroke="#1A0A00"/>`
      },
      {
        name: '祭壇室', en: 'Ritual Room', color: '#4B0082', doors: ['南','西'], omen: true,
        svg: `<rect x="8" y="8" width="84" height="84" fill="#2D1B4E" stroke="#1A0F2E" stroke-width="2"/>${doorS}${doorW}<polygon points="50,22 60,45 82,45 64,60 72,82 50,68 28,82 36,60 18,45 40,45" fill="none" stroke="#8B0000" stroke-width="3"/><polygon points="50,22 60,45 82,45 64,60 72,82 50,68 28,82 36,60 18,45 40,45" fill="#8B0000" opacity="0.2"/><circle cx="22" cy="22" r="5" fill="#FFD700" opacity="0.6"/><circle cx="78" cy="22" r="5" fill="#FFD700" opacity="0.6"/><circle cx="22" cy="78" r="5" fill="#FFD700" opacity="0.6"/><circle cx="78" cy="78" r="5" fill="#FFD700" opacity="0.6"/>`
      },
      {
        name: '塔樓', en: 'Tower', color: '#5A6B8B', doors: ['南'], omen: false,
        svg: `<polygon points="50,8 85,25 92,50 85,75 50,92 15,75 8,50 15,25" fill="#6B7B9B" stroke="#4A5B7B" stroke-width="2"/><polygon points="50,18 75,30 80,50 75,70 50,82 25,70 20,50 25,30" fill="#7B8BAB"/><rect x="38" y="28" width="10" height="15" fill="#87CEEB" opacity="0.6"/><rect x="52" y="28" width="10" height="15" fill="#87CEEB" opacity="0.6"/><rect x="32" y="50" width="8" height="12" fill="#87CEEB" opacity="0.6"/><rect x="60" y="50" width="8" height="12" fill="#87CEEB" opacity="0.6"/>`
      },
      {
        name: '荒廢花園', en: 'Overgrown Garden', color: '#2F5F2F', doors: ['北','東','西'], omen: false,
        svg: `<rect x="8" y="8" width="84" height="84" fill="#3A6A3A" stroke="#2A4A2A" stroke-width="2"/>${doorN}${doorE}${doorW}<circle cx="25" cy="25" r="15" fill="#2F4F2F"/><circle cx="75" cy="30" r="12" fill="#2F4F2F"/><circle cx="22" cy="72" r="14" fill="#2F4F2F"/><circle cx="78" cy="70" r="13" fill="#2F4F2F"/><ellipse cx="50" cy="50" rx="8" ry="6" fill="#808080"/><rect x="47" y="35" width="6" height="15" fill="#909090"/>`
      },
      {
        name: '實驗室', en: 'Laboratory', color: '#4B6B4B', doors: ['北','南','西'], omen: false,
        svg: `<rect x="8" y="8" width="84" height="84" fill="#5A6B5A" stroke="#3A4A3A" stroke-width="2"/>${doorN}${doorS}${doorW}<rect x="10" y="60" width="80" height="25" fill="#6B6B5B"/><rect x="15" y="45" width="25" height="18" fill="#8B7355"/><rect x="18" y="35" width="4" height="15" fill="#00FF00" opacity="0.6"/><rect x="24" y="38" width="4" height="12" fill="#FF0000" opacity="0.6"/><circle cx="60" cy="50" r="10" fill="#4682B4" opacity="0.5"/><circle cx="60" cy="50" r="6" fill="#00FF00" opacity="0.3"/><rect x="35" y="20" width="25" height="18" fill="#4A4A4A"/><circle cx="47" cy="29" r="5" fill="#00FF00" opacity="0.5"/>`
      }
    ];

    const container = document.getElementById('rooms');
    rooms.forEach(room => {
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${room.svg}</svg>
        <div class="item-name">${room.name}${room.omen ? '<span class="omen-badge"> 🔮需預兆</span>' : ''}</div>
        <div class="item-desc">${room.en}</div>
        <div class="doors">門: ${room.doors.join(', ')}</div>
      `;
      container.appendChild(div);
    });
  </script>
</body>
</html>
