<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Betrayal - 50個房間板塊</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 20px; }
    h1 { text-align: center; margin-bottom: 10px; color: #ff6b6b; text-shadow: 0 0 20px rgba(255, 107, 107, 0.5); }
    .progress { text-align: center; color: #4ade80; margin-bottom: 20px; font-size: 16px; }
    h2 { margin: 30px 0 15px; padding-bottom: 10px; border-bottom: 2px solid #ff6b6b; color: #ffd93d; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
    .item { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; text-align: center; }
    .item img { width: 150px; height: 150px; margin-bottom: 10px; border-radius: 8px; background: #0f0f1a; object-fit: contain; }
    .item-name { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
    .item-en { font-size: 12px; color: #aaa; }
    .badges { margin-top: 5px; }
    .omen { color: #9F7AEA; font-size: 11px; }
    .event { color: #4ade80; font-size: 11px; }
    .level-1f { border-left: 3px solid #4ade80; }
    .level-2f { border-left: 3px solid #fbbf24; }
    .level-b1 { border-left: 3px solid #f87171; }
  </style>
</head>
<body>
  <h1>🏚️ Betrayal - 50個房間板塊</h1>
  <p class="progress">🎉 完成！50/50 (100%) | 所有房間板塊已產生</p>
  
  <h2>🟢 Ground Floor (1F) - 18/18 ✅</h2>
  <div class="grid" id="ground"></div>
  
  <h2>🟡 Upper Floor (2F) - 16/16 ✅</h2>
  <div class="grid" id="upper"></div>
  
  <h2>🔴 Basement (B1) - 16/16 ✅</h2>
  <div class="grid" id="basement"></div>

  <script>
    const groundRooms = [
      { id: '01-foyer', name: '玄關', en: 'Foyer', level: '1f', omen: false, event: false },
      { id: '02-entrance_hall', name: '大廳入口', en: 'Entrance Hall', level: '1f', omen: false, event: true },
      { id: '03-living_room', name: '客廳', en: 'Living Room', level: '1f', omen: false, event: true },
      { id: '04-kitchen', name: '廚房', en: 'Kitchen', level: '1f', omen: false, event: true },
      { id: '05-dining_room', name: '餐廳', en: 'Dining Room', level: '1f', omen: true, event: false },
      { id: '06-study', name: '書房', en: 'Study', level: '1f', omen: false, event: true },
      { id: '07-library', name: '圖書室', en: 'Library', level: '1f', omen: true, event: false },
      { id: '08-conservatory', name: '溫室', en: 'Conservatory', level: '1f', omen: false, event: true },
      { id: '09-ballroom', name: '舞廳', en: 'Ballroom', level: '1f', omen: true, event: true },
      { id: '10-sunroom', name: '日光室', en: 'Sunroom', level: '1f', omen: false, event: true },
      { id: '11-gym', name: '健身房', en: 'Gymnasium', level: '1f', omen: false, event: true },
      { id: '12-game_room', name: '遊戲室', en: 'Game Room', level: '1f', omen: false, event: true },
      { id: '13-music_room', name: '音樂室', en: 'Music Room', level: '1f', omen: true, event: false },
      { id: '14-art_studio', name: '畫室', en: 'Art Studio', level: '1f', omen: false, event: true },
      { id: '15-garden', name: '花園', en: 'Garden', level: '1f', omen: false, event: true },
      { id: '16-patio', name: '庭院', en: 'Patio', level: '1f', omen: false, event: true },
      { id: '17-graveyard', name: '墓地', en: 'Graveyard', level: '1f', omen: true, event: true },
      { id: '18-chapel', name: '禮拜堂', en: 'Chapel', level: '1f', omen: true, event: false },
    ];

    const upperRooms = [
      { id: '19-master_bedroom', name: '主臥室', en: 'Master Bedroom', level: '2f', omen: true, event: false },
      { id: '20-bedroom', name: '臥室', en: 'Bedroom', level: '2f', omen: false, event: true },
      { id: '21-guest_room', name: '客房', en: 'Guest Room', level: '2f', omen: false, event: true },
      { id: '22-child_room', name: '兒童房', en: "Child's Room", level: '2f', omen: true, event: false },
      { id: '23-nursery', name: '嬰兒房', en: 'Nursery', level: '2f', omen: true, event: true },
      { id: '24-bathroom', name: '浴室', en: 'Bathroom', level: '2f', omen: false, event: true },
      { id: '25-hallway', name: '走廊', en: 'Hallway', level: '2f', omen: false, event: true },
      { id: '26-loft', name: '閣樓', en: 'Loft', level: '2f', omen: false, event: true },
      { id: '27-attic', name: '頂樓', en: 'Attic', level: '2f', omen: true, event: true },
      { id: '28-balcony', name: '陽台', en: 'Balcony', level: '2f', omen: false, event: true },
      { id: '29-tower', name: '塔樓', en: 'Tower', level: '2f', omen: true, event: false },
      { id: '30-observatory', name: '天文台', en: 'Observatory', level: '2f', omen: true, event: true },
      { id: '31-solarium', name: '日光浴室', en: 'Solarium', level: '2f', omen: false, event: true },
      { id: '32-sewing_room', name: '縫紉室', en: 'Sewing Room', level: '2f', omen: false, event: true },
      { id: '33-dressing_room', name: '更衣室', en: 'Dressing Room', level: '2f', omen: false, event: true },
      { id: '34-sitting_room', name: '起居室', en: 'Sitting Room', level: '2f', omen: false, event: true },
    ];

    const basementRooms = [
      { id: '35-cellar', name: '地窖', en: 'Cellar', level: 'b1', omen: false, event: true },
      { id: '36-wine_cellar', name: '酒窖', en: 'Wine Cellar', level: 'b1', omen: true, event: false },
      { id: '37-root_cellar', name: '蔬菜窖', en: 'Root Cellar', level: 'b1', omen: false, event: true },
      { id: '38-workshop', name: '工作坊', en: 'Workshop', level: 'b1', omen: false, event: true },
      { id: '39-laundry', name: '洗衣房', en: 'Laundry Room', level: 'b1', omen: false, event: true },
      { id: '40-storage', name: '儲藏室', en: 'Storage Room', level: 'b1', omen: false, event: true },
      { id: '41-dark_room', name: '暗房', en: 'Dark Room', level: 'b1', omen: true, event: true },
      { id: '42-tunnel', name: '隧道', en: 'Tunnel', level: 'b1', omen: false, event: true },
      { id: '43-catacombs', name: '地下墓穴', en: 'Catacombs', level: 'b1', omen: true, event: true },
      { id: '44-dungeon', name: '地牢', en: 'Dungeon', level: 'b1', omen: true, event: false },
      { id: '45-crypt', name: '墓穴', en: 'Crypt', level: 'b1', omen: true, event: false },
      { id: '46-pentagram', name: '祭壇室', en: 'Ritual Room', level: 'b1', omen: true, event: true },
      { id: '47-laboratory', name: '實驗室', en: 'Laboratory', level: 'b1', omen: true, event: true },
      { id: '48-furnace', name: '鍋爐房', en: 'Furnace Room', level: 'b1', omen: false, event: true },
      { id: '49-cave', name: '洞穴', en: 'Cave', level: 'b1', omen: true, event: true },
      { id: '50-chasm', name: '深淵', en: 'Chasm', level: 'b1', omen: true, event: true },
    ];

    function renderRoom(room, container) {
      const div = document.createElement('div');
      div.className = `item level-${room.level}`;
      div.innerHTML = `
        <img src="../betrayal-multi/public/rooms/${room.id}.svg" alt="${room.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23333%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23666%22>${room.id}</text></svg>'">
        <div class="item-name">${room.id.split('-')[0]}. ${room.name}</div>
        <div class="item-en">${room.en}</div>
        <div class="badges">
          ${room.omen ? '<span class="omen">🔮 預兆</span>' : ''}
          ${room.event ? '<span class="event">📜 事件</span>' : ''}
        </div>
      `;
      container.appendChild(div);
    }
    
    groundRooms.forEach(room => renderRoom(room, document.getElementById('ground')));
    upperRooms.forEach(room => renderRoom(room, document.getElementById('upper')));
    basementRooms.forEach(room => renderRoom(room, document.getElementById('basement')));
  </script>
</body>
</html>
